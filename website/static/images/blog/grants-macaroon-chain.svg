<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <style>
    @keyframes chainPulse { 0%, 100% { stroke-dashoffset: 0; } 50% { stroke-dashoffset: 12; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes boxGlow { 0%, 100% { stroke-opacity: 0.6; } 50% { stroke-opacity: 1; } }
    @keyframes barNarrow { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.7; } }
    @keyframes verifyPulse { 0%, 100% { opacity: 0.5; fill-opacity: 0.08; } 50% { opacity: 1; fill-opacity: 0.2; } }
    @keyframes xPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    .chain { stroke-dasharray: 6 6; animation: chainPulse 2s linear infinite; }
    .ch1 { animation-delay: 0s; }
    .ch2 { animation-delay: 0.5s; }
    .ch3 { animation-delay: 1s; }
    .f1 { animation: fadeIn 0.6s ease-out 0.2s both; }
    .f2 { animation: fadeIn 0.6s ease-out 0.6s both; }
    .f3 { animation: fadeIn 0.6s ease-out 1.0s both; }
    .f4 { animation: fadeIn 0.6s ease-out 1.4s both; }
    .f5 { animation: fadeIn 0.6s ease-out 1.8s both; }
    .glow1 { animation: boxGlow 3s ease-in-out infinite; }
    .glow2 { animation: boxGlow 3s ease-in-out infinite 1s; }
    .glow3 { animation: boxGlow 3s ease-in-out infinite 2s; }
    .bar { animation: barNarrow 2.5s ease-in-out infinite; }
    .bar2 { animation: barNarrow 2.5s ease-in-out infinite 0.8s; }
    .bar3 { animation: barNarrow 2.5s ease-in-out infinite 1.6s; }
    .verify { animation: verifyPulse 2s ease-in-out infinite; }
    .xp { animation: xPulse 2.5s ease-in-out infinite; }
    text { font-family: system-ui, -apple-system, sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>

  <rect width="800" height="420" fill="#0a0a1a"/>
  <text x="400" y="32" text-anchor="middle" font-size="15" fill="#666" letter-spacing="1">HMAC CHAIN - CAVEATS CAN ONLY NARROW</text>

  <!-- Root key at top -->
  <g class="f1">
    <rect x="340" y="50" width="120" height="34" rx="8" fill="#00d4aa" fill-opacity="0.15" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="400" y="72" text-anchor="middle" font-size="14" fill="#00d4aa" font-weight="600" class="mono">root_key</text>
  </g>

  <!-- Chain link 1 -->
  <line x1="400" y1="84" x2="400" y2="120" class="chain ch1" stroke="#00d4aa" stroke-width="2"/>

  <!-- Box 1: peer_id caveat -->
  <g class="f2">
    <rect x="215" y="120" width="370" height="46" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1" class="glow1"/>
    <text x="235" y="148" font-size="13" fill="#00d4aa" class="mono" opacity="0.6">HMAC(</text>
    <text x="310" y="148" font-size="14" fill="#ffb347" class="mono" font-weight="500">peer_id=B</text>
    <text x="440" y="148" font-size="13" fill="#00d4aa" class="mono" opacity="0.6">) -> sig</text>
    <text x="530" y="148" font-size="14" fill="#00d4aa" class="mono" font-weight="700">_1</text>
    <!-- Permission bar - full width -->
    <rect x="215" y="170" width="370" height="5" rx="2.5" fill="#00d4aa" opacity="0.35" class="bar"/>
  </g>

  <!-- Chain link 2 -->
  <line x1="400" y1="175" x2="400" y2="205" class="chain ch2" stroke="#00d4aa" stroke-width="2"/>

  <!-- Box 2: expires caveat -->
  <g class="f3">
    <rect x="215" y="205" width="370" height="46" rx="8" fill="#1a1a2e" stroke="#ffb347" stroke-width="1" class="glow2"/>
    <text x="235" y="233" font-size="13" fill="#ffb347" class="mono" opacity="0.6">HMAC(</text>
    <text x="310" y="233" font-size="14" fill="#ffb347" class="mono" font-weight="500">expires=1h</text>
    <text x="445" y="233" font-size="13" fill="#ffb347" class="mono" opacity="0.6">) -> sig</text>
    <text x="530" y="233" font-size="14" fill="#ffb347" class="mono" font-weight="700">_2</text>
    <!-- Narrower permission bar -->
    <rect x="215" y="255" width="290" height="5" rx="2.5" fill="#ffb347" opacity="0.35" class="bar2"/>
    <text x="520" y="260" font-size="10" fill="#ffb347" opacity="0.5" class="bar2">narrower</text>
  </g>

  <!-- Chain link 3 -->
  <line x1="400" y1="260" x2="400" y2="290" class="chain ch3" stroke="#ffb347" stroke-width="2"/>

  <!-- Box 3: service caveat -->
  <g class="f4">
    <rect x="215" y="290" width="370" height="46" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="1" class="glow3"/>
    <text x="235" y="318" font-size="13" fill="#4488ff" class="mono" opacity="0.6">HMAC(</text>
    <text x="310" y="318" font-size="14" fill="#4488ff" class="mono" font-weight="500">service=browse</text>
    <text x="470" y="318" font-size="13" fill="#4488ff" class="mono" opacity="0.6">) -> sig</text>
    <text x="550" y="318" font-size="14" fill="#4488ff" class="mono" font-weight="700">_3</text>
    <!-- Even narrower permission bar -->
    <rect x="215" y="340" width="200" height="5" rx="2.5" fill="#4488ff" opacity="0.35" class="bar3"/>
    <text x="430" y="345" font-size="10" fill="#4488ff" opacity="0.5" class="bar3">narrower still</text>
  </g>

  <!-- Verified badge -->
  <g class="f5">
    <rect x="330" y="370" width="140" height="30" rx="15" fill="#00d4aa" fill-opacity="0.08" stroke="#00d4aa" stroke-width="1.5" class="verify"/>
    <text x="400" y="390" text-anchor="middle" font-size="14" fill="#00d4aa" font-weight="600" class="verify">VERIFIED</text>
  </g>

  <!-- "Can't remove" indicator on left -->
  <g class="xp">
    <line x1="100" y1="180" x2="100" y2="280" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="105" y="195" font-size="11" fill="#ff6b6b">remove</text>
    <text x="105" y="210" font-size="11" fill="#ff6b6b">caveat?</text>
    <line x1="90" y1="240" x2="110" y2="260" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
    <line x1="110" y1="240" x2="90" y2="260" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
    <text x="100" y="290" text-anchor="middle" font-size="12" fill="#ff6b6b" font-weight="600">HMAC breaks</text>
  </g>
</svg>

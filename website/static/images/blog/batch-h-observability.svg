<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <linearGradient id="bgH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="280" fill="url(#bgH)"/>

  <!-- Metaphor: dashboard gauges showing network health -->
  <!-- Gauge 1: Connections -->
  <g opacity="0.8">
    <path d="M120,160 A55,55 0 0,1 230,160" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M120,160 A55,55 0 0,1 210,120" stroke="#00d4aa" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="175" cy="165" r="4" fill="#00d4aa" opacity="0.6"/>
    <text x="175" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#00d4aa">12</text>
    <text x="175" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Active Peers</text>
  </g>

  <!-- Gauge 2: Data transferred -->
  <g opacity="0.8">
    <path d="M285,160 A55,55 0 0,1 395,160" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M285,160 A55,55 0 0,1 375,122" stroke="#ffb347" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="340" cy="165" r="4" fill="#ffb347" opacity="0.6"/>
    <text x="340" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffb347">2.4G</text>
    <text x="340" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Data Moved</text>
  </g>

  <!-- Gauge 3: Uptime -->
  <g opacity="0.8">
    <path d="M450,160 A55,55 0 0,1 560,160" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M450,160 A55,55 0 0,1 555,155" stroke="#4488ff" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="505" cy="165" r="4" fill="#4488ff" opacity="0.6"/>
    <text x="505" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#4488ff">99.8%</text>
    <text x="505" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Uptime</text>
  </g>

  <!-- Bottom text -->
  <text x="350" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#e0e0e0">See What's Happening in Your Network</text>
  <text x="350" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Real-time monitoring. 30 metrics. Pre-built dashboards. Zero configuration.</text>

  <!-- Top label -->
  <text x="350" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#555" letter-spacing="1">AUTOMATIC MONITORING</text>
</svg>

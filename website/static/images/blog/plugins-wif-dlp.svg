<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes scanLine { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
      .flow { stroke-dasharray: 6 4; animation: dashFlow 1.5s linear infinite; }
      .scan { animation: scanLine 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Outbound transfer (left) -->
  <g transform="translate(30, 30)">
    <rect x="0" y="0" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5"/>
    <text x="80" y="20" font-family="system-ui" font-size="11" fill="#4488ff" text-anchor="middle" font-weight="600">Outbound Transfer</text>
    <text x="80" y="38" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">files queued to send</text>
    <text x="80" y="54" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle">enters DLP pipeline</text>
  </g>

  <!-- Arrow to DLP -->
  <line x1="195" y1="65" x2="268" y2="65" class="flow" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <polygon points="265,60 275,65 265,70" fill="#4488ff" opacity="0.5"/>

  <!-- DLP scanner (center) -->
  <g transform="translate(280, 15)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#1a1a2e" stroke="#ffb347" stroke-width="2"/>
    <text x="100" y="22" font-family="system-ui" font-size="12" fill="#ffb347" text-anchor="middle" font-weight="600">DLP Plugin</text>
    <line x1="15" y1="30" x2="185" y2="30" stroke="#ffb347" stroke-width="0.5" opacity="0.3"/>
    <!-- Scan lines -->
    <line x1="20" y1="44" x2="180" y2="44" stroke="#ffb347" stroke-width="1" class="scan"/>
    <line x1="20" y1="56" x2="180" y2="56" stroke="#ffb347" stroke-width="1" class="scan"/>
    <line x1="20" y1="68" x2="180" y2="68" stroke="#ffb347" stroke-width="1" class="scan"/>
    <text x="100" y="88" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">patterns, size, destinations</text>
  </g>

  <!-- Two outcomes -->
  <line x1="485" y1="50" x2="558" y2="35" class="flow" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="555,30 565,35 555,40" fill="#00d4aa" opacity="0.5"/>
  <line x1="485" y1="80" x2="558" y2="95" class="flow" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
  <polygon points="555,90 565,95 555,100" fill="#ff6b6b" opacity="0.5"/>

  <!-- PASS -->
  <g transform="translate(570, 15)">
    <rect x="0" y="0" width="160" height="40" rx="6" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="80" y="17" font-family="system-ui" font-size="10" fill="#00d4aa" text-anchor="middle" font-weight="600">PASS: transfer proceeds</text>
    <text x="80" y="33" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">file leaves the node</text>
  </g>

  <!-- BLOCK -->
  <g transform="translate(570, 75)">
    <rect x="0" y="0" width="160" height="40" rx="6" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="80" y="17" font-family="system-ui" font-size="10" fill="#ff6b6b" text-anchor="middle" font-weight="600">BLOCK: transfer halted</text>
    <text x="80" y="33" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">policy violation logged</text>
  </g>

  <!-- Crash note -->
  <g transform="translate(145, 130)">
    <rect x="0" y="0" width="470" height="24" rx="5" fill="#1a1a2e" stroke="#666" stroke-width="1" opacity="0.4"/>
    <text x="235" y="16" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">If DLP crashes mid-scan: transfers pause (not leak) until supervisor restarts it.</text>
  </g>

  <text x="400" y="185" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">In the transfer pipeline, not bolted onto a proxy. Data cannot bypass the scan.</text>
</svg>

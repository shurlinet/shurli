<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310" width="800" height="310">
  <defs>
    <linearGradient id="bgH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
    <linearGradient id="shieldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ece6a;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#9ece6a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="300" fill="url(#bgH)" rx="8"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#c0caf5">Your File. Verified. Private. Unstoppable.</text>
  <text x="400" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#565f89">Every byte is checked, your paths are hidden, and transfers survive anything</text>

  <!-- Shield icon (center) -->
  <circle cx="400" cy="150" r="60" fill="url(#shieldGlow)"/>
  <path d="M400 100 L440 118 L440 155 Q440 180 400 200 Q360 180 360 155 L360 118 Z" fill="none" stroke="#9ece6a" stroke-width="1.8"/>
  <text x="400" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#9ece6a">&#x2713;</text>

  <!-- Left pillar: Integrity -->
  <text x="160" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#bb9af7">Integrity</text>
  <text x="160" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a9b1d6">Change one byte,</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a9b1d6">we catch it</text>

  <!-- Right pillar: Privacy -->
  <text x="640" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fbb040">Privacy</text>
  <text x="640" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a9b1d6">Your file paths</text>
  <text x="640" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a9b1d6">stay yours</text>

  <!-- Bottom row: three capabilities -->
  <rect x="60" y="220" width="200" height="65" rx="8" fill="#1e1d20" stroke="#565f89" stroke-width="0.5"/>
  <text x="160" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#da1c5c">Resumes</text>
  <text x="160" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">Network drops? Picks up</text>
  <text x="160" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">where it left off</text>

  <rect x="300" y="220" width="200" height="65" rx="8" fill="#1e1d20" stroke="#565f89" stroke-width="0.5"/>
  <text x="400" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9ece6a">Protected</text>
  <text x="400" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">7 layers of abuse</text>
  <text x="400" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">defense built in</text>

  <rect x="540" y="220" width="200" height="65" rx="8" fill="#1e1d20" stroke="#565f89" stroke-width="0.5"/>
  <text x="640" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#bb9af7">No middleman</text>
  <text x="640" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">Peer-to-peer.</text>
  <text x="640" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">No cloud. No server.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes crashFlash {
        0%, 80%, 100% { stroke: #00d4aa; }
        85% { stroke: #ff6b6b; }
        90% { stroke: #ffb347; }
        95% { stroke: #00d4aa; }
      }
      @keyframes pulseGlow { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
      .crash { animation: crashFlash 5s ease-in-out infinite; }
      .glow { animation: pulseGlow 3s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="260" fill="url(#bg)"/>

  <!-- Timeline: crash -> supervisor -> restart -->
  <!-- NAS Sync crashes -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="155" height="65" rx="10" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="2"/>
    <text x="77" y="22" font-family="system-ui" font-size="12" fill="#ff6b6b" text-anchor="middle" font-weight="600">NAS Sync Plugin</text>
    <text x="77" y="42" font-family="system-ui" font-size="10" fill="#ff6b6b" text-anchor="middle">PANIC</text>
    <text x="77" y="56" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">corrupted chunk</text>
  </g>

  <!-- Arrow -->
  <line x1="190" y1="82" x2="240" y2="82" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
  <polygon points="237,77 247,82 237,87" fill="#ff6b6b" opacity="0.5"/>

  <!-- Supervisor catches -->
  <g transform="translate(250, 50)">
    <rect x="0" y="0" width="140" height="65" rx="10" fill="#1a1a2e" stroke="#ffb347" stroke-width="2"/>
    <text x="70" y="22" font-family="system-ui" font-size="12" fill="#ffb347" text-anchor="middle" font-weight="600">Supervisor</text>
    <text x="70" y="42" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">catches crash</text>
    <text x="70" y="56" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">checkpoints state</text>
  </g>

  <!-- Arrow -->
  <line x1="395" y1="82" x2="445" y2="82" stroke="#ffb347" stroke-width="1.5" opacity="0.5"/>
  <polygon points="442,77 452,82 442,87" fill="#ffb347" opacity="0.5"/>

  <!-- Restart -->
  <g transform="translate(455, 50)">
    <rect x="0" y="0" width="140" height="65" rx="10" fill="#1a1a2e" class="crash" stroke-width="2"/>
    <text x="70" y="22" font-family="system-ui" font-size="12" fill="#00d4aa" text-anchor="middle" font-weight="600">NAS Sync</text>
    <text x="70" y="42" font-family="system-ui" font-size="10" fill="#00d4aa" text-anchor="middle">RESTORED</text>
    <text x="70" y="56" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">resumes from checkpoint</text>
  </g>

  <!-- Meanwhile box (everything else untouched) -->
  <g transform="translate(625, 35)">
    <rect x="0" y="0" width="145" height="95" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5" class="glow"/>
    <text x="72" y="20" font-family="system-ui" font-size="10" fill="#e0e0e0" text-anchor="middle" font-weight="600">Untouched:</text>

    <circle cx="18" cy="40" r="3" fill="#00d4aa" opacity="0.6"/>
    <text x="28" y="44" font-family="system-ui" font-size="9" fill="#bbb">Photo backups</text>

    <circle cx="18" cy="58" r="3" fill="#00d4aa" opacity="0.6"/>
    <text x="28" y="62" font-family="system-ui" font-size="9" fill="#bbb">Family access</text>

    <circle cx="18" cy="76" r="3" fill="#00d4aa" opacity="0.6"/>
    <text x="28" y="80" font-family="system-ui" font-size="9" fill="#bbb">Daemon running</text>
  </g>

  <!-- Bottom -->
  <g transform="translate(100, 155)">
    <rect x="0" y="0" width="570" height="55" rx="8" fill="#1a1a2e" stroke="#666" stroke-width="1" opacity="0.4"/>
    <text x="285" y="22" font-family="system-ui" font-size="12" fill="#e0e0e0" text-anchor="middle" font-weight="600">You wake up. Everything is working. You did not do anything.</text>
    <text x="285" y="42" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">That is the point.</text>
  </g>
</svg>

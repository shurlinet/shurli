<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <linearGradient id="bgPI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="280" fill="url(#bgPI)"/>

  <!-- Metaphor: three foundation blocks stacked -->
  <!-- Block 1: Build tools -->
  <g opacity="0.8">
    <rect x="80" y="50" width="160" height="160" rx="10" fill="#00d4aa" fill-opacity="0.04" stroke="#00d4aa" stroke-width="1.5"/>
    <!-- Wrench icon -->
    <path d="M145,95 L170,120 L165,125 L140,100 Z" stroke="#00d4aa" stroke-width="2" fill="none" opacity="0.4"/>
    <circle cx="140" cy="90" r="8" stroke="#00d4aa" stroke-width="1.5" fill="none" opacity="0.3"/>
    <text x="160" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#00d4aa">Build Once</text>
    <text x="160" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888">Run Anywhere</text>
    <text x="160" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888">macOS, Linux, ARM</text>
  </g>

  <!-- Block 2: Encrypted pairing -->
  <g opacity="0.8">
    <rect x="270" y="50" width="160" height="160" rx="10" fill="#ffb347" fill-opacity="0.04" stroke="#ffb347" stroke-width="1.5"/>
    <!-- Lock icon -->
    <rect x="325" y="95" width="24" height="18" rx="4" fill="none" stroke="#ffb347" stroke-width="2" opacity="0.4"/>
    <path d="M330,95 L330,86 C330,78 348,78 348,86 L348,95" stroke="#ffb347" stroke-width="2" fill="none" opacity="0.3"/>
    <text x="350" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffb347">Encrypted</text>
    <text x="350" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888">Pairing</text>
    <text x="350" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888">End-to-end secure</text>
  </g>

  <!-- Block 3: Private networks -->
  <g opacity="0.8">
    <rect x="460" y="50" width="160" height="160" rx="10" fill="#4488ff" fill-opacity="0.04" stroke="#4488ff" stroke-width="1.5"/>
    <!-- Shield icon -->
    <path d="M540,80 L540,105 C540,118 525,125 525,125 C525,125 510,118 510,105 L510,80 L525,72 L540,80 Z" stroke="#4488ff" stroke-width="1.5" fill="none" opacity="0.4"/>
    <text x="540" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#4488ff">Private</text>
    <text x="540" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888">Networks</text>
    <text x="540" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888">Your own namespace</text>
  </g>

  <!-- Bottom text -->
  <text x="350" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#e0e0e0">The Foundation Gets Stronger</text>
  <text x="350" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Automated builds. Encrypted handshakes. Isolated network namespaces.</text>
</svg>

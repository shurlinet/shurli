<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgPI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bgPI)"/>

  <!-- Three foundation pillars -->
  <!-- Block 1: Build tools -->
  <rect x="160" y="50" width="240" height="230" rx="14" fill="#00d4aa" fill-opacity="0.04" stroke="#00d4aa" stroke-width="1.5"/>
  <!-- Gear icon (centered) -->
  <circle cx="280" cy="130" r="24" stroke="#00d4aa" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="280" cy="130" r="10" stroke="#00d4aa" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Gear teeth -->
  <line x1="280" y1="103" x2="280" y2="110" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
  <line x1="280" y1="150" x2="280" y2="157" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
  <line x1="253" y1="130" x2="260" y2="130" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="130" x2="307" y2="130" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
  <text x="280" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#00d4aa">Build Once</text>
  <text x="280" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Run Anywhere</text>
  <text x="280" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888">macOS, Linux, ARM</text>

  <!-- Block 2: Encrypted pairing -->
  <rect x="480" y="50" width="240" height="230" rx="14" fill="#ffb347" fill-opacity="0.04" stroke="#ffb347" stroke-width="1.5"/>
  <!-- Lock icon (centered) -->
  <rect x="592" y="130" width="28" height="22" rx="4" fill="none" stroke="#ffb347" stroke-width="2" opacity="0.4"/>
  <path d="M596,130 L596,120 C596,110 616,110 616,120 L616,130" stroke="#ffb347" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="606" cy="140" r="3" fill="#ffb347" opacity="0.3"/>
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffb347">Encrypted</text>
  <text x="600" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Pairing</text>
  <text x="600" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888">End-to-end secure</text>

  <!-- Block 3: Private networks -->
  <rect x="800" y="50" width="240" height="230" rx="14" fill="#4488ff" fill-opacity="0.04" stroke="#4488ff" stroke-width="1.5"/>
  <!-- Shield icon (centered) -->
  <path d="M920,105 L945,116 L945,140 C945,158 920,168 920,168 C920,168 895,158 895,140 L895,116 Z"
        stroke="#4488ff" stroke-width="2" fill="none" opacity="0.4"/>
  <text x="920" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#4488ff">Private</text>
  <text x="920" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Networks</text>
  <text x="920" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888">Your own namespace</text>

  <!-- Bottom text -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#e0e0e0">The Foundation Gets Stronger</text>
  <text x="600" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#888">Automated builds. Encrypted handshakes. Isolated network namespaces.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes dash { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }
    @keyframes msgBlink { 0%, 45% { opacity: 0; } 50% { opacity: 1; } 95% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes ackBlink { 0%, 65% { opacity: 0; } 70% { opacity: 1; } 95% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes queueFade { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.4; } }
    .f1 { animation: fadeIn 0.5s ease-out 0.2s both; }
    .f2 { animation: fadeIn 0.5s ease-out 0.6s both; }
    .f3 { animation: fadeIn 0.5s ease-out 1s both; }
    .flow { stroke-dasharray: 6 4; animation: dash 0.8s linear infinite; }
    .msg { animation: msgBlink 3s ease-in-out infinite; }
    .ack { animation: ackBlink 3s ease-in-out infinite; }
    .qpulse { animation: queueFade 4s ease-in-out infinite; }
    .tpulse { animation: pulse 2s ease-in-out infinite; }
    text { font-family: system-ui, -apple-system, sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>

  <rect width="800" height="380" fill="#0a0a1a"/>
  <text x="400" y="28" text-anchor="middle" font-size="13" fill="#666" letter-spacing="1">P2P GRANT DELIVERY - RELAY NEVER TOUCHES TOKENS</text>

  <!-- Issuer Node -->
  <g class="f1">
    <rect x="40" y="55" width="180" height="200" rx="10" stroke="#00d4aa" stroke-width="1.5" fill="#00d4aa" fill-opacity="0.04"/>
    <text x="130" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#00d4aa">Issuer Node</text>
    <text x="130" y="100" text-anchor="middle" font-size="10" fill="#888">admin runs grant</text>

    <!-- Grant store -->
    <rect x="60" y="115" width="140" height="28" rx="4" fill="#00d4aa" fill-opacity="0.08" stroke="#00d4aa" stroke-width="0.5"/>
    <text x="130" y="133" text-anchor="middle" font-size="9" fill="#00d4aa" class="mono">GrantStore.Grant()</text>

    <!-- Offline queue -->
    <rect x="60" y="155" width="140" height="40" rx="4" fill="#4488ff" fill-opacity="0.06" stroke="#4488ff" stroke-width="0.5" class="qpulse"/>
    <text x="130" y="172" text-anchor="middle" font-size="9" fill="#4488ff" class="mono">offline queue</text>
    <text x="130" y="185" text-anchor="middle" font-size="8" fill="#4488ff" opacity="0.5">7d TTL, max 100</text>

    <!-- Rate limit badge -->
    <rect x="75" y="210" width="110" height="16" rx="8" fill="#ffb347" fill-opacity="0.08" stroke="#ffb347" stroke-width="0.5"/>
    <text x="130" y="222" text-anchor="middle" font-size="8" fill="#ffb347">5/min rate limit</text>
  </g>

  <!-- Holder Peer -->
  <g class="f2">
    <rect x="580" y="55" width="180" height="200" rx="10" stroke="#ffb347" stroke-width="1.5" fill="#ffb347" fill-opacity="0.04"/>
    <text x="670" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#ffb347">Holder Peer</text>
    <text x="670" y="100" text-anchor="middle" font-size="10" fill="#888">receives token</text>

    <!-- Pouch -->
    <rect x="600" y="115" width="140" height="28" rx="4" fill="#ffb347" fill-opacity="0.08" stroke="#ffb347" stroke-width="0.5"/>
    <text x="670" y="133" text-anchor="middle" font-size="9" fill="#ffb347" class="mono">Pouch.Add()</text>

    <!-- Trust check -->
    <rect x="600" y="155" width="140" height="28" rx="4" fill="#00d4aa" fill-opacity="0.06" stroke="#00d4aa" stroke-width="0.5"/>
    <text x="670" y="173" text-anchor="middle" font-size="9" fill="#00d4aa">trust: authorized_keys</text>

    <!-- Auto-refresh -->
    <rect x="600" y="195" width="140" height="28" rx="4" fill="#4488ff" fill-opacity="0.06" stroke="#4488ff" stroke-width="0.5" class="tpulse"/>
    <text x="670" y="213" text-anchor="middle" font-size="9" fill="#4488ff">refresh at 10% left</text>
  </g>

  <!-- Wire protocol in the middle -->
  <g class="f3">
    <rect x="260" y="80" width="280" height="150" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="400" y="100" text-anchor="middle" font-size="11" fill="#00d4aa" class="mono">/shurli/grant/1.0.0</text>

    <!-- Message types -->
    <text x="290" y="125" font-size="9" fill="#00d4aa" class="mono">0x01</text>
    <text x="330" y="125" font-size="9" fill="#888">deliver token</text>

    <text x="290" y="145" font-size="9" fill="#ff6b6b" class="mono">0x02</text>
    <text x="330" y="145" font-size="9" fill="#888">revoke notice</text>

    <text x="290" y="165" font-size="9" fill="#ffb347" class="mono">0x03</text>
    <text x="330" y="165" font-size="9" fill="#888">ack</text>

    <text x="290" y="185" font-size="9" fill="#4488ff" class="mono">0x04</text>
    <text x="330" y="185" font-size="9" fill="#888">refresh request</text>

    <!-- Animated delivery message -->
    <line x1="280" y1="205" x2="520" y2="205" stroke="#00d4aa" stroke-width="1" class="flow" opacity="0.4"/>
    <rect x="370" y="198" width="60" height="14" rx="3" fill="#00d4aa" fill-opacity="0.4" class="msg"/>
    <text x="400" y="208" text-anchor="middle" font-size="7" fill="#0a0a1a" font-weight="700" class="msg">DELIVER</text>

    <!-- Animated ack -->
    <line x1="520" y1="218" x2="280" y2="218" stroke="#ffb347" stroke-width="0.5" opacity="0.2"/>
    <rect x="380" y="212" width="40" height="12" rx="3" fill="#ffb347" fill-opacity="0.3" class="ack"/>
    <text x="400" y="221" text-anchor="middle" font-size="6" fill="#0a0a1a" font-weight="700" class="ack">ACK</text>
  </g>

  <!-- Bottom: key properties -->
  <g>
    <rect x="80" y="285" width="200" height="36" rx="6" fill="#00d4aa" fill-opacity="0.04" stroke="#00d4aa" stroke-width="0.5"/>
    <text x="180" y="300" text-anchor="middle" font-size="9" fill="#00d4aa" font-weight="500">Direct P2P</text>
    <text x="180" y="314" text-anchor="middle" font-size="8" fill="#888">no relay involvement</text>

    <rect x="300" y="285" width="200" height="36" rx="6" fill="#ffb347" fill-opacity="0.04" stroke="#ffb347" stroke-width="0.5"/>
    <text x="400" y="300" text-anchor="middle" font-size="9" fill="#ffb347" font-weight="500">Offline Queue</text>
    <text x="400" y="314" text-anchor="middle" font-size="8" fill="#888">flush on reconnect</text>

    <rect x="520" y="285" width="200" height="36" rx="6" fill="#4488ff" fill-opacity="0.04" stroke="#4488ff" stroke-width="0.5"/>
    <text x="620" y="300" text-anchor="middle" font-size="9" fill="#4488ff" font-weight="500">8 KB max, 10s timeout</text>
    <text x="620" y="314" text-anchor="middle" font-size="8" fill="#888">resource bounded</text>
  </g>

  <!-- Sovereignty note -->
  <text x="400" y="350" text-anchor="middle" font-size="10" fill="#555">Sovereignty preserved: relay never touches grant tokens</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes xPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes boxPulse { 0%, 100% { stroke-opacity: 0.6; } 50% { stroke-opacity: 1; } }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #bbb; text-anchor: middle; }
      .header { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #e0e0e0; text-anchor: middle; letter-spacing: 1px; text-transform: uppercase; }
      .box-pulse { animation: boxPulse 3s ease-in-out infinite; }
      .x-mark { animation: xPulse 2s ease-in-out infinite; }
      .f1 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
      .f2 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
      .f3 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.0s; opacity: 0; }
    </style>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- The sealed box -->
  <g transform="translate(100, 30)">
    <!-- Outer sealed container -->
    <rect x="0" y="0" width="320" height="340" rx="12" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="2" class="box-pulse"/>

    <!-- Header -->
    <text x="160" y="30" class="header" fill="#ff6b6b">Sealed Monolith</text>
    <line x1="20" y1="42" x2="300" y2="42" stroke="#ff6b6b" stroke-width="0.5" opacity="0.3"/>

    <!-- Features stacked inside -->
    <rect x="25" y="58" width="270" height="42" rx="6" fill="#1a2a1a" stroke="#00d4aa" stroke-width="1.5" opacity="0.8"/>
    <text x="160" y="84" font-family="system-ui" font-size="14" fill="#00d4aa" text-anchor="middle">Networking</text>

    <rect x="25" y="110" width="270" height="42" rx="6" fill="#1a1a2e" stroke="#ffb347" stroke-width="1.5" opacity="0.8"/>
    <text x="160" y="136" font-family="system-ui" font-size="14" fill="#ffb347" text-anchor="middle">File Transfer</text>

    <rect x="25" y="162" width="270" height="42" rx="6" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5" opacity="0.8"/>
    <text x="160" y="188" font-family="system-ui" font-size="14" fill="#4488ff" text-anchor="middle">Access Control</text>

    <rect x="25" y="214" width="270" height="42" rx="6" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5" opacity="0.8"/>
    <text x="160" y="240" font-family="system-ui" font-size="14" fill="#00d4aa" text-anchor="middle">Service Discovery</text>

    <!-- New feature slot (dashed, can't add) -->
    <rect x="25" y="266" width="270" height="42" rx="6" fill="#1a1a2e" stroke="#888" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>
    <text x="160" y="292" font-family="system-ui" font-size="14" fill="#bbb" text-anchor="middle" opacity="0.5">New Feature?</text>

    <!-- Lock icon -->
    <g transform="translate(148, 316)">
      <rect x="6" y="8" width="14" height="11" rx="2" fill="#ff6b6b" opacity="0.7"/>
      <path d="M8 8 V5 a5 5 0 0 1 10 0 V8" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
    </g>
  </g>

  <!-- X marks on the right side -->
  <g class="x-mark f1" transform="translate(490, 90)">
    <line x1="0" y1="0" x2="18" y2="18" stroke="#ff6b6b" stroke-width="2.5"/>
    <line x1="18" y1="0" x2="0" y2="18" stroke="#ff6b6b" stroke-width="2.5"/>
    <text x="30" y="14" font-family="system-ui" font-size="14" fill="#ff6b6b">Can't add without rebuild</text>
  </g>
  <g class="x-mark f2" transform="translate(490, 190)">
    <line x1="0" y1="0" x2="18" y2="18" stroke="#ff6b6b" stroke-width="2.5"/>
    <line x1="18" y1="0" x2="0" y2="18" stroke="#ff6b6b" stroke-width="2.5"/>
    <text x="30" y="14" font-family="system-ui" font-size="14" fill="#ff6b6b">Bug in one crashes all</text>
  </g>
  <g class="x-mark f3" transform="translate(490, 290)">
    <line x1="0" y1="0" x2="18" y2="18" stroke="#ff6b6b" stroke-width="2.5"/>
    <line x1="18" y1="0" x2="0" y2="18" stroke="#ff6b6b" stroke-width="2.5"/>
    <text x="30" y="14" font-family="system-ui" font-size="14" fill="#ff6b6b">Everything sees everything</text>
  </g>

  <text x="400" y="400" class="label">Every feature fused together. No boundaries. No isolation. No growth.</text>
</svg>

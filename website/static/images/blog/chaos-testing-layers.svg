<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
    <linearGradient id="nodeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2a2e"/>
      <stop offset="100%" style="stop-color:#1e1d20"/>
    </linearGradient>
  </defs>

  <rect width="800" height="280" fill="url(#bg)" rx="8"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#c0caf5">Each Fix Exposed the Next Layer</text>
  <text x="400" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#565f89">Why it took 40+ hours: layered discovery pattern</text>

  <!-- Layer 1 -->
  <rect x="30" y="60" width="160" height="55" rx="8" fill="url(#nodeFill)" stroke="#f7768e" stroke-width="0.8"/>
  <text x="110" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#f7768e">Transport blocker</text>
  <text x="110" y="95" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#9aa5ce">IPv6 dials blocked</text>
  <text x="110" y="107" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#565f89">after CGNAT phase</text>

  <!-- Arrow: fix reveals next -->
  <line x1="195" y1="87" x2="225" y2="87" stroke="#e0af68" stroke-width="1.5"/>
  <polygon points="225,83 235,87 225,91" fill="#e0af68"/>
  <text x="215" y="78" text-anchor="middle" font-family="SF Mono, monospace" font-size="6" fill="#e0af68">fix</text>

  <!-- Layer 2 -->
  <rect x="240" y="60" width="160" height="55" rx="8" fill="url(#nodeFill)" stroke="#f7768e" stroke-width="0.8"/>
  <text x="320" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#f7768e">Cascade dial failure</text>
  <text x="320" y="95" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#9aa5ce">16 addresses tried</text>
  <text x="320" y="107" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#565f89">simultaneously</text>

  <!-- Arrow -->
  <line x1="405" y1="87" x2="435" y2="87" stroke="#e0af68" stroke-width="1.5"/>
  <polygon points="435,83 445,87 435,91" fill="#e0af68"/>
  <text x="425" y="78" text-anchor="middle" font-family="SF Mono, monospace" font-size="6" fill="#e0af68">fix</text>

  <!-- Layer 3 -->
  <rect x="450" y="60" width="160" height="55" rx="8" fill="url(#nodeFill)" stroke="#f7768e" stroke-width="0.8"/>
  <text x="530" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#f7768e">Relay cleanup fight</text>
  <text x="530" y="95" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#9aa5ce">mDNS vs PeerManager</text>
  <text x="530" y="107" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#565f89">killing each other</text>

  <!-- Arrow -->
  <line x1="615" y1="87" x2="645" y2="87" stroke="#e0af68" stroke-width="1.5"/>
  <polygon points="645,83 655,87 645,91" fill="#e0af68"/>
  <text x="635" y="78" text-anchor="middle" font-family="SF Mono, monospace" font-size="6" fill="#e0af68">fix</text>

  <!-- Layer 4 -->
  <rect x="660" y="60" width="110" height="55" rx="8" fill="url(#nodeFill)" stroke="#e0af68" stroke-width="0.8"/>
  <text x="715" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e0af68">VPN blind spot</text>
  <text x="715" y="95" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#9aa5ce">tunnel invisible</text>
  <text x="715" y="107" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#565f89">to monitor</text>

  <!-- Second row: deeper layers -->
  <!-- Layer 5 -->
  <rect x="30" y="135" width="160" height="55" rx="8" fill="url(#nodeFill)" stroke="#e0af68" stroke-width="0.8"/>
  <text x="110" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e0af68">Dial cache poisoning</text>
  <text x="110" y="170" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#9aa5ce">shared hashmap caches</text>
  <text x="110" y="182" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#565f89">stale errors</text>

  <line x1="195" y1="162" x2="225" y2="162" stroke="#e0af68" stroke-width="1.5"/>
  <polygon points="225,158 235,162 225,166" fill="#e0af68"/>
  <text x="215" y="153" text-anchor="middle" font-family="SF Mono, monospace" font-size="6" fill="#e0af68">fix</text>

  <!-- Layer 6 -->
  <rect x="240" y="135" width="160" height="55" rx="8" fill="url(#nodeFill)" stroke="#e0af68" stroke-width="0.8"/>
  <text x="320" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e0af68">Gateway invisible</text>
  <text x="320" y="170" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#9aa5ce">CGNAT-to-CGNAT</text>
  <text x="320" y="182" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#565f89">no event fired</text>

  <line x1="405" y1="162" x2="435" y2="162" stroke="#e0af68" stroke-width="1.5"/>
  <polygon points="435,158 445,162 435,166" fill="#e0af68"/>
  <text x="425" y="153" text-anchor="middle" font-family="SF Mono, monospace" font-size="6" fill="#e0af68">fix</text>

  <!-- Layer 7 -->
  <rect x="450" y="135" width="160" height="55" rx="8" fill="url(#nodeFill)" stroke="#e0af68" stroke-width="0.8"/>
  <text x="530" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e0af68">Relay reconnect slow</text>
  <text x="530" y="170" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#9aa5ce">30s+ to re-establish</text>
  <text x="530" y="182" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#565f89">wrong defaults</text>

  <line x1="615" y1="162" x2="645" y2="162" stroke="#9ece6a" stroke-width="1.5"/>
  <polygon points="645,158 655,162 645,166" fill="#9ece6a"/>
  <text x="635" y="153" text-anchor="middle" font-family="SF Mono, monospace" font-size="6" fill="#9ece6a">fix</text>

  <!-- Final: all fixed -->
  <rect x="660" y="135" width="110" height="55" rx="8" fill="url(#nodeFill)" stroke="#9ece6a" stroke-width="1"/>
  <text x="715" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#9ece6a">All clear</text>
  <text x="715" y="170" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#9aa5ce">11 root causes</text>
  <text x="715" y="182" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#9ece6a">all fixed</text>

  <!-- Bottom note -->
  <rect x="30" y="210" width="740" height="55" rx="8" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.3"/>
  <text x="400" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c0caf5">You can't plan this upfront. Each fix changes the system's behavior enough</text>
  <text x="400" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c0caf5">to expose the next problem. The only way through is physical testing.</text>
</svg>

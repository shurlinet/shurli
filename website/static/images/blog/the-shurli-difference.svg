<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgSD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bgSD)"/>

  <!-- Top banner -->
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#c0caf5" font-weight="700">Your Devices. Direct. No Middleman.</text>
  <text x="600" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#565f89">One binary. Zero cloud accounts. Your network, your rules.</text>

  <!-- Left: Cloud way (dim) -->
  <rect x="80" y="130" width="460" height="320" rx="16" fill="#1e1d20" stroke="#565f89" stroke-width="1" opacity="0.5"/>
  <text x="310" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#565f89" font-weight="600">The usual way</text>

  <!-- Central server -->
  <rect x="275" y="200" width="70" height="50" rx="6" fill="#2a282c" stroke="#565f89" stroke-width="1.5" opacity="0.6"/>
  <circle cx="296" cy="218" r="3" fill="#565f89" opacity="0.4"/>
  <circle cx="310" cy="218" r="3" fill="#565f89" opacity="0.4"/>
  <circle cx="324" cy="218" r="3" fill="#565f89" opacity="0.4"/>
  <text x="310" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#565f89" opacity="0.5">their server</text>

  <!-- Tethered devices -->
  <circle cx="170" cy="290" r="16" fill="none" stroke="#565f89" stroke-width="1" opacity="0.4"/>
  <line x1="186" y1="284" x2="275" y2="240" stroke="#565f89" stroke-width="1" opacity="0.2" stroke-dasharray="4,3"/>
  <circle cx="450" cy="290" r="16" fill="none" stroke="#565f89" stroke-width="1" opacity="0.4"/>
  <line x1="434" y1="284" x2="345" y2="240" stroke="#565f89" stroke-width="1" opacity="0.2" stroke-dasharray="4,3"/>
  <circle cx="210" cy="370" r="16" fill="none" stroke="#565f89" stroke-width="1" opacity="0.4"/>
  <line x1="222" y1="358" x2="285" y2="250" stroke="#565f89" stroke-width="1" opacity="0.2" stroke-dasharray="4,3"/>
  <circle cx="410" cy="370" r="16" fill="none" stroke="#565f89" stroke-width="1" opacity="0.4"/>
  <line x1="398" y1="358" x2="335" y2="250" stroke="#565f89" stroke-width="1" opacity="0.2" stroke-dasharray="4,3"/>

  <text x="310" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#f7768e" opacity="0.5">Account required</text>

  <!-- Right: Shurli way (green) -->
  <rect x="660" y="130" width="460" height="320" rx="16" fill="#1e1d20" stroke="#9ece6a" stroke-width="1.5" opacity="0.7"/>
  <text x="890" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#9ece6a" font-weight="600">The Shurli way</text>

  <!-- Mesh-connected devices -->
  <circle cx="790" cy="250" r="18" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.6"/>
  <circle cx="790" cy="250" r="6" fill="#9ece6a" opacity="0.3"/>
  <circle cx="990" cy="250" r="18" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.6"/>
  <circle cx="990" cy="250" r="6" fill="#9ece6a" opacity="0.3"/>
  <circle cx="830" cy="360" r="18" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.6"/>
  <circle cx="830" cy="360" r="6" fill="#9ece6a" opacity="0.3"/>
  <circle cx="950" cy="360" r="18" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.6"/>
  <circle cx="950" cy="360" r="6" fill="#9ece6a" opacity="0.3"/>

  <!-- Direct connections -->
  <line x1="808" y1="250" x2="972" y2="250" stroke="#9ece6a" stroke-width="1.5" opacity="0.3"/>
  <line x1="800" y1="265" x2="822" y2="345" stroke="#9ece6a" stroke-width="1.5" opacity="0.3"/>
  <line x1="800" y1="265" x2="940" y2="350" stroke="#9ece6a" stroke-width="1.5" opacity="0.2"/>
  <line x1="980" y1="265" x2="958" y2="345" stroke="#9ece6a" stroke-width="1.5" opacity="0.3"/>
  <line x1="980" y1="265" x2="840" y2="350" stroke="#9ece6a" stroke-width="1.5" opacity="0.2"/>
  <line x1="848" y1="360" x2="932" y2="360" stroke="#9ece6a" stroke-width="1.5" opacity="0.3"/>

  <text x="890" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#9ece6a" opacity="0.6">No account. No middleman. Direct.</text>

  <!-- Bottom -->
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#c0caf5" font-weight="600">NAT traversal, encryption, authentication, file transfer</text>
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#c0caf5" font-weight="600">All built in. Nothing to sign up for.</text>
</svg>

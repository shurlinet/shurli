<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bgE)"/>

  <!-- Metaphor: three doors that opened - health check, automation, status -->
  <!-- Door 1: Health Check -->
  <g opacity="0.8">
    <rect x="180" y="80" width="200" height="200" rx="10" fill="#00d4aa" fill-opacity="0.04" stroke="#00d4aa" stroke-width="1.5"/>
    <!-- Heart/pulse icon -->
    <path d="M280,140 L250,140 L240,120 L230,155 L220,130 L210,140 L190,140" stroke="#00d4aa" stroke-width="2" fill="none" opacity="0.5"/>
    <text x="280" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#00d4aa">Health Check</text>
    <text x="280" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Is everything running?</text>
    <text x="280" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">One command tells you.</text>
  </g>

  <!-- Door 2: Automation -->
  <g opacity="0.8">
    <rect x="500" y="80" width="200" height="200" rx="10" fill="#ffb347" fill-opacity="0.04" stroke="#ffb347" stroke-width="1.5"/>
    <!-- Gear icon -->
    <circle cx="600" cy="135" r="20" stroke="#ffb347" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="600" cy="135" r="8" stroke="#ffb347" stroke-width="1" fill="none" opacity="0.3"/>
    <line x1="600" y1="113" x2="600" y2="109" stroke="#ffb347" stroke-width="2" opacity="0.3"/>
    <line x1="600" y1="157" x2="600" y2="161" stroke="#ffb347" stroke-width="2" opacity="0.3"/>
    <line x1="578" y1="135" x2="574" y2="135" stroke="#ffb347" stroke-width="2" opacity="0.3"/>
    <line x1="622" y1="135" x2="626" y2="135" stroke="#ffb347" stroke-width="2" opacity="0.3"/>
    <text x="600" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffb347">Automation</text>
    <text x="600" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">No screen needed.</text>
    <text x="600" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Scripts and containers just work.</text>
  </g>

  <!-- Door 3: Status at a Glance -->
  <g opacity="0.8">
    <rect x="820" y="80" width="200" height="200" rx="10" fill="#4488ff" fill-opacity="0.04" stroke="#4488ff" stroke-width="1.5"/>
    <!-- Eye icon -->
    <ellipse cx="920" cy="135" rx="25" ry="15" stroke="#4488ff" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="920" cy="135" r="8" fill="#4488ff" fill-opacity="0.2" stroke="#4488ff" stroke-width="1"/>
    <circle cx="920" cy="135" r="3" fill="#4488ff" opacity="0.4"/>
    <text x="920" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#4488ff">Status at a Glance</text>
    <text x="920" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">Version, peers, services,</text>
    <text x="920" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#888">config - instant answers.</text>
  </g>

  <!-- Bottom message -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#e0e0e0">New Capabilities, Zero Complexity</text>
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#888">Know what's happening. Automate without a GUI. Check status instantly.</text>
</svg>

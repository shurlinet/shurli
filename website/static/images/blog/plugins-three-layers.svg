<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes pulseGlow { 0%, 100% { stroke-opacity: 0.4; } 50% { stroke-opacity: 1; } }
      @keyframes dashFlow { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
      .header { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #999; text-anchor: middle; letter-spacing: 1px; text-transform: uppercase; }
      .layer-name { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 600; text-anchor: middle; }
      .layer-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #bbb; text-anchor: middle; }
      .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; text-anchor: middle; }
      .f1 { animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
      .f2 { animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.7s; opacity: 0; }
      .f3 { animation: fadeIn 0.6s ease-out forwards; animation-delay: 1.2s; opacity: 0; }
      .glow1 { animation: pulseGlow 3s ease-in-out infinite; }
      .glow2 { animation: pulseGlow 3s ease-in-out infinite; animation-delay: 1s; }
      .glow3 { animation: pulseGlow 3s ease-in-out infinite; animation-delay: 2s; }
      .interface-line { stroke-dasharray: 6 4; animation: dashFlow 2s linear infinite; }
    </style>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Layer 1: Compiled Go (bottom, solid) -->
  <g class="f1">
    <rect x="150" y="270" width="500" height="90" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2" class="glow1"/>
    <text x="400" y="300" class="layer-name" fill="#00d4aa">Layer 1: Compiled Go</text>
    <text x="400" y="318" class="layer-desc">Official plugins. Full Go capabilities. Ships today.</text>
    <text x="400" y="340" class="mono" fill="#00d4aa" opacity="0.5">shurli.io/official/filetransfer</text>
    <!-- Status badge -->
    <rect x="570" y="282" width="55" height="20" rx="4" fill="#00d4aa" opacity="0.15"/>
    <text x="597" y="296" font-family="system-ui" font-size="10" fill="#00d4aa" text-anchor="middle" font-weight="600">SHIPPED</text>
  </g>

  <!-- Layer 2: WASM (middle, sandboxed) -->
  <g class="f2">
    <rect x="150" y="160" width="500" height="90" rx="10" fill="#1a1a2e" stroke="#ffb347" stroke-width="2" class="glow2"/>
    <text x="400" y="190" class="layer-name" fill="#ffb347">Layer 2: WebAssembly Sandbox</text>
    <text x="400" y="208" class="layer-desc">Any language. Memory isolated. Fuel metered. wazero runtime.</text>
    <text x="400" y="230" class="mono" fill="#ffb347" opacity="0.5">community/wake-on-lan.wasm</text>
    <!-- Status badge -->
    <rect x="570" y="172" width="55" height="20" rx="4" fill="#ffb347" opacity="0.15"/>
    <text x="597" y="186" font-family="system-ui" font-size="10" fill="#ffb347" text-anchor="middle" font-weight="600">NEXT</text>
  </g>

  <!-- Layer 3: AI-generated (top, generated) -->
  <g class="f3">
    <rect x="150" y="50" width="500" height="90" rx="10" fill="#1a1a2e" stroke="#4488ff" stroke-width="2" class="glow3"/>
    <text x="400" y="80" class="layer-name" fill="#4488ff">Layer 3: AI-Generated Plugins</text>
    <text x="400" y="98" class="layer-desc">Skills.md to WASM. Agent reads description, generates code, deploys.</text>
    <text x="400" y="120" class="mono" fill="#4488ff" opacity="0.5">agent/backup-scheduler.wasm</text>
    <!-- Status badge -->
    <rect x="570" y="62" width="55" height="20" rx="4" fill="#4488ff" opacity="0.15"/>
    <text x="597" y="76" font-family="system-ui" font-size="10" fill="#4488ff" text-anchor="middle" font-weight="600">VISION</text>
  </g>

  <!-- Plugin Interface thread running through all three -->
  <line x1="100" y1="95" x2="100" y2="315" class="interface-line" stroke="#e0e0e0" stroke-width="2" opacity="0.4"/>
  <text x="100" y="385" font-family="system-ui" font-size="11" fill="#e0e0e0" text-anchor="middle" opacity="0.6">Same Plugin</text>
  <text x="100" y="400" font-family="system-ui" font-size="11" fill="#e0e0e0" text-anchor="middle" opacity="0.6">Interface</text>

  <!-- Small arrows connecting the line to each layer -->
  <line x1="100" y1="95" x2="148" y2="95" stroke="#e0e0e0" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="205" x2="148" y2="205" stroke="#e0e0e0" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="315" x2="148" y2="315" stroke="#e0e0e0" stroke-width="1" opacity="0.3"/>
</svg>

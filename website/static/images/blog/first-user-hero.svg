<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
    <linearGradient id="nzGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ece6a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#9ece6a;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="auGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbb040;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#fbb040;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="300" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#c0caf5">Two Countries. One Connection.</text>
  <text x="400" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#565f89">Shurli's first connection between independent users</text>

  <!-- NZ circle with glow -->
  <circle cx="180" cy="155" r="70" fill="url(#nzGlow)"/>
  <circle cx="180" cy="155" r="50" fill="none" stroke="#9ece6a" stroke-width="1.5"/>
  <text x="180" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#9ece6a">NZ</text>
  <text x="180" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a9b1d6">New Zealand</text>

  <!-- AU circle with glow -->
  <circle cx="620" cy="155" r="70" fill="url(#auGlow)"/>
  <circle cx="620" cy="155" r="50" fill="none" stroke="#fbb040" stroke-width="1.5"/>
  <text x="620" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#fbb040">AU</text>
  <text x="620" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a9b1d6">Australia</text>

  <!-- Relay dot in the middle -->
  <circle cx="400" cy="155" r="18" fill="none" stroke="#bb9af7" stroke-width="1.2"/>
  <circle cx="400" cy="155" r="4" fill="#bb9af7"/>
  <text x="400" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#bb9af7">Relay</text>

  <!-- Connection arcs - NZ to Relay -->
  <path d="M 230 155 Q 315 120 382 155" fill="none" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Relay to AU -->
  <path d="M 418 155 Q 500 120 570 155" fill="none" stroke="#fbb040" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Stats at bottom -->
  <text x="260" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#9ece6a">72ms</text>
  <text x="260" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a9b1d6">Average latency</text>

  <text x="400" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#bb9af7">0%</text>
  <text x="400" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a9b1d6">Packet loss</text>

  <text x="540" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#fbb040">&#x2713;</text>
  <text x="540" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a9b1d6">Files, services, verified</text>

  <!-- Bottom tagline -->
  <text x="400" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#565f89">Both behind NAT. No direct connection possible. Connected through Shurli's relay.</text>
</svg>

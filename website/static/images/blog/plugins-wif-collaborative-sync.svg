<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes dashFlowReverse { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 12; } }
      @keyframes editPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
      .flow { stroke-dasharray: 6 4; animation: dashFlow 1.5s linear infinite; }
      .flowBack { stroke-dasharray: 6 4; animation: dashFlowReverse 1.5s linear infinite; }
      .edit { animation: editPulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Peer A (left) -->
  <g transform="translate(40, 25)">
    <rect x="0" y="0" width="160" height="75" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5"/>
    <text x="80" y="20" font-family="system-ui" font-size="11" fill="#4488ff" text-anchor="middle" font-weight="600">Peer A</text>
    <text x="80" y="38" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">editing document</text>
    <rect x="25" y="48" width="110" height="16" rx="3" fill="#1a1a2e" stroke="#4488ff" stroke-width="0.5" class="edit"/>
    <text x="80" y="60" font-family="'SF Mono', monospace" font-size="7" fill="#4488ff" text-anchor="middle">paragraph updated</text>
  </g>

  <!-- Bidirectional arrows -->
  <line x1="205" y1="52" x2="298" y2="52" class="flow" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="298" y1="62" x2="205" y2="62" class="flowBack" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>

  <!-- CRDT sync (center) -->
  <g transform="translate(305, 20)">
    <rect x="0" y="0" width="170" height="85" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2"/>
    <text x="85" y="22" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">Sync Protocol</text>
    <line x1="15" y1="30" x2="155" y2="30" stroke="#00d4aa" stroke-width="0.5" opacity="0.3"/>
    <text x="85" y="48" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">CRDT conflict resolution</text>
    <text x="85" y="62" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">real-time merge</text>
    <text x="85" y="78" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">no cloud mediator</text>
  </g>

  <!-- Bidirectional arrows right -->
  <line x1="480" y1="52" x2="573" y2="52" class="flow" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
  <line x1="573" y1="62" x2="480" y2="62" class="flowBack" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Peer B (right) -->
  <g transform="translate(580, 25)">
    <rect x="0" y="0" width="160" height="75" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="80" y="20" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">Peer B</text>
    <text x="80" y="38" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">editing same document</text>
    <rect x="25" y="48" width="110" height="16" rx="3" fill="#1a1a2e" stroke="#00d4aa" stroke-width="0.5" class="edit"/>
    <text x="80" y="60" font-family="'SF Mono', monospace" font-size="7" fill="#00d4aa" text-anchor="middle">heading changed</text>
  </g>

  <text x="400" y="145" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">Both peers edit simultaneously. Conflicts resolve automatically. No server in between.</text>

  <g transform="translate(300, 160)">
    <rect x="0" y="0" width="180" height="24" rx="5" fill="#1a1a2e" stroke="#ffb347" stroke-width="1" opacity="0.6"/>
    <text x="90" y="16" font-family="system-ui" font-size="9" fill="#ffb347" text-anchor="middle">Collaborative Sync Plugin</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgCH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bgCH)"/>

  <!-- Left: Calm connection (before chaos) -->
  <circle cx="200" cy="160" r="35" fill="#1e1d20" stroke="#9ece6a" stroke-width="2"/>
  <circle cx="200" cy="160" r="12" fill="#9ece6a" opacity="0.3"/>
  <text x="200" y="215" font-family="system-ui, sans-serif" font-size="12" fill="#9ece6a" text-anchor="middle">Connected</text>

  <!-- Smooth line to center -->
  <line x1="240" y1="160" x2="400" y2="160" stroke="#9ece6a" stroke-width="2" opacity="0.5"/>

  <!-- Center: Storm zone -->
  <rect x="400" y="60" width="400" height="260" rx="20" fill="#1e1d20" stroke="#f7768e" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>

  <!-- Lightning bolts -->
  <path d="M 500 90 L 490 140 L 510 140 L 495 190" fill="none" stroke="#f7768e" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 600 80 L 585 130 L 605 130 L 590 180" fill="none" stroke="#e0af68" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 700 95 L 690 145 L 710 145 L 695 195" fill="none" stroke="#f7768e" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Disruption labels -->
  <rect x="440" y="210" width="130" height="26" rx="6" fill="#f7768e" fill-opacity="0.1" stroke="#f7768e" stroke-width="1" opacity="0.4"/>
  <text x="505" y="228" font-family="system-ui, sans-serif" font-size="11" fill="#f7768e" text-anchor="middle" opacity="0.7">WiFi drops</text>

  <rect x="440" y="248" width="130" height="26" rx="6" fill="#e0af68" fill-opacity="0.1" stroke="#e0af68" stroke-width="1" opacity="0.4"/>
  <text x="505" y="266" font-family="system-ui, sans-serif" font-size="11" fill="#e0af68" text-anchor="middle" opacity="0.7">VPN connects</text>

  <rect x="440" y="286" width="130" height="26" rx="6" fill="#f7768e" fill-opacity="0.1" stroke="#f7768e" stroke-width="1" opacity="0.4"/>
  <text x="505" y="304" font-family="system-ui, sans-serif" font-size="11" fill="#f7768e" text-anchor="middle" opacity="0.7">Cable unplugged</text>

  <rect x="625" y="210" width="145" height="26" rx="6" fill="#e0af68" fill-opacity="0.1" stroke="#e0af68" stroke-width="1" opacity="0.4"/>
  <text x="698" y="228" font-family="system-ui, sans-serif" font-size="11" fill="#e0af68" text-anchor="middle" opacity="0.7">Network changes</text>

  <rect x="625" y="248" width="145" height="26" rx="6" fill="#f7768e" fill-opacity="0.1" stroke="#f7768e" stroke-width="1" opacity="0.4"/>
  <text x="698" y="266" font-family="system-ui, sans-serif" font-size="11" fill="#f7768e" text-anchor="middle" opacity="0.7">Carrier switches</text>

  <!-- Storm label -->
  <text x="600" y="340" font-family="system-ui, sans-serif" font-size="14" fill="#f7768e" text-anchor="middle" font-weight="600" opacity="0.6">We tried 16 ways to break it</text>

  <!-- Emerging line from storm -->
  <line x1="800" y1="160" x2="960" y2="160" stroke="#9ece6a" stroke-width="2" opacity="0.5"/>

  <!-- Right: Still connected (after chaos) -->
  <circle cx="1000" cy="160" r="35" fill="#1e1d20" stroke="#9ece6a" stroke-width="2"/>
  <!-- Checkmark inside -->
  <polyline points="988,160 996,172 1014,148" fill="none" stroke="#9ece6a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1000" y="215" font-family="system-ui, sans-serif" font-size="12" fill="#9ece6a" text-anchor="middle">Still connected</text>

  <!-- Bottom tagline -->
  <text x="600" y="380" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5" text-anchor="middle" font-weight="600">We broke everything on purpose. It kept working.</text>
</svg>

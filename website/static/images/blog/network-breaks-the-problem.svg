<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes dropDead { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.15; } }
    @keyframes restartPulse { 0%, 100% { fill-opacity: 0.06; stroke-opacity: 0.5; } 50% { fill-opacity: 0.18; stroke-opacity: 1; } }
    @keyframes xPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    .f1 { animation: fadeIn 0.6s ease-out 0.3s both; }
    .f2 { animation: fadeIn 0.6s ease-out 0.7s both; }
    .f3 { animation: fadeIn 0.6s ease-out 1.1s both; }
    .f4 { animation: fadeIn 0.6s ease-out 1.5s both; }
    .f5 { animation: fadeIn 0.6s ease-out 1.9s both; }
    .drop1 { animation: dropDead 3s ease-in-out infinite; }
    .drop2 { animation: dropDead 3s ease-in-out infinite 1s; }
    .drop3 { animation: dropDead 3s ease-in-out infinite 2s; }
    .restart { animation: restartPulse 2.5s ease-in-out infinite; }
    .xp { animation: xPulse 2s ease-in-out infinite 0.5s; }
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="800" height="400" fill="#0a0a1a"/>
  <text x="400" y="32" text-anchor="middle" font-size="15" fill="#666" letter-spacing="1">WHAT USUALLY HAPPENS</text>

  <!-- Scene 1: Home WiFi - connected (centered at x=130) -->
  <g class="f1">
    <rect x="30" y="55" width="200" height="145" rx="10" stroke="#00d4aa" stroke-width="1.5" fill="#00d4aa" fill-opacity="0.04"/>
    <text x="130" y="82" text-anchor="middle" font-size="13" fill="#00d4aa" font-weight="600">Home WiFi</text>
    <path d="M104,108 A36,36 0 0,1 156,108" stroke="#00d4aa" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M111,116 A24,24 0 0,1 149,116" stroke="#00d4aa" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M118,123 A14,14 0 0,1 142,123" stroke="#00d4aa" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="130" cy="130" r="4" fill="#00d4aa"/>
    <text x="130" y="170" text-anchor="middle" font-size="12" fill="#00d4aa" opacity="0.7">connected</text>
  </g>

  <!-- Arrow 1 -->
  <g class="f2" opacity="0.4">
    <line x1="238" y1="127" x2="276" y2="127" stroke="#888" stroke-width="1.5"/>
    <polygon points="272,123 282,127 272,131" fill="#888"/>
    <text x="260" y="117" text-anchor="middle" font-size="10" fill="#888">switch</text>
  </g>

  <!-- Scene 2: Coffee shop - dying (centered at x=400) -->
  <g class="f2">
    <rect x="290" y="55" width="220" height="145" rx="10" stroke="#ffb347" stroke-width="1.5" fill="#ffb347" fill-opacity="0.04"/>
    <text x="400" y="82" text-anchor="middle" font-size="13" fill="#ffb347" font-weight="600">Coffee Shop</text>
    <path d="M374,108 A36,36 0 0,1 426,108" stroke="#ffb347" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3" class="drop1"/>
    <path d="M381,116 A24,24 0 0,1 419,116" stroke="#ffb347" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2" class="drop1"/>
    <path d="M388,123 A14,14 0 0,1 412,123" stroke="#ffb347" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.15" class="drop1"/>
    <circle cx="400" cy="130" r="4" fill="#ffb347" class="drop1"/>
    <text x="400" y="170" text-anchor="middle" font-size="12" fill="#ff6b6b" opacity="0.7">dropped</text>
  </g>

  <!-- Arrow 2 -->
  <g class="f3" opacity="0.4">
    <line x1="518" y1="127" x2="556" y2="127" stroke="#888" stroke-width="1.5"/>
    <polygon points="552,123 562,127 552,131" fill="#888"/>
    <text x="540" y="117" text-anchor="middle" font-size="10" fill="#888">tether</text>
  </g>

  <!-- Scene 3: Phone hotspot - dead (centered at x=670) -->
  <g class="f3">
    <rect x="570" y="55" width="200" height="145" rx="10" stroke="#ff6b6b" stroke-width="1.5" fill="#ff6b6b" fill-opacity="0.04"/>
    <text x="670" y="82" text-anchor="middle" font-size="13" fill="#ff6b6b" font-weight="600">Phone Hotspot</text>
    <rect x="652" y="113" width="4" height="12" rx="1" fill="#ff6b6b" opacity="0.2" class="drop2"/>
    <rect x="660" y="108" width="4" height="17" rx="1" fill="#ff6b6b" opacity="0.15" class="drop2"/>
    <rect x="668" y="103" width="4" height="22" rx="1" fill="#ff6b6b" opacity="0.1" class="drop3"/>
    <rect x="676" y="98" width="4" height="27" rx="1" fill="#ff6b6b" opacity="0.05"/>
    <!-- X mark -->
    <g class="xp">
      <line x1="661" y1="135" x2="673" y2="147" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="673" y1="135" x2="661" y2="147" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="670" y="175" text-anchor="middle" font-size="12" fill="#ff6b6b" opacity="0.7">dead</text>
  </g>

  <!-- The dreaded restart box -->
  <g class="f4">
    <rect x="280" y="245" width="240" height="55" rx="12" stroke="#ff6b6b" stroke-width="2" fill="#ff6b6b" class="restart"/>
    <text x="400" y="269" text-anchor="middle" font-size="15" fill="#ff6b6b" font-weight="600">restart the app</text>
    <text x="400" y="287" text-anchor="middle" font-size="12" fill="#888">...and hope it reconnects</text>
  </g>

  <!-- Arrows from all scenes to restart -->
  <g class="f4" opacity="0.2">
    <line x1="130" y1="205" x2="310" y2="250" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="400" y1="205" x2="400" y2="245" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="670" y1="205" x2="490" y2="250" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Bottom text -->
  <g class="f5">
    <text x="400" y="340" text-anchor="middle" font-size="14" fill="#888">Every network switch. Same story.</text>
    <text x="400" y="365" text-anchor="middle" font-size="13" fill="#ff6b6b" opacity="0.5">Most tools give up and wait for you to fix it.</text>
  </g>
</svg>
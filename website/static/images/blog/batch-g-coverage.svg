<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bgG)"/>

  <!-- Shield visual - centered, proper proportions (taller than wide) -->
  <path d="M600,40 L740,90 L740,220 C740,310 600,360 600,360 C600,360 460,310 460,220 L460,90 Z"
        fill="none" stroke="#9ece6a" stroke-width="2.5" opacity="0.7"/>
  <path d="M600,58 L724,104 L724,218 C724,298 600,344 600,344 C600,344 476,298 476,218 L476,104 Z"
        fill="#9ece6a" opacity="0.06"/>

  <!-- Checkmark inside shield -->
  <polyline points="560,200 588,232 645,168" fill="none" stroke="#9ece6a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Left side: coverage bars -->
  <rect x="80" y="100" width="280" height="16" rx="8" fill="#1e2030"/>
  <rect x="80" y="100" width="235" height="16" rx="8" fill="#9ece6a" opacity="0.4"/>
  <text x="80" y="92" font-family="system-ui, sans-serif" font-size="12" fill="#9ece6a" opacity="0.7">Tested</text>

  <rect x="80" y="145" width="280" height="16" rx="8" fill="#1e2030"/>
  <rect x="80" y="145" width="200" height="16" rx="8" fill="#bb9af7" opacity="0.4"/>
  <text x="80" y="137" font-family="system-ui, sans-serif" font-size="12" fill="#bb9af7" opacity="0.7">Audited</text>

  <rect x="80" y="190" width="280" height="16" rx="8" fill="#1e2030"/>
  <rect x="80" y="190" width="250" height="16" rx="8" fill="#7aa2f7" opacity="0.4"/>
  <text x="80" y="182" font-family="system-ui, sans-serif" font-size="12" fill="#7aa2f7" opacity="0.7">Hardened</text>

  <!-- Right side: key stats -->
  <rect x="860" y="90" width="260" height="60" rx="10" fill="#1e1d20" stroke="#9ece6a" stroke-width="1" opacity="0.7"/>
  <text x="990" y="118" font-family="system-ui, sans-serif" font-size="26" fill="#9ece6a" text-anchor="middle" font-weight="700">80%</text>
  <text x="990" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#565f89" text-anchor="middle">code covered by tests</text>

  <rect x="860" y="170" width="260" height="60" rx="10" fill="#1e1d20" stroke="#bb9af7" stroke-width="1" opacity="0.7"/>
  <text x="990" y="198" font-family="system-ui, sans-serif" font-size="26" fill="#bb9af7" text-anchor="middle" font-weight="700">28</text>
  <text x="990" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#565f89" text-anchor="middle">architecture decisions recorded</text>

  <rect x="860" y="250" width="260" height="60" rx="10" fill="#1e1d20" stroke="#e0af68" stroke-width="1" opacity="0.7"/>
  <text x="990" y="278" font-family="system-ui, sans-serif" font-size="26" fill="#e0af68" text-anchor="middle" font-weight="700">10</text>
  <text x="990" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#565f89" text-anchor="middle">security issues found and fixed</text>

  <!-- Bottom label -->
  <text x="600" y="390" font-family="system-ui, sans-serif" font-size="13" fill="#565f89" text-anchor="middle">Every component tested, every decision documented, every vulnerability closed</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="bgP8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bgP8)"/>

  <!-- Metaphor: one seed phrase generates everything, admin controls relay remotely -->

  <!-- Seed phrase (center top) -->
  <g opacity="0.9">
    <rect x="300" y="40" width="300" height="50" rx="10" fill="#00d4aa" fill-opacity="0.08" stroke="#00d4aa" stroke-width="2"/>
    <text x="450" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#00d4aa" opacity="0.6">24 words</text>
    <text x="450" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888">one seed backs up everything</text>
  </g>

  <!-- Three branches from seed -->
  <!-- Branch 1: Identity -->
  <line x1="370" y1="90" x2="200" y2="160" stroke="#00d4aa" stroke-width="1.5" opacity="0.3"/>
  <g opacity="0.7">
    <circle cx="200" cy="190" r="40" stroke="#00d4aa" stroke-width="1.5" fill="#00d4aa" fill-opacity="0.05"/>
    <!-- Person icon -->
    <circle cx="200" cy="178" r="10" fill="#00d4aa" opacity="0.3"/>
    <path d="M182,200 Q200,212 218,200" stroke="#00d4aa" stroke-width="1.5" fill="none" opacity="0.2"/>
    <text x="200" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#00d4aa">Your Identity</text>
    <text x="200" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888">encrypted at rest</text>
  </g>

  <!-- Branch 2: Security Keys -->
  <line x1="450" y1="90" x2="450" y2="155" stroke="#ffb347" stroke-width="1.5" opacity="0.3"/>
  <g opacity="0.7">
    <circle cx="450" cy="190" r="40" stroke="#ffb347" stroke-width="1.5" fill="#ffb347" fill-opacity="0.05"/>
    <!-- Shield icon -->
    <path d="M460,175 L460,195 C460,205 450,210 450,210 C450,210 440,205 440,195 L440,175 L450,168 L460,175 Z" stroke="#ffb347" stroke-width="1.5" fill="none" opacity="0.3"/>
    <text x="450" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffb347">Security Keys</text>
    <text x="450" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888">vault, privacy proofs</text>
  </g>

  <!-- Branch 3: Recovery -->
  <line x1="530" y1="90" x2="700" y2="160" stroke="#4488ff" stroke-width="1.5" opacity="0.3"/>
  <g opacity="0.7">
    <circle cx="700" cy="190" r="40" stroke="#4488ff" stroke-width="1.5" fill="#4488ff" fill-opacity="0.05"/>
    <!-- Refresh/recovery icon -->
    <path d="M690,180 A12,12 0 1,1 710,180" stroke="#4488ff" stroke-width="2" fill="none" opacity="0.3"/>
    <polygon points="710,176 714,183 707,183" fill="#4488ff" opacity="0.3"/>
    <text x="700" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#4488ff">Recovery</text>
    <text x="700" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888">restore from 24 words</text>
  </g>

  <!-- Bottom section: Remote admin -->
  <g opacity="0.6">
    <rect x="200" y="290" width="500" height="60" rx="10" fill="#9966ff" fill-opacity="0.04" stroke="#9966ff" stroke-width="1"/>
    <!-- Laptop icon -->
    <rect x="240" y="305" width="40" height="28" rx="3" stroke="#9966ff" stroke-width="1.5" fill="none" opacity="0.4"/>
    <rect x="235" y="333" width="50" height="4" rx="2" fill="#9966ff" opacity="0.3"/>
    <text x="320" y="315" font-family="system-ui, sans-serif" font-size="13" fill="#9966ff" font-weight="500">Admin from anywhere</text>
    <text x="320" y="335" font-family="system-ui, sans-serif" font-size="12" fill="#888">Manage your relay remotely over encrypted P2P. No SSH needed.</text>
  </g>

  <!-- Bottom message -->
  <text x="450" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#e0e0e0">One Seed Phrase. Full Control.</text>
</svg>

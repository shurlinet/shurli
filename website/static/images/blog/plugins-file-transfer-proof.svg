<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes boxGlow { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      .header { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #999; text-anchor: middle; letter-spacing: 1px; text-transform: uppercase; }
      .stat-num { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 28px; font-weight: 700; text-anchor: middle; }
      .stat-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #bbb; text-anchor: middle; }
      .feature { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #e0e0e0; }
      .feature-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #bbb; }
      .glow { animation: boxGlow 3s ease-in-out infinite; }
      .g1 { animation-delay: 0s; }
      .g2 { animation-delay: 0.5s; }
      .g3 { animation-delay: 1s; }
      .g4 { animation-delay: 1.5s; }
      .connector { stroke-dasharray: 6 3; animation: dashFlow 2s linear infinite; }
      .f1 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
      .f2 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
      .f3 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    </style>
  </defs>
  <rect width="800" height="470" fill="url(#bg)"/>

  <text x="400" y="28" class="header">file transfer: the reference plugin</text>

  <!-- Central plugin module -->
  <g class="f1" transform="translate(260, 45)">
    <rect x="0" y="0" width="280" height="70" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2" class="glow g1"/>
    <text x="140" y="28" font-family="system-ui" font-size="16" fill="#00d4aa" text-anchor="middle" font-weight="600">File Transfer Plugin</text>
    <text x="140" y="50" font-family="'SF Mono', monospace" font-size="10" fill="#bbb" text-anchor="middle">shurli.io/official/filetransfer v1.0.0</text>
  </g>

  <!-- Connector lines from plugin to stats -->
  <line x1="400" y1="115" x2="400" y2="140" class="connector" stroke="#00d4aa" stroke-width="1.5" opacity="0.3"/>

  <!-- 4 stat boxes -->
  <g class="f2" transform="translate(30, 145)">
    <!-- Commands -->
    <rect x="0" y="0" width="170" height="80" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5" class="glow g1"/>
    <text x="85" y="35" class="stat-num" fill="#00d4aa">9</text>
    <text x="85" y="55" class="stat-label">CLI Commands</text>
    <text x="85" y="70" font-family="'SF Mono', monospace" font-size="9" fill="#999" text-anchor="middle">send, browse, share...</text>
  </g>

  <g class="f2" transform="translate(215, 145)">
    <!-- Routes -->
    <rect x="0" y="0" width="170" height="80" rx="8" fill="#1a1a2e" stroke="#ffb347" stroke-width="1.5" class="glow g2"/>
    <text x="85" y="35" class="stat-num" fill="#ffb347">15</text>
    <text x="85" y="55" class="stat-label">HTTP Routes</text>
    <text x="85" y="70" font-family="'SF Mono', monospace" font-size="9" fill="#999" text-anchor="middle">/v1/send, /v1/shares...</text>
  </g>

  <g class="f2" transform="translate(400, 145)">
    <!-- Protocols -->
    <rect x="0" y="0" width="170" height="80" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5" class="glow g3"/>
    <text x="85" y="35" class="stat-num" fill="#4488ff">4</text>
    <text x="85" y="55" class="stat-label">P2P Protocols</text>
    <text x="85" y="70" font-family="'SF Mono', monospace" font-size="9" fill="#999" text-anchor="middle">transfer, browse, dl...</text>
  </g>

  <g class="f2" transform="translate(585, 145)">
    <!-- Checkpointer -->
    <rect x="0" y="0" width="170" height="80" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5" class="glow g4"/>
    <text x="85" y="28" font-family="system-ui" font-size="14" fill="#00d4aa" text-anchor="middle" font-weight="600">&#10003;</text>
    <text x="85" y="48" class="stat-label">Checkpoint/Restore</text>
    <text x="85" y="63" font-family="'SF Mono', monospace" font-size="9" fill="#999" text-anchor="middle">HMAC-SHA256 verified</text>
  </g>

  <!-- Framework features exercised -->
  <g class="f3" transform="translate(30, 255)">
    <rect x="0" y="0" width="740" height="155" rx="8" fill="#1a1a2e" stroke="#666" stroke-width="1" opacity="0.5"/>
    <text x="370" y="25" font-family="system-ui" font-size="12" fill="#e0e0e0" text-anchor="middle" font-weight="600">Every Framework Feature Exercised</text>

    <g transform="translate(25, 42)">
      <circle cx="6" cy="6" r="4" fill="#00d4aa" opacity="0.6"/>
      <text x="18" y="10" class="feature">Drain mechanism</text>
      <text x="190" y="10" class="feature-desc">25s budget, context cancellation, queue persistence on Stop()</text>
    </g>

    <g transform="translate(25, 64)">
      <circle cx="6" cy="6" r="4" fill="#00d4aa" opacity="0.6"/>
      <text x="18" y="10" class="feature">Hot-reload config</text>
      <text x="190" y="10" class="feature-desc">OnConfigReload callback, settings update without restart</text>
    </g>

    <g transform="translate(25, 86)">
      <circle cx="6" cy="6" r="4" fill="#00d4aa" opacity="0.6"/>
      <text x="18" y="10" class="feature">Auth middleware</text>
      <text x="190" y="10" class="feature-desc">All 15 routes wrapped by daemon auth. Plugin never touches tokens.</text>
    </g>

    <g transform="translate(25, 108)">
      <circle cx="6" cy="6" r="4" fill="#00d4aa" opacity="0.6"/>
      <text x="18" y="10" class="feature">Grant-aware transfers</text>
      <text x="190" y="10" class="feature-desc">Relay budget checks, per-peer bandwidth overrides, time limits</text>
    </g>

    <g transform="translate(25, 130)">
      <circle cx="6" cy="6" r="4" fill="#00d4aa" opacity="0.6"/>
      <text x="18" y="10" class="feature">Physical testing</text>
      <text x="190" y="10" class="feature-desc">Satellite, cellular, wired LAN, 5G hotspot, VPN tunnels</text>
    </g>
  </g>

  <text x="400" y="455" font-family="system-ui" font-size="11" fill="#bbb" text-anchor="middle">Not a demo. A production plugin tested on real hardware across real networks.</text>
</svg>

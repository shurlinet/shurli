<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes crashPulse {
        0%, 70%, 100% { fill: #1a1a2e; stroke: #00d4aa; }
        15% { fill: #2a1a1a; stroke: #ff6b6b; }
        30% { fill: #1a1a2e; stroke: #ffb347; }
        45% { fill: #1a1a2e; stroke: #00d4aa; }
      }
      @keyframes spinRestart {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes dashFlow { 0% { stroke-dashoffset: 16; } 100% { stroke-dashoffset: 0; } }
      .header { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #999; text-anchor: middle; letter-spacing: 1px; text-transform: uppercase; }
      .step-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; }
      .step-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #bbb; }
      .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; }
      .flow-line { stroke-dasharray: 6 3; animation: dashFlow 2s linear infinite; }
      .f1 { animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
      .f2 { animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
      .f3 { animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
      .f4 { animation: fadeIn 0.4s ease-out forwards; animation-delay: 1.1s; opacity: 0; }
      .f5 { animation: fadeIn 0.4s ease-out forwards; animation-delay: 1.4s; opacity: 0; }
      .f6 { animation: fadeIn 0.4s ease-out forwards; animation-delay: 1.7s; opacity: 0; }
      .plugin-box { animation: crashPulse 6s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <text x="400" y="28" class="header">erlang-style crash recovery</text>

  <!-- Supervisor watching the plugin -->
  <g transform="translate(50, 50)">
    <!-- Supervisor box -->
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="2"/>
    <text x="90" y="25" font-family="system-ui" font-size="13" fill="#4488ff" text-anchor="middle" font-weight="600">Supervisor</text>
    <text x="90" y="45" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">watches, recovers, limits</text>

    <!-- Arrow down to plugin -->
    <line x1="90" y1="60" x2="90" y2="90" stroke="#4488ff" stroke-width="1.5" class="flow-line"/>

    <!-- Plugin box (animates crash/recovery) -->
    <rect x="10" y="90" width="160" height="50" rx="8" class="plugin-box" stroke-width="1.5"/>
    <text x="90" y="120" font-family="system-ui" font-size="12" fill="#e0e0e0" text-anchor="middle">Plugin</text>
  </g>

  <!-- Restart flow steps (right side) -->
  <g transform="translate(290, 50)">
    <!-- Step 1: Crash -->
    <g class="f1">
      <circle cx="15" cy="12" r="12" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="1"/>
      <text x="15" y="16" font-family="system-ui" font-size="11" fill="#ff6b6b" text-anchor="middle" font-weight="600">1</text>
      <text x="38" y="10" class="step-label" fill="#ff6b6b">Crash Detected</text>
      <text x="38" y="24" class="step-desc">Panic recovered by framework</text>
    </g>

    <!-- Step 2: Record -->
    <g class="f2" transform="translate(0, 42)">
      <circle cx="15" cy="12" r="12" fill="#ffb347" opacity="0.15" stroke="#ffb347" stroke-width="1"/>
      <text x="15" y="16" font-family="system-ui" font-size="11" fill="#ffb347" text-anchor="middle" font-weight="600">2</text>
      <text x="38" y="10" class="step-label" fill="#ffb347">Record + Assess</text>
      <text x="38" y="24" class="step-desc">3 in 5 min = circuit breaker. 10 total = permanent.</text>
    </g>

    <!-- Step 3: Checkpoint -->
    <g class="f3" transform="translate(0, 84)">
      <circle cx="15" cy="12" r="12" fill="#00d4aa" opacity="0.15" stroke="#00d4aa" stroke-width="1"/>
      <text x="15" y="16" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">3</text>
      <text x="38" y="10" class="step-label" fill="#00d4aa">Checkpoint</text>
      <text x="38" y="24" class="step-desc">Serialize state + HMAC-SHA256 integrity</text>
    </g>

    <!-- Step 4: Backoff -->
    <g class="f4" transform="translate(0, 126)">
      <circle cx="15" cy="12" r="12" fill="#ffb347" opacity="0.15" stroke="#ffb347" stroke-width="1"/>
      <text x="15" y="16" font-family="system-ui" font-size="11" fill="#ffb347" text-anchor="middle" font-weight="600">4</text>
      <text x="38" y="10" class="step-label" fill="#ffb347">Backoff</text>
      <text x="38" y="24" class="step-desc">Exponential + random jitter (0-500ms)</text>
    </g>

    <!-- Step 5: Restart -->
    <g class="f5" transform="translate(0, 168)">
      <circle cx="15" cy="12" r="12" fill="#00d4aa" opacity="0.15" stroke="#00d4aa" stroke-width="1"/>
      <text x="15" y="16" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">5</text>
      <text x="38" y="10" class="step-label" fill="#00d4aa">Restart + Restore</text>
      <text x="38" y="24" class="step-desc">Disable, re-enable, verify HMAC, restore state</text>
    </g>

    <!-- Step 6: Lifetime limit -->
    <g class="f6" transform="translate(0, 210)">
      <circle cx="15" cy="12" r="12" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="1"/>
      <text x="15" y="16" font-family="system-ui" font-size="11" fill="#ff6b6b" text-anchor="middle" font-weight="600">6</text>
      <text x="38" y="10" class="step-label" fill="#ff6b6b">Lifetime Limit</text>
      <text x="38" y="24" class="step-desc">10 total crashes = permanently disabled</text>
    </g>

    <!-- Connecting line through steps -->
    <line x1="15" y1="28" x2="15" y2="224" stroke="#666" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Circuit breaker detail box -->
  <g transform="translate(50, 330)">
    <rect x="0" y="0" width="700" height="75" rx="8" fill="#1a1a2e" stroke="#666" stroke-width="1" opacity="0.5"/>
    <text x="350" y="22" font-family="system-ui" font-size="12" fill="#e0e0e0" text-anchor="middle" font-weight="600">Circuit Breaker Thresholds</text>
    <g transform="translate(30, 38)">
      <rect x="0" y="0" width="180" height="28" rx="4" fill="#00d4aa" opacity="0.1" stroke="#00d4aa" stroke-width="1"/>
      <text x="90" y="18" class="mono" fill="#00d4aa" text-anchor="middle">1-2 crashes: auto-restart</text>
    </g>
    <g transform="translate(230, 38)">
      <rect x="0" y="0" width="200" height="28" rx="4" fill="#ffb347" opacity="0.1" stroke="#ffb347" stroke-width="1"/>
      <text x="100" y="18" class="mono" fill="#ffb347" text-anchor="middle">3 in 5 min: circuit break</text>
    </g>
    <g transform="translate(450, 38)">
      <rect x="0" y="0" width="220" height="28" rx="4" fill="#ff6b6b" opacity="0.1" stroke="#ff6b6b" stroke-width="1"/>
      <text x="110" y="18" class="mono" fill="#ff6b6b" text-anchor="middle">10 total: permanent disable</text>
    </g>
  </g>

  <text x="400" y="435" font-family="system-ui" font-size="11" fill="#bbb" text-anchor="middle">Let it crash, then recover automatically. No human intervention required.</text>
</svg>

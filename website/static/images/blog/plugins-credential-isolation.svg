<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes wallPulse { 0%, 100% { stroke-opacity: 0.4; } 50% { stroke-opacity: 0.9; } }
      @keyframes xPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
      @keyframes checkPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      .header { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #999; text-anchor: middle; letter-spacing: 1px; text-transform: uppercase; }
      .zone-title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; text-anchor: middle; }
      .item { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; }
      .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; }
      .wall { animation: wallPulse 3s ease-in-out infinite; }
      .x { animation: xPulse 2s ease-in-out infinite; }
      .check { animation: checkPulse 2s ease-in-out infinite; }
      .f1 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
      .f2 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    </style>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <text x="400" y="28" class="header">credential isolation boundary</text>

  <!-- Left zone: Daemon Core -->
  <g class="f1" transform="translate(30, 50)">
    <rect x="0" y="0" width="310" height="320" rx="10" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
    <text x="155" y="28" class="zone-title" fill="#ff6b6b">Daemon Core</text>
    <text x="155" y="45" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">sensitive material lives here</text>

    <!-- Items in the daemon -->
    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="270" height="32" rx="5" fill="#2a1a1a" opacity="0.5"/>
      <text x="30" y="20" class="item" fill="#ff6b6b">Ed25519 Private Key</text>
      <circle cx="14" cy="16" r="6" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
      <text x="14" y="20" font-family="system-ui" font-size="8" fill="#ff6b6b" text-anchor="middle">!</text>
    </g>

    <g transform="translate(20, 107)">
      <rect x="0" y="0" width="270" height="32" rx="5" fill="#2a1a1a" opacity="0.5"/>
      <text x="30" y="20" class="item" fill="#ff6b6b">Vault Encryption Keys</text>
      <circle cx="14" cy="16" r="6" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
      <text x="14" y="20" font-family="system-ui" font-size="8" fill="#ff6b6b" text-anchor="middle">!</text>
    </g>

    <g transform="translate(20, 149)">
      <rect x="0" y="0" width="270" height="32" rx="5" fill="#2a1a1a" opacity="0.5"/>
      <text x="30" y="20" class="item" fill="#ff6b6b">Auth Cookies / Session Tokens</text>
      <circle cx="14" cy="16" r="6" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
      <text x="14" y="20" font-family="system-ui" font-size="8" fill="#ff6b6b" text-anchor="middle">!</text>
    </g>

    <g transform="translate(20, 191)">
      <rect x="0" y="0" width="270" height="32" rx="5" fill="#2a1a1a" opacity="0.5"/>
      <text x="30" y="20" class="item" fill="#ff6b6b">Peer Identity Database</text>
      <circle cx="14" cy="16" r="6" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
      <text x="14" y="20" font-family="system-ui" font-size="8" fill="#ff6b6b" text-anchor="middle">!</text>
    </g>

    <text x="155" y="260" class="mono" fill="#bbb" text-anchor="middle">TestCredentialIsolation</text>
    <text x="155" y="275" class="mono" fill="#bbb" text-anchor="middle">verifies no sensitive fields</text>
    <text x="155" y="290" class="mono" fill="#bbb" text-anchor="middle">exist in PluginContext struct</text>
  </g>

  <!-- The wall -->
  <g>
    <rect x="358" y="50" width="8" height="320" rx="2" fill="#ffb347" opacity="0.3" class="wall" stroke="#ffb347" stroke-width="1"/>
    <!-- X marks on the wall -->
    <g class="x" transform="translate(352, 110)">
      <line x1="0" y1="0" x2="18" y2="18" stroke="#ff6b6b" stroke-width="2"/>
      <line x1="18" y1="0" x2="0" y2="18" stroke="#ff6b6b" stroke-width="2"/>
    </g>
    <g class="x" transform="translate(352, 170)">
      <line x1="0" y1="0" x2="18" y2="18" stroke="#ff6b6b" stroke-width="2"/>
      <line x1="18" y1="0" x2="0" y2="18" stroke="#ff6b6b" stroke-width="2"/>
    </g>
    <g class="x" transform="translate(352, 230)">
      <line x1="0" y1="0" x2="18" y2="18" stroke="#ff6b6b" stroke-width="2"/>
      <line x1="18" y1="0" x2="0" y2="18" stroke="#ff6b6b" stroke-width="2"/>
    </g>
  </g>

  <!-- Right zone: Plugin -->
  <g class="f2" transform="translate(390, 50)">
    <rect x="0" y="0" width="370" height="320" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5" opacity="0.7"/>
    <text x="185" y="28" class="zone-title" fill="#00d4aa">PluginContext</text>
    <text x="185" y="45" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">controlled access only</text>

    <!-- Items available to plugin -->
    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="330" height="32" rx="5" fill="#1a2a1a" opacity="0.3"/>
      <text x="30" y="14" class="item" fill="#00d4aa">DeriveKey(domain)</text>
      <text x="30" y="27" class="mono" fill="#bbb">HKDF-SHA256, never raw key</text>
      <text x="318" y="20" class="check" fill="#00d4aa" font-size="14">&#10003;</text>
    </g>

    <g transform="translate(20, 107)">
      <rect x="0" y="0" width="330" height="32" rx="5" fill="#1a2a1a" opacity="0.3"/>
      <text x="30" y="14" class="item" fill="#00d4aa">Logger()</text>
      <text x="30" y="27" class="mono" fill="#bbb">scoped to plugin name</text>
      <text x="318" y="20" class="check" fill="#00d4aa" font-size="14">&#10003;</text>
    </g>

    <g transform="translate(20, 149)">
      <rect x="0" y="0" width="330" height="32" rx="5" fill="#1a2a1a" opacity="0.3"/>
      <text x="30" y="14" class="item" fill="#00d4aa">ConnectToPeer() / OpenStream()</text>
      <text x="30" y="27" class="mono" fill="#bbb">namespace-validated network ops</text>
      <text x="318" y="20" class="check" fill="#00d4aa" font-size="14">&#10003;</text>
    </g>

    <g transform="translate(20, 191)">
      <rect x="0" y="0" width="330" height="32" rx="5" fill="#1a2a1a" opacity="0.3"/>
      <text x="30" y="14" class="item" fill="#00d4aa">HasGrant() / PeerAttr()</text>
      <text x="30" y="27" class="mono" fill="#bbb">grant + attribute lookups</text>
      <text x="318" y="20" class="check" fill="#00d4aa" font-size="14">&#10003;</text>
    </g>

    <g transform="translate(20, 233)">
      <rect x="0" y="0" width="330" height="32" rx="5" fill="#1a2a1a" opacity="0.3"/>
      <text x="30" y="14" class="item" fill="#00d4aa">Config() / OnConfigReload()</text>
      <text x="30" y="27" class="mono" fill="#bbb">own section only, hot reload</text>
      <text x="318" y="20" class="check" fill="#00d4aa" font-size="14">&#10003;</text>
    </g>

    <g transform="translate(20, 275)">
      <rect x="0" y="0" width="330" height="32" rx="5" fill="#1a2a1a" opacity="0.3"/>
      <text x="30" y="14" class="item" fill="#00d4aa">ResolveName()</text>
      <text x="30" y="27" class="mono" fill="#bbb">human name to peer ID</text>
      <text x="318" y="20" class="check" fill="#00d4aa" font-size="14">&#10003;</text>
    </g>
  </g>

  <text x="400" y="400" font-family="system-ui" font-size="11" fill="#bbb" text-anchor="middle">The wall is structural, not policy. No field for credentials exists in PluginContext.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes pulseGlow { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
      .flow { stroke-dasharray: 6 4; animation: dashFlow 1.5s linear infinite; }
      .glow { animation: pulseGlow 3s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Phone (left) -->
  <g transform="translate(30, 30)">
    <rect x="0" y="0" width="150" height="70" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5"/>
    <text x="75" y="20" font-family="system-ui" font-size="11" fill="#4488ff" text-anchor="middle" font-weight="600">Your Phone</text>
    <text x="75" y="38" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">AI agent command</text>
    <text x="75" y="54" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle">"turn on porch light"</text>
  </g>

  <!-- Arrow phone -> Shurli -->
  <line x1="185" y1="65" x2="258" y2="65" class="flow" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <polygon points="255,60 265,65 255,70" fill="#4488ff" opacity="0.5"/>

  <!-- Encrypted badge -->
  <g transform="translate(195, 80)">
    <rect x="0" y="0" width="60" height="18" rx="4" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>
    <text x="30" y="13" font-family="'SF Mono', monospace" font-size="7" fill="#00d4aa" text-anchor="middle">encrypted</text>
  </g>

  <!-- Shurli bridge (center) -->
  <g transform="translate(270, 20)">
    <rect x="0" y="0" width="210" height="90" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2" class="glow"/>
    <text x="105" y="22" font-family="system-ui" font-size="12" fill="#00d4aa" text-anchor="middle" font-weight="600">Home Server</text>
    <line x1="15" y1="30" x2="195" y2="30" stroke="#00d4aa" stroke-width="0.5" opacity="0.3"/>
    <text x="105" y="48" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">Automation Bridge Plugin</text>
    <text x="105" y="62" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">translates P2P protocol</text>
    <text x="105" y="78" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">to automation controller</text>
  </g>

  <!-- Arrow bridge -> devices -->
  <line x1="485" y1="65" x2="558" y2="40" class="flow" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
  <line x1="485" y1="65" x2="558" y2="75" class="flow" stroke="#ffb347" stroke-width="1.5" opacity="0.5"/>

  <!-- Home devices (right) -->
  <g transform="translate(565, 15)">
    <rect x="0" y="0" width="180" height="32" rx="5" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="90" y="13" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle" font-weight="600">Porch Light</text>
    <text x="90" y="26" font-family="system-ui" font-size="8" fill="#00d4aa" text-anchor="middle">ON &#10003;</text>
  </g>
  <g transform="translate(565, 55)">
    <rect x="0" y="0" width="180" height="32" rx="5" fill="#1a1a2e" stroke="#ffb347" stroke-width="1.5"/>
    <text x="90" y="13" font-family="system-ui" font-size="9" fill="#ffb347" text-anchor="middle" font-weight="600">Thermostat</text>
    <text x="90" y="26" font-family="system-ui" font-size="8" fill="#bbb" text-anchor="middle">22C, schedule active</text>
  </g>

  <text x="400" y="145" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">Fully encrypted, no cloud service in the middle. Your phone to your home, direct.</text>

  <g transform="translate(280, 160)">
    <rect x="0" y="0" width="210" height="24" rx="5" fill="#1a1a2e" stroke="#ffb347" stroke-width="1" opacity="0.6"/>
    <text x="105" y="16" font-family="system-ui" font-size="9" fill="#ffb347" text-anchor="middle">Home Automation Bridge Plugin</text>
  </g>
</svg>

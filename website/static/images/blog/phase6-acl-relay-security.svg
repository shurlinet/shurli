<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg6)"/>

  <!-- Concept: before (open door) vs after (fortress with selective entry) -->

  <!-- Left: Before - open door -->
  <rect x="120" y="60" width="400" height="240" rx="16" fill="#1e1d20" stroke="#f7768e" stroke-width="1.5" opacity="0.6"/>
  <text x="320" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#f7768e" font-weight="600">Before</text>

  <!-- Open door frame -->
  <rect x="275" y="120" width="90" height="140" rx="4" fill="none" stroke="#f7768e" stroke-width="2" opacity="0.4"/>
  <!-- Door ajar -->
  <rect x="280" y="125" width="40" height="130" rx="3" fill="#f7768e" fill-opacity="0.06" stroke="#f7768e" stroke-width="1" opacity="0.3"/>
  <!-- People walking in freely -->
  <circle cx="220" cy="170" r="8" fill="none" stroke="#f7768e" stroke-width="1.2" opacity="0.5"/>
  <line x1="220" y1="178" x2="220" y2="200" stroke="#f7768e" stroke-width="1.2" opacity="0.5"/>
  <circle cx="200" cy="210" r="8" fill="none" stroke="#f7768e" stroke-width="1.2" opacity="0.4"/>
  <line x1="200" y1="218" x2="200" y2="240" stroke="#f7768e" stroke-width="1.2" opacity="0.4"/>
  <circle cx="240" cy="230" r="8" fill="none" stroke="#e0af68" stroke-width="1.2" opacity="0.4"/>
  <line x1="240" y1="238" x2="240" y2="255" stroke="#e0af68" stroke-width="1.2" opacity="0.4"/>
  <!-- Arrows pointing in -->
  <line x1="230" y1="175" x2="270" y2="175" stroke="#f7768e" stroke-width="1" opacity="0.3"/>
  <line x1="210" y1="215" x2="270" y2="200" stroke="#f7768e" stroke-width="1" opacity="0.3"/>

  <text x="320" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#f7768e" opacity="0.6">Anyone can walk in</text>

  <!-- Center arrow -->
  <line x1="550" y1="185" x2="630" y2="185" stroke="#565f89" stroke-width="2.5"/>
  <polygon points="625,177 640,185 625,193" fill="#565f89"/>

  <!-- Right: After - fortress with selective entry -->
  <rect x="680" y="60" width="400" height="240" rx="16" fill="#1e1d20" stroke="#9ece6a" stroke-width="1.5" opacity="0.6"/>
  <text x="880" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#9ece6a" font-weight="600">After</text>

  <!-- Fortress wall with gate (x=822 to x=938, inside stroke) -->
  <path d="M822,120 L822,265 L938,265 L938,120 Z" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.5"/>
  <!-- Battlements (5 blocks with gaps, aligned to wall edges) -->
  <rect x="822" y="106" width="18" height="16" fill="#9ece6a" opacity="0.1" stroke="#9ece6a" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="847" y="106" width="18" height="16" fill="#9ece6a" opacity="0.1" stroke="#9ece6a" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="871" y="106" width="18" height="16" fill="#9ece6a" opacity="0.1" stroke="#9ece6a" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="895" y="106" width="18" height="16" fill="#9ece6a" opacity="0.1" stroke="#9ece6a" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="920" y="106" width="18" height="16" fill="#9ece6a" opacity="0.1" stroke="#9ece6a" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Gate (small, controlled) -->
  <path d="M 870 265 L 870 240 Q 880 230 890 240 L 890 265" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.5"/>

  <!-- Approved person (green checkmark) -->
  <circle cx="780" cy="190" r="8" fill="none" stroke="#9ece6a" stroke-width="1.2" opacity="0.6"/>
  <line x1="780" y1="198" x2="780" y2="218" stroke="#9ece6a" stroke-width="1.2" opacity="0.6"/>
  <polyline points="795,190 800,196 808,184" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.6"/>
  <line x1="792" y1="200" x2="820" y2="195" stroke="#9ece6a" stroke-width="1" opacity="0.3"/>

  <!-- Rejected person (red X) -->
  <circle cx="770" cy="240" r="8" fill="none" stroke="#f7768e" stroke-width="1.2" opacity="0.4"/>
  <line x1="770" y1="248" x2="770" y2="260" stroke="#f7768e" stroke-width="1.2" opacity="0.4"/>
  <line x1="785" y1="235" x2="793" y2="243" stroke="#f7768e" stroke-width="1.5" opacity="0.5"/>
  <line x1="793" y1="235" x2="785" y2="243" stroke="#f7768e" stroke-width="1.5" opacity="0.5"/>

  <text x="880" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9ece6a" opacity="0.6">Only invited guests enter</text>

  <!-- Bottom text -->
  <text x="600" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#c0caf5" font-weight="600">Your relay became a fortress</text>
  <text x="600" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#565f89">Roles, smart keys, sealed vault, and invites that work while you sleep.</text>
</svg>

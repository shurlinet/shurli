<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1820;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1d20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="totpFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4561;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e2d40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yukiFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2545;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1830;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="12" fill="url(#bgGrad)"/>

  <text x="400" y="28" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5" text-anchor="middle" font-weight="600">Two-Factor Authentication</text>

  <!-- Factor 1: Identity (always present) -->
  <rect x="40" y="50" width="150" height="100" rx="10" fill="url(#nodeFill)" stroke="#9ece6a" stroke-width="1.2"/>
  <text x="115" y="70" font-family="SF Mono, monospace" font-size="9" fill="#9ece6a" text-anchor="middle" font-weight="600">Factor 1</text>
  <text x="115" y="88" font-family="system-ui, sans-serif" font-size="10" fill="#9ece6a" text-anchor="middle" font-weight="600">Ed25519 Key</text>
  <!-- Key icon -->
  <circle cx="100" cy="115" r="6" fill="none" stroke="#9ece6a" stroke-width="1.2"/>
  <line x1="106" y1="115" x2="130" y2="115" stroke="#9ece6a" stroke-width="1.2"/>
  <line x1="125" y1="115" x2="125" y2="121" stroke="#9ece6a" stroke-width="1.2"/>
  <line x1="130" y1="115" x2="130" y2="121" stroke="#9ece6a" stroke-width="1.2"/>
  <text x="115" y="140" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6" text-anchor="middle">always required</text>

  <!-- Plus -->
  <text x="215" y="105" font-family="system-ui, sans-serif" font-size="20" fill="#565f89" text-anchor="middle">+</text>

  <!-- Factor 2: Passphrase -->
  <rect x="240" y="50" width="150" height="100" rx="10" fill="url(#nodeFill)" stroke="#e0af68" stroke-width="1.2"/>
  <text x="315" y="70" font-family="SF Mono, monospace" font-size="9" fill="#e0af68" text-anchor="middle" font-weight="600">Factor 2</text>
  <text x="315" y="88" font-family="system-ui, sans-serif" font-size="10" fill="#e0af68" text-anchor="middle" font-weight="600">Passphrase</text>
  <!-- Lock icon -->
  <rect x="308" y="100" width="14" height="10" rx="2" fill="none" stroke="#e0af68" stroke-width="1.2"/>
  <path d="M311,100 L311,96 C311,92 319,92 319,96 L319,100" fill="none" stroke="#e0af68" stroke-width="1.2"/>
  <text x="315" y="130" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6" text-anchor="middle">vault unseal</text>
  <text x="315" y="140" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6" text-anchor="middle">always required</text>

  <!-- Plus -->
  <text x="415" y="105" font-family="system-ui, sans-serif" font-size="20" fill="#565f89" text-anchor="middle">+</text>

  <!-- Factor 3a: TOTP -->
  <rect x="440" y="50" width="150" height="100" rx="10" fill="url(#totpFill)" stroke="#7aa2f7" stroke-width="1.2"/>
  <text x="515" y="70" font-family="SF Mono, monospace" font-size="9" fill="#7aa2f7" text-anchor="middle" font-weight="600">Factor 3a</text>
  <text x="515" y="85" font-family="system-ui, sans-serif" font-size="10" fill="#7aa2f7" text-anchor="middle" font-weight="600">Time Code</text>
  <!-- Phone icon -->
  <rect x="503" y="96" width="24" height="36" rx="4" fill="none" stroke="#7aa2f7" stroke-width="1"/>
  <text x="515" y="118" font-family="SF Mono, monospace" font-size="8" fill="#7aa2f7" text-anchor="middle">6</text>
  <text x="515" y="140" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6" text-anchor="middle">TOTP, any auth app</text>

  <!-- OR -->
  <text x="610" y="105" font-family="system-ui, sans-serif" font-size="11" fill="#565f89" text-anchor="middle">OR</text>

  <!-- Factor 3b: YubiKey -->
  <rect x="630" y="50" width="140" height="100" rx="10" fill="url(#yukiFill)" stroke="#bb9af7" stroke-width="1.2"/>
  <text x="700" y="70" font-family="SF Mono, monospace" font-size="9" fill="#bb9af7" text-anchor="middle" font-weight="600">Factor 3b</text>
  <text x="700" y="88" font-family="system-ui, sans-serif" font-size="10" fill="#bb9af7" text-anchor="middle" font-weight="600">YubiKey</text>
  <!-- USB icon -->
  <rect x="690" y="98" width="20" height="30" rx="3" fill="none" stroke="#bb9af7" stroke-width="1"/>
  <circle cx="700" cy="108" r="3" fill="#bb9af7" opacity="0.5"/>
  <text x="700" y="140" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6" text-anchor="middle">hardware challenge</text>

  <!-- Bottom note -->
  <rect x="140" y="164" width="520" height="24" rx="6" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.6"/>
  <text x="400" y="181" font-family="system-ui, sans-serif" font-size="9" fill="#565f89" text-anchor="middle">Both optional. Both stored encrypted inside the vault. Pure Go standard library; no external auth services.</text>
</svg>
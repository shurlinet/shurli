<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bgI)"/>

  <!-- Central device -->
  <rect x="530" y="130" width="140" height="140" rx="20" fill="#1e1d20" stroke="#e8729a" stroke-width="2"/>
  <circle cx="600" cy="200" r="25" fill="none" stroke="#e8729a" stroke-width="2" opacity="0.6"/>
  <circle cx="600" cy="200" r="8" fill="#e8729a" opacity="0.5"/>

  <!-- Multiple paths radiating out - showing path selection -->
  <!-- Path 1: fastest (green, solid, thick) -->
  <path d="M 670 170 Q 800 100 950 100" fill="none" stroke="#9ece6a" stroke-width="3" opacity="0.8"/>
  <circle cx="950" cy="100" r="14" fill="none" stroke="#9ece6a" stroke-width="1.5"/>
  <circle cx="950" cy="100" r="5" fill="#9ece6a" opacity="0.7"/>
  <text x="990" y="105" font-family="system-ui, sans-serif" font-size="12" fill="#9ece6a">Fastest path</text>

  <!-- Path 2: medium (amber, dashed) -->
  <path d="M 670 200 Q 800 200 950 200" fill="none" stroke="#e0af68" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
  <circle cx="950" cy="200" r="14" fill="none" stroke="#e0af68" stroke-width="1.5" opacity="0.5"/>
  <circle cx="950" cy="200" r="5" fill="#e0af68" opacity="0.4"/>
  <text x="990" y="205" font-family="system-ui, sans-serif" font-size="12" fill="#e0af68" opacity="0.6">Backup path</text>

  <!-- Path 3: slow (dim, dotted) -->
  <path d="M 670 230 Q 800 300 950 300" fill="none" stroke="#565f89" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.3"/>
  <circle cx="950" cy="300" r="14" fill="none" stroke="#565f89" stroke-width="1" opacity="0.3"/>
  <circle cx="950" cy="300" r="5" fill="#565f89" opacity="0.2"/>
  <text x="990" y="305" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" opacity="0.4">Last resort</text>

  <!-- Left side: network types -->
  <!-- WiFi -->
  <path d="M 200 130 Q 220 115 240 130" fill="none" stroke="#7aa2f7" stroke-width="2" opacity="0.6"/>
  <path d="M 210 140 Q 220 130 230 140" fill="none" stroke="#7aa2f7" stroke-width="2" opacity="0.6"/>
  <circle cx="220" cy="148" r="3" fill="#7aa2f7" opacity="0.6"/>
  <line x1="250" y1="140" x2="530" y2="170" stroke="#7aa2f7" stroke-width="1.5" opacity="0.3"/>

  <!-- Ethernet -->
  <rect x="195" y="195" width="50" height="25" rx="4" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.6"/>
  <line x1="207" y1="200" x2="207" y2="215" stroke="#9ece6a" stroke-width="1" opacity="0.4"/>
  <line x1="220" y1="200" x2="220" y2="215" stroke="#9ece6a" stroke-width="1" opacity="0.4"/>
  <line x1="233" y1="200" x2="233" y2="215" stroke="#9ece6a" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="207" x2="530" y2="195" stroke="#9ece6a" stroke-width="1.5" opacity="0.3"/>

  <!-- Cellular -->
  <rect x="205" y="265" width="30" height="5" rx="2" fill="#e0af68" opacity="0.5"/>
  <rect x="205" y="255" width="30" height="7" rx="2" fill="none" stroke="#e0af68" stroke-width="1" opacity="0.5"/>
  <rect x="210" y="247" width="20" height="5" rx="1" fill="none" stroke="#e0af68" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="262" x2="530" y2="220" stroke="#e0af68" stroke-width="1.5" opacity="0.3"/>

  <!-- Labels -->
  <text x="130" y="148" font-family="system-ui, sans-serif" font-size="12" fill="#7aa2f7" opacity="0.6">WiFi</text>
  <text x="130" y="212" font-family="system-ui, sans-serif" font-size="12" fill="#9ece6a" opacity="0.6">Wired</text>
  <text x="130" y="270" font-family="system-ui, sans-serif" font-size="12" fill="#e0af68" opacity="0.6">Cellular</text>

  <!-- Bottom text -->
  <text x="600" y="350" font-family="system-ui, sans-serif" font-size="15" fill="#c0caf5" text-anchor="middle" font-weight="600">Always finds the best connection</text>
  <text x="600" y="375" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" text-anchor="middle">Switch networks, change locations. Shurli picks the fastest path automatically.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bgC)"/>

  <!-- Timeline bar -->
  <line x1="100" y1="200" x2="1100" y2="200" stroke="#2a282c" stroke-width="3"/>

  <!-- State 1: Running normally (green) -->
  <circle cx="200" cy="200" r="30" fill="#9ece6a" opacity="0.1" stroke="#9ece6a" stroke-width="2"/>
  <circle cx="200" cy="200" r="12" fill="#9ece6a" opacity="0.4"/>
  <text x="200" y="160" font-family="system-ui, sans-serif" font-size="13" fill="#9ece6a" text-anchor="middle" font-weight="600">Running</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="200" x2="360" y2="200" stroke="#565f89" stroke-width="1.5"/>
  <polygon points="355,194 365,200 355,206" fill="#565f89"/>

  <!-- State 2: Something breaks (red) -->
  <circle cx="400" cy="200" r="30" fill="#f7768e" opacity="0.1" stroke="#f7768e" stroke-width="2"/>
  <!-- X mark -->
  <line x1="390" y1="190" x2="410" y2="210" stroke="#f7768e" stroke-width="3" stroke-linecap="round"/>
  <line x1="410" y1="190" x2="390" y2="210" stroke="#f7768e" stroke-width="3" stroke-linecap="round"/>
  <text x="400" y="160" font-family="system-ui, sans-serif" font-size="13" fill="#f7768e" text-anchor="middle" font-weight="600">Break</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="200" x2="560" y2="200" stroke="#565f89" stroke-width="1.5"/>
  <polygon points="555,194 565,200 555,206" fill="#565f89"/>

  <!-- State 3: Detects problem (amber) -->
  <circle cx="600" cy="200" r="30" fill="#e0af68" opacity="0.1" stroke="#e0af68" stroke-width="2"/>
  <!-- Eye icon -->
  <ellipse cx="600" cy="200" rx="14" ry="9" fill="none" stroke="#e0af68" stroke-width="1.5"/>
  <circle cx="600" cy="200" r="5" fill="#e0af68" opacity="0.5"/>
  <text x="600" y="160" font-family="system-ui, sans-serif" font-size="13" fill="#e0af68" text-anchor="middle" font-weight="600">Detect</text>

  <!-- Arrow 3 -->
  <line x1="640" y1="200" x2="760" y2="200" stroke="#565f89" stroke-width="1.5"/>
  <polygon points="755,194 765,200 755,206" fill="#565f89"/>

  <!-- State 4: Rolls back (purple) -->
  <circle cx="800" cy="200" r="30" fill="#bb9af7" opacity="0.1" stroke="#bb9af7" stroke-width="2"/>
  <!-- Rewind arrow -->
  <path d="M 810 192 A 12 12 0 1 0 810 208" fill="none" stroke="#bb9af7" stroke-width="2"/>
  <polygon points="806,191 814,191 810,184" fill="#bb9af7"/>
  <text x="800" y="160" font-family="system-ui, sans-serif" font-size="13" fill="#bb9af7" text-anchor="middle" font-weight="600">Roll Back</text>

  <!-- Arrow 4 -->
  <line x1="840" y1="200" x2="960" y2="200" stroke="#565f89" stroke-width="1.5"/>
  <polygon points="955,194 965,200 955,206" fill="#565f89"/>

  <!-- State 5: Recovered (green again) -->
  <circle cx="1000" cy="200" r="30" fill="#9ece6a" opacity="0.1" stroke="#9ece6a" stroke-width="2"/>
  <!-- Checkmark -->
  <polyline points="988,200 996,210 1012,190" fill="none" stroke="#9ece6a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1000" y="160" font-family="system-ui, sans-serif" font-size="13" fill="#9ece6a" text-anchor="middle" font-weight="600">Recovered</text>

  <!-- Subtitle -->
  <text x="600" y="280" font-family="system-ui, sans-serif" font-size="15" fill="#c0caf5" text-anchor="middle" font-weight="600">Bad config? Already fixed.</text>
  <text x="600" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" text-anchor="middle">Shurli detects broken settings, rolls back to the last working version, and keeps running.</text>
  <text x="600" y="335" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" text-anchor="middle">No manual restarts. No downtime. No panic.</text>
</svg>

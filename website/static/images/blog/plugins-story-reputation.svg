<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes fadePulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }
      .flow { stroke-dasharray: 6 4; animation: dashFlow 1.5s linear infinite; }
      .bad { animation: fadePulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="260" fill="url(#bg)"/>

  <!-- Your agent (left) -->
  <g transform="translate(40, 65)">
    <rect x="0" y="0" width="150" height="65" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2"/>
    <text x="75" y="25" font-family="system-ui" font-size="13" fill="#00d4aa" text-anchor="middle" font-weight="600">Your Agent</text>
    <text x="75" y="45" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">choosing a route</text>
  </g>

  <!-- Good relay (top path) -->
  <line x1="195" y1="80" x2="380" y2="55" class="flow" stroke="#00d4aa" stroke-width="2.5" opacity="0.7"/>
  <g transform="translate(385, 30)">
    <rect x="0" y="0" width="160" height="55" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2"/>
    <text x="80" y="22" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">Relay A</text>
    <text x="80" y="40" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">score: 94 / reliable</text>
  </g>
  <line x1="550" y1="55" x2="630" y2="80" class="flow" stroke="#00d4aa" stroke-width="2.5" opacity="0.7"/>

  <!-- Bad relay (bottom path, dimmed) -->
  <line x1="195" y1="112" x2="380" y2="140" stroke="#ff6b6b" stroke-width="1.5" opacity="0.2" stroke-dasharray="4 4" class="bad"/>
  <g class="bad" transform="translate(385, 115)">
    <rect x="0" y="0" width="160" height="55" rx="8" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="80" y="22" font-family="system-ui" font-size="11" fill="#ff6b6b" text-anchor="middle" font-weight="600">Relay B</text>
    <text x="80" y="40" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">score: 23 / dropping</text>
  </g>
  <line x1="550" y1="140" x2="630" y2="112" stroke="#ff6b6b" stroke-width="1.5" opacity="0.15" stroke-dasharray="4 4" class="bad"/>

  <!-- Destination (right) -->
  <g transform="translate(635, 65)">
    <rect x="0" y="0" width="120" height="65" rx="10" fill="#1a1a2e" stroke="#4488ff" stroke-width="2"/>
    <text x="60" y="25" font-family="system-ui" font-size="12" fill="#4488ff" text-anchor="middle" font-weight="600">Peer</text>
    <text x="60" y="45" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">destination</text>
  </g>

  <!-- Chosen label -->
  <rect x="290" y="52" width="70" height="18" rx="4" fill="#00d4aa" opacity="0.15"/>
  <text x="325" y="65" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle" font-weight="600">CHOSEN</text>

  <rect x="275" y="148" width="90" height="18" rx="4" fill="#ff6b6b" opacity="0.1"/>
  <text x="320" y="161" font-family="system-ui" font-size="9" fill="#ff6b6b" text-anchor="middle" font-weight="600">DEPRIORITIZED</text>

  <!-- Bottom -->
  <text x="400" y="210" font-family="system-ui" font-size="12" fill="#e0e0e0" text-anchor="middle" font-weight="600">The network heals itself.</text>
  <text x="400" y="230" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">Bad actors get marginalized by collective experience, not a central authority.</text>
</svg>

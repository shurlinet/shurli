<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes bellRing { 0%, 85%, 100% { opacity: 0.5; } 90% { opacity: 1; } }
    @keyframes eventFlow { 0% { opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes sinkPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
    @keyframes eventDot { 0% { r: 0; opacity: 1; } 50% { r: 6; opacity: 0.6; } 100% { r: 12; opacity: 0; } }
    .f1 { animation: fadeIn 0.5s ease-out 0.2s both; }
    .f2 { animation: fadeIn 0.5s ease-out 0.6s both; }
    .f3 { animation: fadeIn 0.5s ease-out 1.0s both; }
    .f4 { animation: fadeIn 0.5s ease-out 1.4s both; }
    .bell { animation: bellRing 3s ease-in-out infinite; }
    .evt1 { animation: eventFlow 4s ease-in-out infinite; }
    .evt2 { animation: eventFlow 4s ease-in-out infinite 1.3s; }
    .evt3 { animation: eventFlow 4s ease-in-out infinite 2.6s; }
    .sink { animation: sinkPulse 2.5s ease-in-out infinite; }
    .sink2 { animation: sinkPulse 2.5s ease-in-out infinite 0.8s; }
    .sink3 { animation: sinkPulse 2.5s ease-in-out infinite 1.6s; }
    .ripple { animation: eventDot 2s ease-out infinite; }
    text { font-family: system-ui, -apple-system, sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>

  <rect width="800" height="380" fill="#0a0a1a"/>
  <text x="400" y="28" text-anchor="middle" font-size="13" fill="#666" letter-spacing="1">NOTIFICATION SUBSYSTEM</text>

  <!-- Event source (GrantStore) -->
  <g class="f1">
    <rect x="40" y="100" width="160" height="180" rx="10" stroke="#00d4aa" stroke-width="1" fill="#00d4aa" fill-opacity="0.04"/>
    <text x="120" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#00d4aa">Grant Events</text>

    <!-- Event types -->
    <rect x="55" y="142" width="130" height="20" rx="3" fill="#00d4aa" fill-opacity="0.08"/>
    <text x="120" y="156" text-anchor="middle" font-size="8" fill="#00d4aa" class="mono">grant_created</text>

    <rect x="55" y="166" width="130" height="20" rx="3" fill="#ffb347" fill-opacity="0.08"/>
    <text x="120" y="180" text-anchor="middle" font-size="8" fill="#ffb347" class="mono">grant_expiring</text>

    <rect x="55" y="190" width="130" height="20" rx="3" fill="#ff6b6b" fill-opacity="0.08"/>
    <text x="120" y="204" text-anchor="middle" font-size="8" fill="#ff6b6b" class="mono">grant_revoked</text>

    <rect x="55" y="214" width="130" height="20" rx="3" fill="#4488ff" fill-opacity="0.08"/>
    <text x="120" y="228" text-anchor="middle" font-size="8" fill="#4488ff" class="mono">grant_refreshed</text>

    <rect x="55" y="238" width="130" height="20" rx="3" fill="#ff6b6b" fill-opacity="0.08"/>
    <text x="120" y="252" text-anchor="middle" font-size="8" fill="#ff6b6b" class="mono">grant_rate_limited</text>

    <!-- Ripple from events -->
    <circle cx="200" cy="190" class="ripple" fill="#00d4aa" fill-opacity="0.3"/>
  </g>

  <!-- Router (center) -->
  <g class="f2">
    <rect x="270" y="130" width="160" height="120" rx="10" stroke="#ffb347" stroke-width="1.5" fill="#ffb347" fill-opacity="0.04"/>
    <text x="350" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#ffb347">Router</text>
    <text x="350" y="175" text-anchor="middle" font-size="9" fill="#888">non-blocking dispatch</text>
    <text x="350" y="192" text-anchor="middle" font-size="9" fill="#888">dedup (5 min TTL)</text>
    <text x="350" y="209" text-anchor="middle" font-size="9" fill="#888">panic recovery</text>
    <text x="350" y="226" text-anchor="middle" font-size="8" fill="#ffb347" class="mono bell">goroutine per sink</text>
  </g>

  <!-- Flow arrows from source to router -->
  <line x1="200" y1="190" x2="270" y2="190" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  <polygon points="265,186 275,190 265,194" fill="#00d4aa" opacity="0.3"/>

  <!-- Three sinks -->
  <!-- LogSink (always on) -->
  <g class="f3">
    <rect x="510" y="60" width="250" height="70" rx="8" stroke="#00d4aa" stroke-width="1" fill="#00d4aa" fill-opacity="0.04" class="sink"/>
    <text x="635" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#00d4aa">LogSink</text>
    <text x="635" y="102" text-anchor="middle" font-size="9" fill="#888">always on - cannot disable</text>
    <text x="635" y="118" text-anchor="middle" font-size="8" fill="#00d4aa" opacity="0.5" class="mono">slog audit trail</text>
    <!-- "always on" badge -->
    <rect x="520" y="65" width="50" height="14" rx="7" fill="#00d4aa" fill-opacity="0.15"/>
    <text x="545" y="75" text-anchor="middle" font-size="7" fill="#00d4aa" font-weight="600">ALWAYS</text>
  </g>

  <!-- DesktopSink -->
  <g class="f3">
    <rect x="510" y="150" width="250" height="70" rx="8" stroke="#ffb347" stroke-width="1" fill="#ffb347" fill-opacity="0.04" class="sink2"/>
    <text x="635" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#ffb347">DesktopSink</text>
    <text x="635" y="192" text-anchor="middle" font-size="9" fill="#888">macOS: osascript / Linux: notify-send</text>
    <text x="635" y="208" text-anchor="middle" font-size="8" fill="#ffb347" opacity="0.5">auto-disabled on headless</text>
  </g>

  <!-- WebhookSink -->
  <g class="f4">
    <rect x="510" y="240" width="250" height="80" rx="8" stroke="#4488ff" stroke-width="1" fill="#4488ff" fill-opacity="0.04" class="sink3"/>
    <text x="635" y="265" text-anchor="middle" font-size="12" font-weight="600" fill="#4488ff">WebhookSink</text>
    <text x="635" y="282" text-anchor="middle" font-size="9" fill="#888">HTTP POST JSON + retry backoff</text>
    <text x="635" y="298" text-anchor="middle" font-size="8" fill="#4488ff" opacity="0.5">Slack, Telegram, n8n, AI agents</text>
    <text x="635" y="311" text-anchor="middle" font-size="8" fill="#888">configurable auth headers + event filter</text>
  </g>

  <!-- Flow arrows from router to sinks -->
  <line x1="430" y1="160" x2="510" y2="100" stroke="#00d4aa" stroke-width="1" opacity="0.3" class="evt1"/>
  <line x1="430" y1="190" x2="510" y2="185" stroke="#ffb347" stroke-width="1" opacity="0.3" class="evt2"/>
  <line x1="430" y1="210" x2="510" y2="270" stroke="#4488ff" stroke-width="1" opacity="0.3" class="evt3"/>

  <!-- AI agent loop -->
  <g class="f4">
    <path d="M760,290 L780,290 L780,350 L350,350 L350,260" stroke="#4488ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
    <polygon points="346,265 350,255 354,265" fill="#4488ff" opacity="0.3"/>
    <text x="565" y="365" text-anchor="middle" font-size="9" fill="#4488ff" opacity="0.5">AI agent receives event, sends back: shurli auth extend --json</text>
  </g>
</svg>

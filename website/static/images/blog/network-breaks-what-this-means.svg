<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes orbitPulse { 0%, 100% { stroke-opacity: 0.2; } 50% { stroke-opacity: 0.6; } }
    @keyframes nodeBreathe { 0%, 100% { fill-opacity: 0.08; stroke-opacity: 0.5; } 50% { fill-opacity: 0.15; stroke-opacity: 1; } }
    @keyframes connFlow { 0% { stroke-dashoffset: 16; } 100% { stroke-dashoffset: 0; } }
    @keyframes textGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    .f1 { animation: fadeIn 0.6s ease-out 0.3s both; }
    .f2 { animation: fadeIn 0.6s ease-out 0.7s both; }
    .f3 { animation: fadeIn 0.6s ease-out 1.1s both; }
    .f4 { animation: fadeIn 0.6s ease-out 1.5s both; }
    .f5 { animation: fadeIn 0.6s ease-out 1.9s both; }
    .orbit { animation: orbitPulse 4s ease-in-out infinite; }
    .orbit2 { animation: orbitPulse 4s ease-in-out infinite 2s; }
    .n1 { animation: nodeBreathe 3s ease-in-out infinite; }
    .n2 { animation: nodeBreathe 3s ease-in-out infinite 1s; }
    .n3 { animation: nodeBreathe 3s ease-in-out infinite 2s; }
    .conn { stroke-dasharray: 8 8; animation: connFlow 2s linear infinite; }
    .glow { animation: textGlow 2.5s ease-in-out infinite; }
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="800" height="400" fill="#0a0a1a"/>

  <!-- Central node mesh - representing interconnected resilient network -->

  <!-- Orbit rings -->
  <circle cx="400" cy="170" r="80" stroke="#00d4aa" stroke-width="0.8" fill="none" class="orbit"/>
  <circle cx="400" cy="170" r="130" stroke="#00d4aa" stroke-width="0.5" fill="none" class="orbit2"/>

  <!-- Center node (larger, primary) -->
  <g class="f1">
    <circle cx="400" cy="170" r="28" stroke="#00d4aa" stroke-width="2" fill="#00d4aa" class="n1"/>
    <!-- Brain icon inside -->
    <circle cx="393" cy="165" r="2.5" fill="#00d4aa" opacity="0.5"/>
    <circle cx="407" cy="165" r="2.5" fill="#00d4aa" opacity="0.5"/>
    <circle cx="400" cy="177" r="2.5" fill="#00d4aa" opacity="0.5"/>
    <line x1="393" y1="165" x2="407" y2="165" stroke="#00d4aa" stroke-width="0.8" opacity="0.3"/>
    <line x1="393" y1="165" x2="400" y2="177" stroke="#00d4aa" stroke-width="0.8" opacity="0.3"/>
    <line x1="407" y1="165" x2="400" y2="177" stroke="#00d4aa" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Surrounding nodes -->
  <g class="f2">
    <circle cx="310" cy="110" r="18" stroke="#ffb347" stroke-width="1.5" fill="#ffb347" class="n2"/>
    <text x="310" y="114" text-anchor="middle" font-size="9" fill="#ffb347" opacity="0.8">agent</text>
  </g>
  <g class="f2">
    <circle cx="500" cy="100" r="18" stroke="#4488ff" stroke-width="1.5" fill="#4488ff" class="n3"/>
    <text x="500" y="104" text-anchor="middle" font-size="9" fill="#4488ff" opacity="0.8">server</text>
  </g>
  <g class="f3">
    <circle cx="280" cy="210" r="16" stroke="#9966ff" stroke-width="1.5" fill="#9966ff" class="n1"/>
    <text x="280" y="214" text-anchor="middle" font-size="9" fill="#9966ff" opacity="0.8">phone</text>
  </g>
  <g class="f3">
    <circle cx="530" cy="220" r="16" stroke="#00d4aa" stroke-width="1.5" fill="#00d4aa" class="n2"/>
    <text x="530" y="224" text-anchor="middle" font-size="9" fill="#00d4aa" opacity="0.8">IoT</text>
  </g>
  <g class="f3">
    <circle cx="400" cy="290" r="16" stroke="#ffb347" stroke-width="1.5" fill="#ffb347" class="n3"/>
    <text x="400" y="294" text-anchor="middle" font-size="9" fill="#ffb347" opacity="0.8">laptop</text>
  </g>

  <!-- Connection lines (animated flow) -->
  <line x1="375" y1="155" x2="325" y2="120" stroke="#ffb347" stroke-width="1" class="conn" opacity="0.4"/>
  <line x1="425" y1="152" x2="485" y2="112" stroke="#4488ff" stroke-width="1" class="conn" opacity="0.4"/>
  <line x1="378" y1="185" x2="293" y2="203" stroke="#9966ff" stroke-width="1" class="conn" opacity="0.4"/>
  <line x1="422" y1="190" x2="517" y2="212" stroke="#00d4aa" stroke-width="1" class="conn" opacity="0.4"/>
  <line x1="400" y1="198" x2="400" y2="274" stroke="#ffb347" stroke-width="1" class="conn" opacity="0.4"/>
  <!-- Cross connections -->
  <line x1="325" y1="118" x2="485" y2="108" stroke="#888" stroke-width="0.5" class="conn" opacity="0.2"/>
  <line x1="293" y1="218" x2="393" y2="280" stroke="#888" stroke-width="0.5" class="conn" opacity="0.2"/>

  <!-- Bottom message -->
  <g class="f4">
    <text x="400" y="340" text-anchor="middle" font-size="16" fill="#e0e0e0" font-weight="600" class="glow">Infrastructure that AI agents can depend on.</text>
  </g>
  <g class="f5">
    <text x="400" y="365" text-anchor="middle" font-size="14" fill="#888">Built for the hardest use case. Everyone benefits.</text>
    <text x="400" y="388" text-anchor="middle" font-size="13" fill="#00d4aa" opacity="0.5">No restarts. No manual intervention. No humans required to operate.</text>
  </g>
</svg>
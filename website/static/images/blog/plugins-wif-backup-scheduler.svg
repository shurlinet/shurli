<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes pulseGlow { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
      .flow { stroke-dasharray: 6 4; animation: dashFlow 1.5s linear infinite; }
      .glow { animation: pulseGlow 3s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Devices (left) -->
  <g transform="translate(40, 30)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5"/>
    <text x="70" y="20" font-family="system-ui" font-size="11" fill="#4488ff" text-anchor="middle" font-weight="600">Your Devices</text>
    <text x="70" y="38" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">phone, laptop, tablet</text>
    <text x="70" y="54" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle">files changed</text>
  </g>

  <!-- Arrow devices -> agent -->
  <line x1="185" y1="65" x2="258" y2="65" class="flow" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <polygon points="255,60 265,65 255,70" fill="#4488ff" opacity="0.5"/>

  <!-- AI Agent (center) -->
  <g transform="translate(270, 25)">
    <rect x="0" y="0" width="170" height="80" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2" class="glow"/>
    <text x="85" y="20" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">AI Agent</text>
    <text x="85" y="38" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">monitors changes</text>
    <text x="85" y="52" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">decides when to back up</text>
    <text x="85" y="68" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">triggers backup plugin</text>
  </g>

  <!-- Arrow agent -> server -->
  <line x1="445" y1="65" x2="518" y2="65" class="flow" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="515,60 525,65 515,70" fill="#00d4aa" opacity="0.5"/>

  <!-- Home server (right) -->
  <g transform="translate(530, 30)">
    <rect x="0" y="0" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="80" y="20" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">Home Server</text>
    <text x="80" y="38" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">backup received</text>
    <text x="80" y="54" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">crash? auto-resume</text>
  </g>

  <!-- Plugin badge -->
  <g transform="translate(310, 120)">
    <rect x="0" y="0" width="150" height="24" rx="5" fill="#1a1a2e" stroke="#ffb347" stroke-width="1" opacity="0.6"/>
    <text x="75" y="16" font-family="system-ui" font-size="9" fill="#ffb347" text-anchor="middle">Backup Scheduler Plugin</text>
  </g>

  <text x="400" y="175" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">The agent handles strategy. The plugin handles protocol. Crashes recover automatically.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgPH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bgPH)"/>

  <!-- Top banner -->
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#c0caf5" font-weight="700">Principles First. Features Follow.</text>
  <text x="600" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#565f89">Every decision traced back to first principles. Every feature earns its place or gets deleted.</text>

  <!-- Four principle cards -->
  <!-- Card 1: Sovereignty -->
  <rect x="80" y="130" width="240" height="200" rx="14" fill="#1e1d20" stroke="#9ece6a" stroke-width="1.5" opacity="0.7"/>
  <path d="M200,155 L220,165 L220,190 C220,205 200,215 200,215 C200,215 180,205 180,190 L180,165 Z" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.4"/>
  <text x="200" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#9ece6a" font-weight="600">Sovereignty</text>
  <text x="200" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#565f89">Never build on what</text>
  <text x="200" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#565f89">you can't control</text>

  <!-- Card 2: Simplicity -->
  <rect x="360" y="130" width="240" height="200" rx="14" fill="#1e1d20" stroke="#bb9af7" stroke-width="1.5" opacity="0.7"/>
  <circle cx="480" cy="180" r="16" fill="none" stroke="#bb9af7" stroke-width="1.5" opacity="0.4"/>
  <line x1="468" y1="180" x2="492" y2="180" stroke="#bb9af7" stroke-width="2.5" opacity="0.4"/>
  <text x="480" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#bb9af7" font-weight="600">Simplicity</text>
  <text x="480" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#565f89">Delete first</text>
  <text x="480" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#565f89">then simplify</text>

  <!-- Card 3: Security -->
  <rect x="640" y="130" width="240" height="200" rx="14" fill="#1e1d20" stroke="#7aa2f7" stroke-width="1.5" opacity="0.7"/>
  <rect x="752" y="172" width="18" height="14" rx="3" fill="none" stroke="#7aa2f7" stroke-width="1.5" opacity="0.4"/>
  <path d="M755,172 L755,165 C755,158 769,158 769,165 L769,172" fill="none" stroke="#7aa2f7" stroke-width="1.5" opacity="0.4"/>
  <text x="760" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#7aa2f7" font-weight="600">Security</text>
  <text x="760" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#565f89">Think like a hacker</text>
  <text x="760" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#565f89">build like an engineer</text>

  <!-- Card 4: Speed -->
  <rect x="920" y="130" width="240" height="200" rx="14" fill="#1e1d20" stroke="#e0af68" stroke-width="1.5" opacity="0.7"/>
  <path d="M1043,160 L1035,178 L1045,178 L1037,196" fill="none" stroke="#e0af68" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <text x="1040" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#e0af68" font-weight="600">Speed</text>
  <text x="1040" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#565f89">Lead with outcomes</text>
  <text x="1040" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#565f89">not features</text>

  <!-- The 5-Step Process -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#e8729a" font-weight="600">The 5-Step Engineering Process</text>

  <!-- Steps as connected cards (5 equal boxes, evenly spaced across 1080px from x=60 to x=1140) -->
  <!-- Each box: 170px wide, 26px gap. Total: 5*170 + 4*26 = 954. Start x = (1200-954)/2 = 123 -->
  <rect x="123" y="430" width="170" height="60" rx="8" fill="#1e1d20" stroke="#e8729a" stroke-width="1" opacity="0.5"/>
  <text x="208" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e8729a" opacity="0.7">1. Question</text>
  <text x="208" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e8729a" opacity="0.7">requirements</text>

  <text x="306" y="464" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#565f89" opacity="0.4">&#x2192;</text>

  <rect x="319" y="430" width="170" height="60" rx="8" fill="#1e1d20" stroke="#e8729a" stroke-width="1" opacity="0.5"/>
  <text x="404" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e8729a" opacity="0.7">2. Delete</text>

  <text x="502" y="464" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#565f89" opacity="0.4">&#x2192;</text>

  <rect x="515" y="430" width="170" height="60" rx="8" fill="#1e1d20" stroke="#e8729a" stroke-width="1" opacity="0.5"/>
  <text x="600" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e8729a" opacity="0.7">3. Simplify</text>

  <text x="698" y="464" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#565f89" opacity="0.4">&#x2192;</text>

  <rect x="711" y="430" width="170" height="60" rx="8" fill="#1e1d20" stroke="#e8729a" stroke-width="1" opacity="0.5"/>
  <text x="796" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e8729a" opacity="0.7">4. Accelerate</text>

  <text x="894" y="464" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#565f89" opacity="0.4">&#x2192;</text>

  <rect x="907" y="430" width="170" height="60" rx="8" fill="#1e1d20" stroke="#e8729a" stroke-width="1" opacity="0.5"/>
  <text x="992" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e8729a" opacity="0.7">5. Automate last</text>

  <!-- Bottom -->
  <text x="600" y="555" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#565f89" opacity="0.5">Applied to every batch, every phase, every line of code.</text>

  <!-- Philosophy quotes (subtle, bottom corners) -->
  <text x="120" y="610" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" opacity="0.3">"If you assume, it's much probable it's wrong."</text>
  <text x="1080" y="610" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" opacity="0.3">"Let the work speak."</text>
</svg>

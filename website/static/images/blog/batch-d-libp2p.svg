<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bgD)"/>

  <!-- Metaphor: three roads, fastest one highlighted -->
  <!-- House A -->
  <g opacity="0.7">
    <rect x="80" y="155" width="65" height="55" rx="3" fill="#00d4aa" fill-opacity="0.08" stroke="#00d4aa" stroke-width="1.5"/>
    <polygon points="76,159 112,132 149,159" fill="none" stroke="#00d4aa" stroke-width="1.5"/>
    <rect x="102" y="180" width="16" height="30" rx="2" fill="#00d4aa" fill-opacity="0.15"/>
    <text x="112" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#00d4aa">You</text>
  </g>

  <!-- House B -->
  <g opacity="0.7">
    <rect x="1055" y="155" width="65" height="55" rx="3" fill="#ffb347" fill-opacity="0.08" stroke="#ffb347" stroke-width="1.5"/>
    <polygon points="1051,159 1087,132 1124,159" fill="none" stroke="#ffb347" stroke-width="1.5"/>
    <rect x="1077" y="180" width="16" height="30" rx="2" fill="#ffb347" fill-opacity="0.15"/>
    <text x="1087" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#ffb347">Peer</text>
  </g>

  <!-- Slow path (top arc) -->
  <path d="M155,170 C400,40 800,40 1045,170" stroke="#ff6b6b" stroke-width="1.5" fill="none" opacity="0.15" stroke-dasharray="8 6"/>
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ff6b6b" opacity="0.3">slow path (45 seconds)</text>

  <!-- Backup path (middle arc) -->
  <path d="M155,178 C400,120 800,120 1045,178" stroke="#ffb347" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="6 4"/>
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffb347" opacity="0.3">backup path</text>

  <!-- Fastest path (direct) -->
  <line x1="155" y1="185" x2="1045" y2="185" stroke="#00d4aa" stroke-width="3" opacity="0.6"/>
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#00d4aa" font-weight="600" opacity="0.7">fastest path wins (3 seconds)</text>

  <!-- Checkmark on fastest -->
  <circle cx="600" cy="185" r="14" fill="#00d4aa" fill-opacity="0.15" stroke="#00d4aa" stroke-width="1.5"/>
  <path d="M594,185 L598,189 L607,181" stroke="#00d4aa" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Bottom message -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#e0e0e0">Picks the Fastest Path Automatically</text>
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#888">Multiple paths race in parallel. First one wins. No configuration needed.</text>

  <!-- Speed pills -->
  <rect x="370" y="355" width="100" height="24" rx="12" fill="#ff6b6b" fill-opacity="0.08" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="420" y="371" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ff6b6b">Before: 45s</text>
  <text x="500" y="371" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#555">-></text>
  <rect x="530" y="355" width="100" height="24" rx="12" fill="#00d4aa" fill-opacity="0.08" stroke="#00d4aa" stroke-width="0.5"/>
  <text x="580" y="371" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#00d4aa">After: 3-10s</text>
  <rect x="670" y="355" width="150" height="24" rx="12" fill="#ffb347" fill-opacity="0.08" stroke="#ffb347" stroke-width="0.5"/>
  <text x="745" y="371" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffb347">Tested on 4 networks</text>
</svg>

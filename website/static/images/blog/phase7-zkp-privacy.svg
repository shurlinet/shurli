<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg7)"/>

  <!-- Concept: person behind a one-way mirror. Server sees "authorized" but not "who" -->

  <!-- Left: Anonymous figure behind frosted glass -->
  <rect x="160" y="60" width="340" height="250" rx="16" fill="#da1c5c" fill-opacity="0.04" stroke="#da1c5c" stroke-width="1.5"/>

  <!-- Person silhouette (abstract) -->
  <circle cx="330" cy="130" r="25" fill="none" stroke="#e8729a" stroke-width="2" opacity="0.5"/>
  <line x1="330" y1="155" x2="330" y2="210" stroke="#e8729a" stroke-width="2" opacity="0.5"/>
  <line x1="305" y1="180" x2="355" y2="180" stroke="#e8729a" stroke-width="2" opacity="0.5"/>

  <!-- Question marks around person (identity hidden) -->
  <text x="270" y="120" font-family="system-ui, sans-serif" font-size="20" fill="#da1c5c" opacity="0.3">?</text>
  <text x="380" y="140" font-family="system-ui, sans-serif" font-size="20" fill="#da1c5c" opacity="0.3">?</text>
  <text x="290" y="210" font-family="system-ui, sans-serif" font-size="16" fill="#da1c5c" opacity="0.2">?</text>

  <text x="330" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#da1c5c" opacity="0.7">Identity: hidden</text>
  <text x="330" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#da1c5c" opacity="0.7">Score: hidden</text>

  <!-- Center: Proof arrow with gap for badge (centered at x=600) -->
  <line x1="510" y1="175" x2="555" y2="175" stroke="#e8729a" stroke-width="2.5"/>
  <line x1="645" y1="175" x2="680" y2="175" stroke="#e8729a" stroke-width="2.5"/>
  <polygon points="675,167 690,175 675,183" fill="#e8729a"/>

  <!-- Proof badge (centered at x=600) -->
  <rect x="560" y="160" width="80" height="30" rx="8" fill="#1e1d20" stroke="#da1c5c" stroke-width="1.5"/>
  <text x="600" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#da1c5c" font-weight="600">proof</text>

  <text x="600" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#565f89">"I belong here"</text>
  <text x="600" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#565f89">"but I won't say who I am"</text>

  <!-- Right: Server sees only checkmark -->
  <rect x="700" y="60" width="340" height="250" rx="16" fill="#9ece6a" fill-opacity="0.04" stroke="#bb9af7" stroke-width="1.5"/>

  <!-- Server rack (centered at x=870) -->
  <rect x="840" y="110" width="60" height="16" rx="3" fill="#2a282c" stroke="#bb9af7" stroke-width="1" opacity="0.6"/>
  <circle cx="890" cy="118" r="3" fill="#9ece6a" opacity="0.6"/>
  <rect x="840" y="130" width="60" height="16" rx="3" fill="#2a282c" stroke="#bb9af7" stroke-width="1" opacity="0.6"/>
  <circle cx="890" cy="138" r="3" fill="#9ece6a" opacity="0.6"/>
  <rect x="840" y="150" width="60" height="16" rx="3" fill="#2a282c" stroke="#bb9af7" stroke-width="1" opacity="0.6"/>
  <circle cx="890" cy="158" r="3" fill="#7aa2f7" opacity="0.6"/>

  <!-- Big checkmark (centered at x=870) -->
  <circle cx="870" cy="210" r="20" fill="#9ece6a" opacity="0.1" stroke="#9ece6a" stroke-width="2"/>
  <polyline points="858,210 866,220 882,198" fill="none" stroke="#9ece6a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="870" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#bb9af7" opacity="0.7">Knows: authorized</text>
  <text x="870" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#f7768e" opacity="0.7">Knows NOT: who</text>

  <!-- Bottom text -->
  <text x="600" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#c0caf5" font-weight="600">Prove you belong without saying who you are</text>
  <text x="600" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#565f89">Zero-knowledge proofs verify membership, role, and reputation - without revealing identity.</text>
</svg>

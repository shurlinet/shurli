<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="bgR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
    <linearGradient id="nodeFillR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2a2e"/>
      <stop offset="100%" style="stop-color:#1e1d20"/>
    </linearGradient>
  </defs>

  <rect width="800" height="260" fill="url(#bgR)" rx="8"/>

  <text x="400" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#c0caf5">Your transfer dropped? It picks up where it left off.</text>

  <!-- Bitfield visualization -->
  <rect x="50" y="50" width="700" height="60" rx="6" fill="url(#nodeFillR)" stroke="#565f89" stroke-width="0.5"/>
  <text x="70" y="68" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#c0caf5">73% received when connection dropped</text>

  <!-- Chunk squares - received (green) -->
  <rect x="70" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="88" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="106" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="124" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="142" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="160" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="178" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="196" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="214" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="232" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="250" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <!-- Missing (dark) -->
  <rect x="268" y="78" width="14" height="14" rx="2" fill="#2c2a2e" stroke="#565f89" stroke-width="0.5"/>
  <rect x="286" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="304" y="78" width="14" height="14" rx="2" fill="#9ece6a" opacity="0.8"/>
  <rect x="322" y="78" width="14" height="14" rx="2" fill="#2c2a2e" stroke="#565f89" stroke-width="0.5"/>
  <rect x="340" y="78" width="14" height="14" rx="2" fill="#2c2a2e" stroke="#565f89" stroke-width="0.5"/>
  <rect x="358" y="78" width="14" height="14" rx="2" fill="#2c2a2e" stroke="#565f89" stroke-width="0.5"/>
  <rect x="376" y="78" width="14" height="14" rx="2" fill="#2c2a2e" stroke="#565f89" stroke-width="0.5"/>

  <!-- Legend -->
  <rect x="430" y="80" width="10" height="10" rx="2" fill="#9ece6a" opacity="0.8"/>
  <text x="445" y="89" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">Got it</text>
  <rect x="490" y="80" width="10" height="10" rx="2" fill="#2c2a2e" stroke="#565f89" stroke-width="0.5"/>
  <text x="505" y="89" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">Still need</text>

  <!-- Resume flow - 3 steps -->
  <rect x="50" y="128" width="220" height="70" rx="6" fill="url(#nodeFillR)" stroke="#fbb040" stroke-width="1"/>
  <text x="160" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fbb040">Connection back</text>
  <text x="160" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">WiFi switched, VPN reconnected,</text>
  <text x="160" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">or just came back online</text>

  <text x="285" y="163" font-family="system-ui, sans-serif" font-size="18" fill="#565f89">&#x2192;</text>

  <rect x="300" y="128" width="200" height="70" rx="6" fill="url(#nodeFillR)" stroke="#bb9af7" stroke-width="1"/>
  <text x="400" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#bb9af7">Here's what I have</text>
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">Sends a tiny map of received</text>
  <text x="400" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">pieces (1 bit per chunk)</text>

  <text x="515" y="163" font-family="system-ui, sans-serif" font-size="18" fill="#565f89">&#x2192;</text>

  <rect x="530" y="128" width="220" height="70" rx="6" fill="url(#nodeFillR)" stroke="#9ece6a" stroke-width="1"/>
  <text x="640" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9ece6a">Only the gaps</text>
  <text x="640" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">Sender skips what you already have.</text>
  <text x="640" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">Sends only the missing 27%.</text>

  <!-- Bottom: what triggers resume -->
  <rect x="50" y="205" width="700" height="40" rx="6" fill="url(#nodeFillR)" stroke="#565f89" stroke-width="0.3"/>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c0caf5">Works across: WiFi changes, VPN reconnects, mobile data switches, daemon restarts</text>
  <text x="400" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#565f89">File is verified after completion. Checkpoint cleaned up automatically.</text>
</svg>

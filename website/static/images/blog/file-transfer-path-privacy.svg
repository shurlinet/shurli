<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
    <linearGradient id="badFillP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e1e1e"/>
      <stop offset="100%" style="stop-color:#251a1a"/>
    </linearGradient>
    <linearGradient id="goodFillP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2e1e"/>
      <stop offset="100%" style="stop-color:#1a251a"/>
    </linearGradient>
    <linearGradient id="nodeFillP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2a2e"/>
      <stop offset="100%" style="stop-color:#1e1d20"/>
    </linearGradient>
  </defs>

  <rect width="800" height="280" fill="url(#bgP)" rx="8"/>

  <text x="400" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#c0caf5">What the other side sees when you share a file</text>

  <!-- BAD: What others expose -->
  <rect x="30" y="48" width="360" height="110" rx="8" fill="url(#badFillP)" stroke="#f7768e" stroke-width="0.8"/>
  <text x="210" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f7768e">What many P2P tools expose</text>
  <text x="50" y="92" font-family="monospace" font-size="10" fill="#f7768e">/home/jane/Documents/</text>
  <text x="50" y="107" font-family="monospace" font-size="10" fill="#f7768e">  work-project/financials.xlsx</text>
  <text x="50" y="130" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">Your username, folder structure,</text>
  <text x="50" y="143" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">operating system - all leaked to the receiver</text>

  <!-- GOOD: What Shurli exposes -->
  <rect x="410" y="48" width="360" height="110" rx="8" fill="url(#goodFillP)" stroke="#9ece6a" stroke-width="0.8"/>
  <text x="590" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9ece6a">Shurli shows only this</text>
  <text x="430" y="92" font-family="monospace" font-size="10" fill="#9ece6a">share-a1b2c3d4/financials.xlsx</text>
  <text x="430" y="115" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">A random ID and the filename. Nothing else.</text>
  <text x="430" y="130" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">No username, no paths, no system info.</text>
  <text x="430" y="143" font-family="system-ui, sans-serif" font-size="9" fill="#a9b1d6">The receiver learns nothing about your machine.</text>

  <!-- How it's enforced -->
  <rect x="30" y="175" width="740" height="85" rx="8" fill="url(#nodeFillP)" stroke="#565f89" stroke-width="0.5"/>
  <text x="400" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c0caf5">Five layers of protection - all working together</text>

  <text x="100" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#da1c5c">Random share IDs</text>
  <text x="100" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">No folder info encoded</text>

  <text x="240" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#9ece6a">Relative paths only</text>
  <text x="240" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">Full paths stripped out</text>

  <text x="400" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#bb9af7">Path traversal blocked</text>
  <text x="400" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">../../ tricks rejected</text>

  <text x="550" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fbb040">Directory jailing</text>
  <text x="550" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">OS-level sandbox</text>

  <text x="690" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e8729a">Silent rejection</text>
  <text x="690" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">No clues to attackers</text>

  <text x="400" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-style="italic" fill="#565f89">Audited through 3 rounds of security review. Zero path leakage found.</text>
</svg>

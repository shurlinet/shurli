<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg5)"/>

  <!-- 5 network types as columns, each with a status indicator -->
  <!-- Shows: no matter what network you're on, connection stays green -->

  <!-- Column 1: WiFi -->
  <rect x="110" y="60" width="160" height="200" rx="12" fill="#1e1d20" stroke="#565f89" stroke-width="1"/>
  <!-- WiFi icon (smooth arcs) -->
  <path d="M 162 118 A 40 40 0 0 1 218 118" fill="none" stroke="#9ece6a" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 172 130 A 25 25 0 0 1 208 130" fill="none" stroke="#9ece6a" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <circle cx="190" cy="142" r="4" fill="#9ece6a" opacity="0.7"/>
  <text x="190" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5">WiFi</text>
  <!-- Green dot = connected -->
  <circle cx="190" cy="210" r="8" fill="#9ece6a" opacity="0.6"/>
  <circle cx="190" cy="210" r="12" fill="none" stroke="#9ece6a" stroke-width="1" opacity="0.3"/>
  <text x="190" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ece6a" opacity="0.6">connected</text>

  <!-- Arrow: switch -->
  <text x="295" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#565f89">&#x2192;</text>

  <!-- Column 2: Ethernet -->
  <rect x="320" y="60" width="160" height="200" rx="12" fill="#1e1d20" stroke="#565f89" stroke-width="1"/>
  <!-- Cable icon (centered at x=400) -->
  <rect x="385" y="100" width="30" height="20" rx="3" fill="none" stroke="#9ece6a" stroke-width="2" opacity="0.6"/>
  <line x1="392" y1="105" x2="392" y2="115" stroke="#9ece6a" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="105" x2="400" y2="115" stroke="#9ece6a" stroke-width="1.5" opacity="0.4"/>
  <line x1="408" y1="105" x2="408" y2="115" stroke="#9ece6a" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="120" x2="400" y2="140" stroke="#9ece6a" stroke-width="2" opacity="0.4"/>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5">Wired</text>
  <circle cx="400" cy="210" r="8" fill="#9ece6a" opacity="0.6"/>
  <circle cx="400" cy="210" r="12" fill="none" stroke="#9ece6a" stroke-width="1" opacity="0.3"/>
  <text x="400" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ece6a" opacity="0.6">connected</text>

  <!-- Arrow: switch -->
  <text x="505" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#565f89">&#x2192;</text>

  <!-- Column 3: Cellular -->
  <rect x="530" y="60" width="160" height="200" rx="12" fill="#1e1d20" stroke="#565f89" stroke-width="1"/>
  <!-- Signal bars -->
  <rect x="590" y="130" width="8" height="14" rx="1" fill="#9ece6a" opacity="0.5"/>
  <rect x="602" y="122" width="8" height="22" rx="1" fill="#9ece6a" opacity="0.5"/>
  <rect x="614" y="114" width="8" height="30" rx="1" fill="#9ece6a" opacity="0.5"/>
  <rect x="626" y="106" width="8" height="38" rx="1" fill="#9ece6a" opacity="0.5"/>
  <text x="610" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5">Cellular</text>
  <circle cx="610" cy="210" r="8" fill="#9ece6a" opacity="0.6"/>
  <circle cx="610" cy="210" r="12" fill="none" stroke="#9ece6a" stroke-width="1" opacity="0.3"/>
  <text x="610" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ece6a" opacity="0.6">connected</text>

  <!-- Arrow: switch -->
  <text x="715" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#565f89">&#x2192;</text>

  <!-- Column 4: VPN -->
  <rect x="740" y="60" width="160" height="200" rx="12" fill="#1e1d20" stroke="#565f89" stroke-width="1"/>
  <!-- Tunnel icon -->
  <path d="M 795 130 Q 820 100 845 130" fill="none" stroke="#9ece6a" stroke-width="2" opacity="0.5"/>
  <line x1="795" y1="130" x2="795" y2="145" stroke="#9ece6a" stroke-width="2" opacity="0.5"/>
  <line x1="845" y1="130" x2="845" y2="145" stroke="#9ece6a" stroke-width="2" opacity="0.5"/>
  <line x1="795" y1="145" x2="845" y2="145" stroke="#9ece6a" stroke-width="2" opacity="0.5"/>
  <text x="820" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5">VPN</text>
  <circle cx="820" cy="210" r="8" fill="#9ece6a" opacity="0.6"/>
  <circle cx="820" cy="210" r="12" fill="none" stroke="#9ece6a" stroke-width="1" opacity="0.3"/>
  <text x="820" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ece6a" opacity="0.6">connected</text>

  <!-- Arrow: switch -->
  <text x="925" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#565f89">&#x2192;</text>

  <!-- Column 5: Nothing (offline briefly) -->
  <rect x="950" y="60" width="160" height="200" rx="12" fill="#1e1d20" stroke="#565f89" stroke-width="1"/>
  <!-- Disconnected icon (circle with line) -->
  <circle cx="1030" cy="120" r="18" fill="none" stroke="#e0af68" stroke-width="2" opacity="0.5"/>
  <line x1="1017" y1="133" x2="1043" y2="107" stroke="#e0af68" stroke-width="2" opacity="0.5"/>
  <text x="1030" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5">Offline</text>
  <!-- Amber dot = waiting -->
  <circle cx="1030" cy="210" r="8" fill="#e0af68" opacity="0.6"/>
  <circle cx="1030" cy="210" r="12" fill="none" stroke="#e0af68" stroke-width="1" opacity="0.3"/>
  <text x="1030" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#e0af68" opacity="0.6">waiting...</text>

  <!-- Bottom text -->
  <text x="600" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#c0caf5" font-weight="600">Switch anything. Stay connected.</text>
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#565f89">WiFi, wired, cellular, VPN - Shurli adapts to every network change automatically.</text>
  <text x="600" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#565f89">No manual restarts. No dropped sessions. Zero configuration.</text>
</svg>

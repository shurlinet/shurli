<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316"/>
      <stop offset="100%" style="stop-color:#1a191c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bgP)"/>

  <!-- Three pillars -->

  <!-- Pillar 1: Easy Start -->
  <rect x="80" y="80" width="300" height="240" rx="16" fill="#1e1d20" stroke="#7aa2f7" stroke-width="1.5"/>
  <text x="230" y="120" font-family="system-ui, sans-serif" font-size="16" fill="#7aa2f7" text-anchor="middle" font-weight="600">Easy Start</text>

  <!-- Door opening visual -->
  <rect x="190" y="150" width="80" height="110" rx="4" fill="none" stroke="#7aa2f7" stroke-width="1.5" opacity="0.5"/>
  <rect x="195" y="155" width="60" height="100" rx="3" fill="#7aa2f7" opacity="0.06"/>
  <circle cx="248" cy="205" r="4" fill="#7aa2f7" opacity="0.5"/>
  <!-- Light rays from door -->
  <line x1="260" y1="170" x2="310" y2="150" stroke="#7aa2f7" stroke-width="1" opacity="0.2"/>
  <line x1="260" y1="200" x2="320" y2="200" stroke="#7aa2f7" stroke-width="1" opacity="0.2"/>
  <line x1="260" y1="230" x2="310" y2="250" stroke="#7aa2f7" stroke-width="1" opacity="0.2"/>

  <text x="230" y="290" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" text-anchor="middle">One command to join</text>
  <text x="230" y="308" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" text-anchor="middle">the network</text>

  <!-- Pillar 2: Your Relay, Your Rules -->
  <rect x="450" y="80" width="300" height="240" rx="16" fill="#1e1d20" stroke="#e0af68" stroke-width="1.5"/>
  <text x="600" y="120" font-family="system-ui, sans-serif" font-size="16" fill="#e0af68" text-anchor="middle" font-weight="600">Your Relay, Your Rules</text>

  <!-- Castle/tower visual (centered at x=600, wall 567-633) -->
  <path d="M567,158 L567,245 L633,245 L633,158 Z" fill="none" stroke="#e0af68" stroke-width="1.5" opacity="0.5"/>
  <!-- Battlements (4 blocks with gaps, within wall edges) -->
  <rect x="567" y="144" width="13" height="16" fill="#e0af68" opacity="0.15" stroke="#e0af68" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="585" y="144" width="13" height="16" fill="#e0af68" opacity="0.15" stroke="#e0af68" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="603" y="144" width="13" height="16" fill="#e0af68" opacity="0.15" stroke="#e0af68" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="620" y="144" width="13" height="16" fill="#e0af68" opacity="0.15" stroke="#e0af68" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Gate -->
  <path d="M 590 245 L 590 222 Q 600 212 610 222 L 610 245" fill="none" stroke="#e0af68" stroke-width="1.5" opacity="0.5"/>
  <!-- Flag -->
  <line x1="600" y1="145" x2="600" y2="128" stroke="#e0af68" stroke-width="1.5" opacity="0.5"/>
  <path d="M 600 128 L 618 134 L 600 140" fill="#e0af68" opacity="0.3"/>

  <text x="600" y="276" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" text-anchor="middle">Public relays for discovery</text>
  <text x="600" y="294" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" text-anchor="middle">Private relay for your data</text>

  <!-- Pillar 3: Locked Down -->
  <rect x="820" y="80" width="300" height="240" rx="16" fill="#1e1d20" stroke="#9ece6a" stroke-width="1.5"/>
  <text x="970" y="120" font-family="system-ui, sans-serif" font-size="16" fill="#9ece6a" text-anchor="middle" font-weight="600">Locked Down</text>

  <!-- Lock + shield combo -->
  <path d="M970,145 L1010,158 L1010,210 C1010,240 970,260 970,260 C970,260 930,240 930,210 L930,158 Z"
        fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.5"/>
  <!-- Lock body inside shield -->
  <rect x="955" y="190" width="30" height="22" rx="4" fill="#9ece6a" opacity="0.15" stroke="#9ece6a" stroke-width="1"/>
  <path d="M960,190 L960,182 C960,174 980,174 980,182 L980,190" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="970" cy="200" r="3" fill="#9ece6a" opacity="0.5"/>

  <text x="970" y="282" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" text-anchor="middle">14 security fixes</text>
  <text x="970" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#565f89" text-anchor="middle">hardened from the inside out</text>

  <!-- Bottom tagline -->
  <text x="600" y="365" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5" text-anchor="middle" font-weight="600">Simpler to start. Harder to break.</text>
</svg>

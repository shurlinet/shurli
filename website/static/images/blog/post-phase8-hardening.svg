<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a191c;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa2d0" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ece6a" />
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e0af68" />
    </marker>
  </defs>

  <rect width="900" height="400" rx="12" fill="url(#bgGrad)" />

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="20" fill="#c0bdc5" font-weight="bold">Post-Phase 8: Hardened Infrastructure</text>
  <text x="450" y="58" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#777">Public seeds, async invites, 14 security fixes, remote unseal, DNSSEC</text>

  <!-- Left column: Onboarding flow -->
  <text x="160" y="90" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#7aa2d0" font-weight="bold">ONBOARDING</text>

  <!-- Step 1: init -->
  <rect x="60" y="105" width="200" height="36" rx="6" fill="#2d4561" stroke="#7aa2d0" stroke-width="1.5" />
  <text x="160" y="120" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#7aa2d0" font-weight="bold">$ shurli init</text>
  <text x="160" y="134" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#5a82b0">identity + vault + seed phrase</text>

  <line x1="160" y1="141" x2="160" y2="155" stroke="#555" stroke-width="1" />

  <!-- Step 2: DNS seeds -->
  <rect x="60" y="155" width="200" height="36" rx="6" fill="#3a2e1e" stroke="#e0af68" stroke-width="1" />
  <text x="160" y="170" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#e0af68" font-weight="bold">DNS + Hardcoded Seeds</text>
  <text x="160" y="184" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#b08a48">AU (Sydney) + SG (Singapore)</text>

  <line x1="160" y1="191" x2="160" y2="205" stroke="#555" stroke-width="1" />

  <!-- Step 3: connected -->
  <rect x="60" y="205" width="200" height="30" rx="6" fill="#1e3a2f" stroke="#9ece6a" stroke-width="1.5" />
  <text x="160" y="224" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#9ece6a" font-weight="bold">On the network</text>

  <!-- Before/After -->
  <rect x="60" y="250" width="90" height="24" rx="4" fill="#3a1e1e" stroke="#c06060" stroke-width="0.5" />
  <text x="105" y="266" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#c06060">Before: 5 steps</text>
  <rect x="170" y="250" width="90" height="24" rx="4" fill="#1e3a2f" stroke="#9ece6a" stroke-width="0.5" />
  <text x="215" y="266" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#9ece6a">Now: 1 step</text>

  <!-- Center: Seed relay architecture -->
  <text x="450" y="90" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#e0af68" font-weight="bold">SEED RELAY SEPARATION</text>

  <!-- Seed relay -->
  <rect x="340" y="105" width="220" height="50" rx="8" fill="#3a2e1e" stroke="#e0af68" stroke-width="1.5" />
  <text x="450" y="125" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#e0af68" font-weight="bold">Seed Relay (Public)</text>
  <text x="450" y="145" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#b08a48">discovery only - data blocked by CircuitACL</text>

  <!-- Private relay -->
  <rect x="340" y="170" width="220" height="50" rx="8" fill="#1e3a2f" stroke="#9ece6a" stroke-width="1.5" />
  <text x="450" y="190" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#9ece6a" font-weight="bold">Your Relay (Private)</text>
  <text x="450" y="210" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#7aaa4a">discovery + data - your peers, your rules</text>

  <!-- Direct path -->
  <rect x="340" y="235" width="220" height="40" rx="8" fill="#1e2840" stroke="#bb9af7" stroke-width="1" stroke-dasharray="4,2" />
  <text x="450" y="255" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#bb9af7" font-weight="bold">Direct IPv6/IPv4</text>
  <text x="450" y="268" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#9a7ad7">best path - no relay needed</text>

  <!-- Right column: Security -->
  <text x="740" y="90" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#9ece6a" font-weight="bold">SECURITY</text>

  <!-- Security items -->
  <rect x="640" y="105" width="200" height="20" rx="3" fill="#1e3a2f" stroke="#9ece6a" stroke-width="0.5" />
  <text x="740" y="119" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#9ece6a">8 batch fixes</text>

  <rect x="640" y="129" width="200" height="20" rx="3" fill="#1e3a2f" stroke="#9ece6a" stroke-width="0.5" />
  <text x="740" y="143" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#9ece6a">6 pre-merge audit fixes</text>

  <rect x="640" y="153" width="200" height="20" rx="3" fill="#1e2840" stroke="#bb9af7" stroke-width="0.5" />
  <text x="740" y="167" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#bb9af7">unseal protocol wired</text>

  <rect x="640" y="177" width="200" height="20" rx="3" fill="#1e2840" stroke="#bb9af7" stroke-width="0.5" />
  <text x="740" y="191" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#bb9af7">DNSSEC on seed domain</text>

  <!-- Lockout detail -->
  <rect x="640" y="210" width="200" height="64" rx="6" fill="#2c2a2e" stroke="#555" stroke-width="0.5" />
  <text x="740" y="225" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#aaa">Unseal lockout schedule:</text>
  <text x="740" y="239" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#888">4 free tries</text>
  <text x="740" y="251" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#888">1m > 5m > 15m > 1h</text>
  <text x="740" y="263" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#c06060">then permanent block</text>

  <!-- Bottom: Async invite flow (horizontal) -->
  <line x1="40" y1="300" x2="860" y2="300" stroke="#333" stroke-width="1" />
  <text x="450" y="322" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#e0af68" font-weight="bold">ASYNC INVITE: STORE-AND-FORWARD PAIRING</text>

  <!-- Flow boxes -->
  <rect x="40" y="338" width="130" height="40" rx="5" fill="#2d4561" stroke="#7aa2d0" stroke-width="1" />
  <text x="105" y="355" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#7aa2d0" font-weight="bold">shurli invite</text>
  <text x="105" y="370" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#5a82b0">create code</text>

  <line x1="170" y1="358" x2="210" y2="358" stroke="#e0af68" stroke-width="1.5" marker-end="url(#arrowAmber)" />

  <rect x="210" y="338" width="130" height="40" rx="5" fill="#3a2e1e" stroke="#e0af68" stroke-width="1" />
  <text x="275" y="355" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#e0af68" font-weight="bold">Relay stores</text>
  <text x="275" y="370" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#b08a48">contact card</text>

  <line x1="340" y1="358" x2="380" y2="358" stroke="#555" stroke-width="1" stroke-dasharray="3,3" />
  <text x="360" y="350" text-anchor="middle" font-family="SF Mono, monospace" font-size="6" fill="#555">time</text>

  <rect x="380" y="338" width="130" height="40" rx="5" fill="#1e3a2f" stroke="#9ece6a" stroke-width="1" />
  <text x="445" y="355" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#9ece6a" font-weight="bold">shurli join</text>
  <text x="445" y="370" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#7aaa4a">PAKE v2</text>

  <line x1="510" y1="358" x2="550" y2="358" stroke="#e0af68" stroke-width="1.5" marker-end="url(#arrowAmber)" />

  <rect x="550" y="338" width="130" height="40" rx="5" fill="#3a2e1e" stroke="#e0af68" stroke-width="1" />
  <text x="615" y="355" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#e0af68" font-weight="bold">peer-notify</text>
  <text x="615" y="370" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#b08a48">push intro</text>

  <line x1="680" y1="358" x2="720" y2="358" stroke="#9ece6a" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <rect x="720" y="338" width="140" height="40" rx="5" fill="#1e3a2f" stroke="#9ece6a" stroke-width="1.5" />
  <text x="790" y="355" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#9ece6a" font-weight="bold">Connected</text>
  <text x="790" y="370" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#7aaa4a">direct path</text>

  <!-- Stats -->
  <text x="450" y="395" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#555">38 commits | 122 files | +8,854 / -1,762 | 14 security fixes | DNSSEC enabled</text>
</svg>

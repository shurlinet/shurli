<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes logPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
      .flow { stroke-dasharray: 6 4; animation: dashFlow 1.5s linear infinite; }
      .log { animation: logPulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Events (left) -->
  <g transform="translate(30, 15)">
    <rect x="0" y="0" width="150" height="28" rx="5" fill="#1a1a2e" stroke="#4488ff" stroke-width="1"/>
    <text x="75" y="18" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle">file transfer event</text>
  </g>
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="150" height="28" rx="5" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1"/>
    <text x="75" y="18" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">grant issued event</text>
  </g>
  <g transform="translate(30, 85)">
    <rect x="0" y="0" width="150" height="28" rx="5" fill="#1a1a2e" stroke="#ffb347" stroke-width="1"/>
    <text x="75" y="18" font-family="system-ui" font-size="9" fill="#ffb347" text-anchor="middle">peer connection event</text>
  </g>

  <!-- Arrows to logger -->
  <line x1="185" y1="29" x2="268" y2="50" class="flow" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <line x1="185" y1="64" x2="268" y2="60" class="flow" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
  <line x1="185" y1="99" x2="268" y2="70" class="flow" stroke="#ffb347" stroke-width="1" opacity="0.4"/>

  <!-- Compliance logger (center) -->
  <g transform="translate(275, 20)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2"/>
    <text x="100" y="22" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">Compliance Logger</text>
    <line x1="15" y1="30" x2="185" y2="30" stroke="#00d4aa" stroke-width="0.5" opacity="0.3"/>
    <text x="100" y="46" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">append-only audit trail</text>
    <text x="100" y="60" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">cryptographic integrity</text>
    <text x="100" y="74" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">tamper-evident log</text>
  </g>

  <!-- Arrow to SIEM -->
  <line x1="480" y1="60" x2="558" y2="60" class="flow" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="555,55 565,60 555,65" fill="#00d4aa" opacity="0.5"/>

  <!-- SIEM export (right) -->
  <g transform="translate(570, 25)">
    <rect x="0" y="0" width="190" height="70" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5"/>
    <text x="95" y="22" font-family="system-ui" font-size="11" fill="#4488ff" text-anchor="middle" font-weight="600">SIEM System</text>
    <text x="95" y="42" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">your organization's choice</text>
    <text x="95" y="58" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle">export ready</text>
  </g>

  <!-- Log entries animation -->
  <g transform="translate(310, 110)" class="log">
    <rect x="0" y="0" width="160" height="16" rx="3" fill="#1a1a2e" stroke="#00d4aa" stroke-width="0.5" opacity="0.5"/>
    <text x="80" y="12" font-family="'SF Mono', monospace" font-size="7" fill="#00d4aa" text-anchor="middle">2026-03-29 transfer #847</text>
  </g>

  <text x="400" y="170" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">Every event logged. The core never touches compliance logic.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes shieldPulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.3; } }
    @keyframes countUp { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes critFlash { 0%, 70%, 100% { opacity: 0.7; } 80% { opacity: 1; } }
    .f1 { animation: fadeIn 0.4s ease-out 0.2s both; }
    .f2 { animation: fadeIn 0.4s ease-out 0.5s both; }
    .f3 { animation: fadeIn 0.4s ease-out 0.8s both; }
    .f4 { animation: fadeIn 0.4s ease-out 1.1s both; }
    .f5 { animation: fadeIn 0.4s ease-out 1.4s both; }
    .f6 { animation: fadeIn 0.4s ease-out 1.7s both; }
    .shield { animation: shieldPulse 3s ease-in-out infinite; }
    .crit { animation: critFlash 2s ease-in-out infinite; }
    .cnt { animation: countUp 0.3s ease-out both; }
    .c1 { animation-delay: 2s; }
    .c2 { animation-delay: 2.3s; }
    .c3 { animation-delay: 2.6s; }
    .c4 { animation-delay: 2.9s; }
    .c5 { animation-delay: 3.2s; }
    text { font-family: system-ui, -apple-system, sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>

  <rect width="800" height="400" fill="#0a0a1a"/>
  <text x="400" y="28" text-anchor="middle" font-size="13" fill="#666" letter-spacing="1">20 ATTACK VECTORS ANALYZED - ALL MITIGATED</text>

  <!-- Central shield -->
  <circle cx="400" cy="200" r="90" stroke="#00d4aa" stroke-width="1.5" fill="#00d4aa" fill-opacity="0.03" class="shield"/>
  <circle cx="400" cy="200" r="70" stroke="#00d4aa" stroke-width="1" fill="#00d4aa" fill-opacity="0.02"/>
  <text x="400" y="190" text-anchor="middle" font-size="32" font-weight="800" fill="#00d4aa" opacity="0.8">20</text>
  <text x="400" y="210" text-anchor="middle" font-size="11" fill="#00d4aa" opacity="0.6">vectors</text>
  <text x="400" y="228" text-anchor="middle" font-size="10" fill="#888">all mitigated</text>

  <!-- Category A: Filesystem (top-left) -->
  <g class="f1">
    <rect x="40" y="65" width="190" height="105" rx="8" stroke="#ff6b6b" stroke-width="1" fill="#ff6b6b" fill-opacity="0.04"/>
    <text x="135" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#ff6b6b">Filesystem</text>
    <text x="135" y="108" text-anchor="middle" font-size="10" fill="#888">store tampering</text>
    <text x="135" y="123" text-anchor="middle" font-size="10" fill="#888">symlink races</text>
    <text x="135" y="138" text-anchor="middle" font-size="10" fill="#888">replay via restore</text>
    <text x="135" y="153" text-anchor="middle" font-size="10" fill="#888">inotify race</text>
    <!-- Count badge inside box -->
    <circle cx="205" cy="85" r="13" fill="#ff6b6b" fill-opacity="0.2" stroke="#ff6b6b" stroke-width="0.5"/>
    <text x="205" y="90" text-anchor="middle" font-size="12" fill="#ff6b6b" font-weight="700" class="cnt c1">4</text>
  </g>

  <!-- Category B: Race Conditions (top-right) -->
  <g class="f2">
    <rect x="570" y="65" width="190" height="105" rx="8" stroke="#ffb347" stroke-width="1" fill="#ffb347" fill-opacity="0.04"/>
    <text x="665" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#ffb347">Race Conditions</text>
    <text x="665" y="108" text-anchor="middle" font-size="10" fill="#888">transfer outlives grant</text>
    <text x="665" y="123" text-anchor="middle" font-size="10" fill="#888">concurrent modification</text>
    <text x="665" y="138" text-anchor="middle" font-size="10" fill="#888">cleanup vs extension</text>
    <text x="665" y="153" text-anchor="middle" font-size="10" fill="#888">rapid grant-revoke</text>
    <circle cx="735" cy="85" r="13" fill="#ffb347" fill-opacity="0.2" stroke="#ffb347" stroke-width="0.5"/>
    <text x="735" y="90" text-anchor="middle" font-size="12" fill="#ffb347" font-weight="700" class="cnt c2">4</text>
  </g>

  <!-- Category C: Protocol (middle-left) -->
  <g class="f3">
    <rect x="40" y="200" width="190" height="110" rx="8" stroke="#ff6b6b" stroke-width="1.5" fill="#ff6b6b" fill-opacity="0.04" class="crit"/>
    <text x="135" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#ff6b6b">Protocol</text>
    <text x="135" y="245" text-anchor="middle" font-size="10" fill="#ff6b6b" font-weight="500">multi-relay bypass</text>
    <text x="135" y="260" text-anchor="middle" font-size="10" fill="#888">service bypass</text>
    <text x="135" y="275" text-anchor="middle" font-size="10" fill="#888">circuit reuse</text>
    <text x="135" y="290" text-anchor="middle" font-size="10" fill="#888">protocol downgrade</text>
    <circle cx="205" cy="220" r="13" fill="#ff6b6b" fill-opacity="0.2" stroke="#ff6b6b" stroke-width="0.5"/>
    <text x="205" y="225" text-anchor="middle" font-size="12" fill="#ff6b6b" font-weight="700" class="cnt c3">4</text>
    <!-- CRITICAL badge - proper pill -->
    <rect x="60" y="237" width="50" height="14" rx="7" fill="#ff6b6b" fill-opacity="0.25" class="crit"/>
    <text x="85" y="248" text-anchor="middle" font-size="8" fill="#ff6b6b" font-weight="700" class="crit">CRITICAL</text>
  </g>

  <!-- Category D: Info Leaks (middle-right) -->
  <g class="f4">
    <rect x="570" y="200" width="190" height="110" rx="8" stroke="#4488ff" stroke-width="1" fill="#4488ff" fill-opacity="0.04"/>
    <text x="665" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#4488ff">Info Leaks</text>
    <text x="665" y="245" text-anchor="middle" font-size="10" fill="#888">timing oracle</text>
    <text x="665" y="260" text-anchor="middle" font-size="10" fill="#888">log injection</text>
    <text x="665" y="275" text-anchor="middle" font-size="10" fill="#888">log tampering</text>
    <text x="665" y="290" text-anchor="middle" font-size="10" fill="#888">metadata exposure</text>
    <circle cx="735" cy="220" r="13" fill="#4488ff" fill-opacity="0.2" stroke="#4488ff" stroke-width="0.5"/>
    <text x="735" y="225" text-anchor="middle" font-size="12" fill="#4488ff" font-weight="700" class="cnt c4">4</text>
  </g>

  <!-- Category E: Design (bottom-center) -->
  <g class="f5">
    <rect x="250" y="330" width="300" height="55" rx="8" stroke="#9966ff" stroke-width="1" fill="#9966ff" fill-opacity="0.04"/>
    <text x="400" y="352" text-anchor="middle" font-size="13" font-weight="600" fill="#9966ff">Design</text>
    <text x="400" y="370" text-anchor="middle" font-size="10" fill="#888">confused deputy, ACL vs caps, notification gap, fatigue</text>
    <circle cx="525" cy="347" r="13" fill="#9966ff" fill-opacity="0.2" stroke="#9966ff" stroke-width="0.5"/>
    <text x="525" y="352" text-anchor="middle" font-size="12" fill="#9966ff" font-weight="700" class="cnt c5">4</text>
  </g>

  <!-- Risk summary -->
  <g class="f6">
    <text x="400" y="55" text-anchor="middle" font-size="10" fill="#888">
      <tspan fill="#ff6b6b" font-weight="600">1 CRITICAL</tspan>
      <tspan fill="#555"> / </tspan>
      <tspan fill="#ff6b6b">4 HIGH</tspan>
      <tspan fill="#555"> / </tspan>
      <tspan fill="#ffb347">7 MEDIUM</tspan>
      <tspan fill="#555"> / </tspan>
      <tspan fill="#4488ff">4 LOW</tspan>
      <tspan fill="#555"> / </tspan>
      <tspan fill="#9966ff">4 DESIGN</tspan>
    </text>
  </g>

  <!-- Connecting lines to center -->
  <line x1="230" y1="130" x2="315" y2="170" stroke="#ff6b6b" stroke-width="0.5" opacity="0.15"/>
  <line x1="570" y1="130" x2="485" y2="170" stroke="#ffb347" stroke-width="0.5" opacity="0.15"/>
  <line x1="230" y1="250" x2="315" y2="220" stroke="#ff6b6b" stroke-width="0.5" opacity="0.15"/>
  <line x1="570" y1="250" x2="485" y2="220" stroke="#4488ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="330" x2="400" y2="290" stroke="#9966ff" stroke-width="0.5" opacity="0.15"/>
</svg>

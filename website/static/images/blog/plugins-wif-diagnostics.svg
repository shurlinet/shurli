<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes alertPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
      .flow { stroke-dasharray: 6 4; animation: dashFlow 1.5s linear infinite; }
      .alert { animation: alertPulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Diagnostics agent (center) -->
  <g transform="translate(280, 20)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2"/>
    <text x="100" y="22" font-family="system-ui" font-size="12" fill="#00d4aa" text-anchor="middle" font-weight="600">Diagnostics Agent</text>
    <text x="100" y="42" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">monitors: health, latency, quality</text>
    <text x="100" y="58" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">degradation detected</text>
    <text x="100" y="72" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">adjusts routing automatically</text>
  </g>

  <!-- Monitoring probes (left) -->
  <g transform="translate(40, 25)">
    <rect x="0" y="0" width="130" height="28" rx="5" fill="#1a1a2e" stroke="#4488ff" stroke-width="1"/>
    <text x="65" y="18" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle">peer latency: 12ms</text>
  </g>
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="130" height="28" rx="5" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1" class="alert"/>
    <text x="65" y="18" font-family="system-ui" font-size="9" fill="#ff6b6b" text-anchor="middle">relay: dropping</text>
  </g>

  <!-- Probes to agent -->
  <line x1="175" y1="39" x2="275" y2="50" class="flow" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <line x1="175" y1="74" x2="275" y2="60" class="flow" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>

  <!-- Actions (right) -->
  <g transform="translate(590, 20)">
    <rect x="0" y="0" width="170" height="32" rx="5" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1"/>
    <text x="85" y="13" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle" font-weight="600">reroute traffic</text>
    <text x="85" y="26" font-family="system-ui" font-size="8" fill="#bbb" text-anchor="middle">bad relay deprioritized</text>
  </g>
  <g transform="translate(590, 60)">
    <rect x="0" y="0" width="170" height="32" rx="5" fill="#1a1a2e" stroke="#ffb347" stroke-width="1"/>
    <text x="85" y="13" font-family="system-ui" font-size="9" fill="#ffb347" text-anchor="middle" font-weight="600">alert other agents</text>
    <text x="85" y="26" font-family="system-ui" font-size="8" fill="#bbb" text-anchor="middle">network-wide awareness</text>
  </g>

  <!-- Agent to actions -->
  <line x1="485" y1="45" x2="585" y2="36" class="flow" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
  <line x1="485" y1="55" x2="585" y2="76" class="flow" stroke="#ffb347" stroke-width="1.5" opacity="0.5"/>

  <text x="400" y="140" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">No human dashboard required. The agent monitors, decides, and acts.</text>

  <!-- Plugin badge -->
  <g transform="translate(300, 155)">
    <rect x="0" y="0" width="180" height="24" rx="5" fill="#1a1a2e" stroke="#ffb347" stroke-width="1" opacity="0.6"/>
    <text x="90" y="16" font-family="system-ui" font-size="9" fill="#ffb347" text-anchor="middle">Autonomous Diagnostics Plugin</text>
  </g>
</svg>

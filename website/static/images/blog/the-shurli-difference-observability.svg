<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1820;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1d20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="netFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4561;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e2d40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="authFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2545;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1830;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="zkpFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1e2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c1624;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sysFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162c24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="260" rx="12" fill="url(#bgGrad)"/>

  <text x="400" y="28" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5" text-anchor="middle" font-weight="600">Full Observability</text>

  <!-- Metric categories grid (3x2) -->
  <!-- Row 1 -->
  <rect x="30" y="45" width="240" height="70" rx="8" fill="url(#netFill)" stroke="#7aa2f7" stroke-width="1"/>
  <text x="50" y="63" font-family="SF Mono, monospace" font-size="10" fill="#7aa2f7" font-weight="600">Network</text>
  <text x="200" y="63" font-family="SF Mono, monospace" font-size="10" fill="#7aa2f7" text-anchor="end" font-weight="700">10</text>
  <text x="50" y="78" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">connections, paths, hole punches</text>
  <text x="50" y="91" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">peer counts, discovery events</text>
  <!-- Sparkline -->
  <polyline points="210,72 218,65 226,70 234,60 242,68 250,58 258,66" fill="none" stroke="#7aa2f7" stroke-width="1" opacity="0.5"/>

  <rect x="280" y="45" width="240" height="70" rx="8" fill="url(#nodeFill)" stroke="#e0af68" stroke-width="1"/>
  <text x="300" y="63" font-family="SF Mono, monospace" font-size="10" fill="#e0af68" font-weight="600">Proxy</text>
  <text x="450" y="63" font-family="SF Mono, monospace" font-size="10" fill="#e0af68" text-anchor="end" font-weight="700">4</text>
  <text x="300" y="78" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">throughput, sessions</text>
  <text x="300" y="91" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">bytes transferred</text>
  <polyline points="460,72 468,68 476,74 484,62 492,70 500,64 508,69" fill="none" stroke="#e0af68" stroke-width="1" opacity="0.5"/>

  <rect x="530" y="45" width="240" height="70" rx="8" fill="url(#authFill)" stroke="#bb9af7" stroke-width="1"/>
  <text x="550" y="63" font-family="SF Mono, monospace" font-size="10" fill="#bb9af7" font-weight="600">Auth</text>
  <text x="700" y="63" font-family="SF Mono, monospace" font-size="10" fill="#bb9af7" text-anchor="end" font-weight="700">6</text>
  <text x="550" y="78" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">pairing, invites</text>
  <text x="550" y="91" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">macaroon verifications</text>
  <polyline points="710,72 718,65 726,72 734,58 742,66 750,60 758,67" fill="none" stroke="#bb9af7" stroke-width="1" opacity="0.5"/>

  <!-- Row 2 -->
  <rect x="30" y="125" width="240" height="70" rx="8" fill="url(#nodeFill)" stroke="#da1c5c" stroke-width="1"/>
  <text x="50" y="143" font-family="SF Mono, monospace" font-size="10" fill="#da1c5c" font-weight="600">Vault</text>
  <text x="200" y="143" font-family="SF Mono, monospace" font-size="10" fill="#da1c5c" text-anchor="end" font-weight="700">4</text>
  <text x="50" y="158" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">seal state, seal/unseal events</text>
  <text x="50" y="171" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">lockout counts</text>
  <polyline points="210,152 218,148 226,155 234,145 242,150 250,142 258,148" fill="none" stroke="#da1c5c" stroke-width="1" opacity="0.5"/>

  <rect x="280" y="125" width="240" height="70" rx="8" fill="url(#zkpFill)" stroke="#f7768e" stroke-width="1"/>
  <text x="300" y="143" font-family="SF Mono, monospace" font-size="10" fill="#f7768e" font-weight="600">Zero-Knowledge</text>
  <text x="450" y="143" font-family="SF Mono, monospace" font-size="10" fill="#f7768e" text-anchor="end" font-weight="700">14</text>
  <text x="300" y="158" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">proof gen/verify latency</text>
  <text x="300" y="171" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">auth outcomes, tree state</text>
  <polyline points="460,152 468,145 476,152 484,140 492,148 500,138 508,146" fill="none" stroke="#f7768e" stroke-width="1" opacity="0.5"/>

  <rect x="530" y="125" width="240" height="70" rx="8" fill="url(#sysFill)" stroke="#9ece6a" stroke-width="1"/>
  <text x="550" y="143" font-family="SF Mono, monospace" font-size="10" fill="#9ece6a" font-weight="600">System</text>
  <text x="700" y="143" font-family="SF Mono, monospace" font-size="10" fill="#9ece6a" text-anchor="end" font-weight="700">6</text>
  <text x="550" y="158" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">API latency, audit events</text>
  <text x="550" y="171" font-family="system-ui, sans-serif" font-size="8" fill="#a9b1d6">daemon health</text>
  <polyline points="710,152 718,148 726,155 734,142 742,150 750,144 758,149" fill="none" stroke="#9ece6a" stroke-width="1" opacity="0.5"/>

  <!-- Bottom: total + grafana -->
  <rect x="100" y="210" width="600" height="36" rx="8" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.8"/>
  <text x="250" y="232" font-family="SF Mono, monospace" font-size="12" fill="#c0caf5" text-anchor="middle" font-weight="700">44 custom metrics</text>
  <text x="400" y="232" font-family="system-ui, sans-serif" font-size="11" fill="#565f89" text-anchor="middle">|</text>
  <text x="550" y="232" font-family="SF Mono, monospace" font-size="12" fill="#e0af68" text-anchor="middle" font-weight="700">56 Grafana panels</text>

  <!-- Nil-safe note -->
  <text x="400" y="254" font-family="system-ui, sans-serif" font-size="8" fill="#565f89" text-anchor="middle">Every metric helper is nil-safe: no --metrics-addr = zero overhead. Import the JSON, point at Prometheus, done.</text>
</svg>
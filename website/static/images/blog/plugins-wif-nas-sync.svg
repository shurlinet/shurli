<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes dashFlowReverse { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 12; } }
      @keyframes syncPulse { 0%, 100% { stroke-opacity: 0.4; } 50% { stroke-opacity: 1; } }
      .flow { stroke-dasharray: 6 4; animation: dashFlow 1.5s linear infinite; }
      .flowBack { stroke-dasharray: 6 4; animation: dashFlowReverse 1.5s linear infinite; }
      .sync { animation: syncPulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- NAS A (left) -->
  <g transform="translate(40, 25)">
    <rect x="0" y="0" width="170" height="80" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2" class="sync"/>
    <text x="85" y="22" font-family="system-ui" font-size="12" fill="#00d4aa" text-anchor="middle" font-weight="600">NAS (Home)</text>
    <line x1="15" y1="30" x2="155" y2="30" stroke="#00d4aa" stroke-width="0.5" opacity="0.3"/>
    <text x="85" y="46" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">file change detected</text>
    <text x="85" y="60" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">delta computed</text>
    <text x="85" y="74" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">sending changes only</text>
  </g>

  <!-- Bidirectional sync arrows -->
  <line x1="215" y1="55" x2="318" y2="55" class="flow" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
  <line x1="318" y1="68" x2="215" y2="68" class="flowBack" stroke="#4488ff" stroke-width="2" opacity="0.5"/>

  <!-- Delta badge -->
  <g transform="translate(230, 38)">
    <rect x="0" y="0" width="70" height="18" rx="4" fill="#1a1a2e" stroke="#ffb347" stroke-width="1" opacity="0.6"/>
    <text x="35" y="13" font-family="'SF Mono', monospace" font-size="7" fill="#ffb347" text-anchor="middle">delta only</text>
  </g>

  <!-- Sync engine (center) -->
  <g transform="translate(325, 25)">
    <rect x="0" y="0" width="150" height="80" rx="10" fill="#1a1a2e" stroke="#ffb347" stroke-width="1.5"/>
    <text x="75" y="22" font-family="system-ui" font-size="11" fill="#ffb347" text-anchor="middle" font-weight="600">NAS Sync Plugin</text>
    <line x1="15" y1="30" x2="135" y2="30" stroke="#ffb347" stroke-width="0.5" opacity="0.3"/>
    <text x="75" y="46" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">conflict resolution</text>
    <text x="75" y="60" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">bandwidth budgets</text>
    <text x="75" y="74" font-family="system-ui" font-size="9" fill="#ffb347" text-anchor="middle">continuous</text>
  </g>

  <!-- Sync arrows right -->
  <line x1="480" y1="55" x2="583" y2="55" class="flow" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
  <line x1="583" y1="68" x2="480" y2="68" class="flowBack" stroke="#4488ff" stroke-width="2" opacity="0.5"/>

  <!-- NAS B (right) -->
  <g transform="translate(590, 25)">
    <rect x="0" y="0" width="170" height="80" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="2" class="sync"/>
    <text x="85" y="22" font-family="system-ui" font-size="12" fill="#4488ff" text-anchor="middle" font-weight="600">NAS (Office)</text>
    <line x1="15" y1="30" x2="155" y2="30" stroke="#4488ff" stroke-width="0.5" opacity="0.3"/>
    <text x="85" y="46" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">delta applied</text>
    <text x="85" y="60" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">in sync</text>
    <text x="85" y="74" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle">both copies current</text>
  </g>

  <text x="400" y="145" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">Transfers deltas, not full files. Respects bandwidth budgets. Your personal cloud, without the cloud.</text>

  <text x="400" y="180" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">Two NAS devices, two locations, continuous sync, zero cloud dependency.</text>
</svg>

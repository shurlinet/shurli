<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" fill="none">
  <style>
    @keyframes byteFlow { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes hmacBuild { from { stroke-dashoffset: 300; } to { stroke-dashoffset: 0; } }
    @keyframes resultGlow { from { opacity: 0; } to { opacity: 1; } }
    @keyframes streamOpen { from { width: 0; } to { width: 580px; } }
    @keyframes verifyPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .byte1 { animation: byteFlow 4s ease-in-out infinite; }
    .byte2 { animation: byteFlow 4s ease-in-out infinite 0.3s; }
    .byte3 { animation: byteFlow 4s ease-in-out infinite 0.6s; }
    .byte4 { animation: byteFlow 4s ease-in-out infinite 0.9s; }
    .hmac-line { stroke-dasharray: 300; animation: hmacBuild 2s ease-out 2s both; }
    .result { animation: resultGlow 4s ease-out infinite; }
    .vpulse { animation: verifyPulse 2s ease-in-out infinite 3s; }
    text { font-family: system-ui, -apple-system, sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>

  <rect width="800" height="350" fill="#0a0a1a"/>
  <text x="400" y="28" text-anchor="middle" font-size="13" fill="#666" letter-spacing="1">BINARY GRANT HEADER - EVERY PLUGIN STREAM</text>

  <!-- Stream pipe -->
  <rect x="100" y="55" width="600" height="50" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="400" y="45" text-anchor="middle" font-size="10" fill="#555">plugin stream open</text>

  <!-- Header bytes flowing in -->
  <g transform="translate(120, 80)">
    <!-- Byte 0: Version -->
    <g class="byte1">
      <rect x="0" y="-14" width="65" height="28" rx="4" fill="#00d4aa" fill-opacity="0.15" stroke="#00d4aa" stroke-width="1"/>
      <text x="32" y="-1" text-anchor="middle" font-size="8" fill="#00d4aa" class="mono">0x01</text>
      <text x="32" y="9" text-anchor="middle" font-size="7" fill="#00d4aa" opacity="0.5">version</text>
    </g>

    <!-- Byte 1: Flags -->
    <g class="byte2" transform="translate(75, 0)">
      <rect x="0" y="-14" width="65" height="28" rx="4" fill="#ffb347" fill-opacity="0.15" stroke="#ffb347" stroke-width="1"/>
      <text x="32" y="-1" text-anchor="middle" font-size="8" fill="#ffb347" class="mono">0x01</text>
      <text x="32" y="9" text-anchor="middle" font-size="7" fill="#ffb347" opacity="0.5">has token</text>
    </g>

    <!-- Bytes 2-3: Length -->
    <g class="byte3" transform="translate(150, 0)">
      <rect x="0" y="-14" width="65" height="28" rx="4" fill="#4488ff" fill-opacity="0.15" stroke="#4488ff" stroke-width="1"/>
      <text x="32" y="-1" text-anchor="middle" font-size="8" fill="#4488ff" class="mono">0x00A4</text>
      <text x="32" y="9" text-anchor="middle" font-size="7" fill="#4488ff" opacity="0.5">164 bytes</text>
    </g>

    <!-- Bytes 4-N: Token -->
    <g class="byte4" transform="translate(225, 0)">
      <rect x="0" y="-14" width="330" height="28" rx="4" fill="#00d4aa" fill-opacity="0.08" stroke="#00d4aa" stroke-width="0.5" stroke-dasharray="4 2"/>
      <text x="165" y="3" text-anchor="middle" font-size="9" fill="#00d4aa" class="mono" opacity="0.7">base64(macaroon_token...)</text>
    </g>
  </g>

  <!-- Verification process -->
  <g transform="translate(400, 155)">
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#888">Verification (no disk I/O)</text>

    <!-- HMAC chain rebuild -->
    <g transform="translate(0, 25)">
      <rect x="-250" y="-15" width="500" height="60" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="0.5"/>

      <text x="-220" y="5" font-size="9" fill="#00d4aa" class="mono" opacity="0.6">root_key</text>
      <text x="-160" y="5" font-size="12" fill="#555">-></text>
      <text x="-130" y="5" font-size="9" fill="#00d4aa" class="mono">HMAC</text>
      <text x="-95" y="5" font-size="12" fill="#555">-></text>
      <text x="-65" y="5" font-size="9" fill="#ffb347" class="mono">HMAC</text>
      <text x="-30" y="5" font-size="12" fill="#555">-></text>
      <text x="0" y="5" font-size="9" fill="#4488ff" class="mono">HMAC</text>
      <text x="35" y="5" font-size="12" fill="#555">-></text>

      <!-- Animated comparison -->
      <g class="vpulse" transform="translate(80, 0)">
        <text x="0" y="5" font-size="9" fill="#00d4aa" class="mono">sig == sig?</text>
      </g>

      <line x1="-240" y1="20" x2="160" y2="20" class="hmac-line" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>

      <text x="0" y="35" text-anchor="middle" font-size="8" fill="#555">rebuild chain from root key, compare final signature</text>
    </g>
  </g>

  <!-- Three outcomes -->
  <!-- ALLOW -->
  <g class="result">
    <rect x="95" y="240" width="185" height="58" rx="8" fill="#00d4aa" fill-opacity="0.06" stroke="#00d4aa" stroke-width="1"/>
    <circle cx="120" cy="267" r="12" fill="#00d4aa" fill-opacity="0.2"/>
    <path d="M115,267 L118,270 L126,262" stroke="#00d4aa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="190" y="263" text-anchor="middle" font-size="14" fill="#00d4aa" font-weight="600">ALLOW</text>
    <text x="190" y="282" text-anchor="middle" font-size="11" fill="#888">relay permitted</text>
  </g>

  <!-- DENY -->
  <g class="result">
    <rect x="308" y="240" width="185" height="58" rx="8" fill="#ff6b6b" fill-opacity="0.06" stroke="#ff6b6b" stroke-width="1"/>
    <circle cx="333" cy="267" r="12" fill="#ff6b6b" fill-opacity="0.2"/>
    <line x1="328" y1="262" x2="338" y2="272" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="338" y1="262" x2="328" y2="272" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round"/>
    <text x="403" y="263" text-anchor="middle" font-size="14" fill="#ff6b6b" font-weight="600">DENY</text>
    <text x="403" y="282" text-anchor="middle" font-size="11" fill="#888">constant-time</text>
  </g>

  <!-- FALLBACK -->
  <g class="result">
    <rect x="521" y="240" width="185" height="58" rx="8" fill="#ffb347" fill-opacity="0.06" stroke="#ffb347" stroke-width="1"/>
    <circle cx="546" cy="267" r="12" fill="#ffb347" fill-opacity="0.2"/>
    <text x="546" y="272" text-anchor="middle" font-size="14" fill="#ffb347">?</text>
    <text x="616" y="263" text-anchor="middle" font-size="14" fill="#ffb347" font-weight="600">FALLBACK</text>
    <text x="616" y="282" text-anchor="middle" font-size="11" fill="#888">local store lookup</text>
  </g>

  <!-- 4-byte overhead note -->
  <text x="400" y="330" text-anchor="middle" font-size="12" fill="#555">4 bytes overhead when no token (stack-allocated fast path)</text>
</svg>

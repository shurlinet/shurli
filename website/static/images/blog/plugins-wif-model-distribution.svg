<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes pulseGlow { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
      .flow { stroke-dasharray: 6 4; animation: dashFlow 1.5s linear infinite; }
      .glow { animation: pulseGlow 3s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="800" height="220" fill="url(#bg)"/>

  <!-- Source node (left) -->
  <g transform="translate(40, 30)">
    <rect x="0" y="0" width="170" height="75" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2" class="glow"/>
    <text x="85" y="20" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">Source Node</text>
    <text x="85" y="38" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">full model weights</text>
    <text x="85" y="52" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">chunks into shards</text>
    <text x="85" y="66" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">multi-peer transfer</text>
  </g>

  <!-- Fan-out arrows -->
  <line x1="215" y1="50" x2="388" y2="25" class="flow" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="60" x2="388" y2="60" class="flow" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="70" x2="388" y2="95" class="flow" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="80" x2="388" y2="130" class="flow" stroke="#4488ff" stroke-width="1.5" opacity="0.4"/>

  <!-- Shard badge -->
  <g transform="translate(265, 42)">
    <rect x="0" y="0" width="80" height="20" rx="4" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
    <text x="40" y="14" font-family="'SF Mono', monospace" font-size="8" fill="#00d4aa" text-anchor="middle">shards</text>
  </g>

  <!-- Lab nodes (right, stacked) -->
  <g transform="translate(395, 10)">
    <rect x="0" y="0" width="130" height="32" rx="5" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="65" y="13" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle" font-weight="600">Lab Node 1</text>
    <text x="65" y="26" font-family="system-ui" font-size="8" fill="#bbb" text-anchor="middle">shard A &#10003;</text>
  </g>
  <g transform="translate(395, 48)">
    <rect x="0" y="0" width="130" height="32" rx="5" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5"/>
    <text x="65" y="13" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle" font-weight="600">Lab Node 2</text>
    <text x="65" y="26" font-family="system-ui" font-size="8" fill="#bbb" text-anchor="middle">shard B &#10003;</text>
  </g>
  <g transform="translate(395, 86)">
    <rect x="0" y="0" width="130" height="32" rx="5" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5"/>
    <text x="65" y="13" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle" font-weight="600">Lab Node 3</text>
    <text x="65" y="26" font-family="system-ui" font-size="8" fill="#bbb" text-anchor="middle">shard C &#10003;</text>
  </g>
  <g transform="translate(395, 124)">
    <rect x="0" y="0" width="130" height="32" rx="5" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5"/>
    <text x="65" y="13" font-family="system-ui" font-size="9" fill="#4488ff" text-anchor="middle" font-weight="600">Lab Node 4</text>
    <text x="65" y="26" font-family="system-ui" font-size="8" fill="#bbb" text-anchor="middle">shard D &#10003;</text>
  </g>

  <!-- Reassemble arrows -->
  <line x1="530" y1="26" x2="588" y2="60" class="flow" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
  <line x1="530" y1="64" x2="588" y2="64" class="flow" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <line x1="530" y1="102" x2="588" y2="68" class="flow" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <line x1="530" y1="140" x2="588" y2="72" class="flow" stroke="#4488ff" stroke-width="1" opacity="0.4"/>

  <!-- Reassembled node -->
  <g transform="translate(595, 35)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="80" y="20" font-family="system-ui" font-size="10" fill="#00d4aa" text-anchor="middle" font-weight="600">Any Requesting Node</text>
    <text x="80" y="38" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">parallel download</text>
    <text x="80" y="52" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">full model reassembled</text>
  </g>

  <text x="400" y="195" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">One node with the model serves twenty others simultaneously using multi-peer transfer.</text>
</svg>

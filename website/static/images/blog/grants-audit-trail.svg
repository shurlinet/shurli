<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <style>
    @keyframes boxGlow1 { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
    @keyframes boxGlow2 { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
    @keyframes boxGlow3 { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
    @keyframes boxGlow4 { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
    @keyframes chainDash { from { stroke-dashoffset: 12; } to { stroke-dashoffset: 0; } }
    @keyframes hashPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }
    @keyframes tamperFlash { 0%, 70%, 100% { opacity: 0.3; } 75%, 95% { opacity: 1; } }
    @keyframes breakFade { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.45; } }
    .g1 { animation: boxGlow1 3s ease-in-out infinite; }
    .g2 { animation: boxGlow2 3s ease-in-out infinite 0.7s; }
    .g3 { animation: boxGlow3 3s ease-in-out infinite 1.4s; }
    .g4 { animation: boxGlow4 3s ease-in-out infinite 2.1s; }
    .chain { stroke-dasharray: 6 6; animation: chainDash 1.5s linear infinite; }
    .ch2 { animation-delay: 0.5s; }
    .ch3 { animation-delay: 1s; }
    .hp { animation: hashPulse 2s ease-in-out infinite; }
    .hp2 { animation: hashPulse 2s ease-in-out infinite 0.5s; }
    .hp3 { animation: hashPulse 2s ease-in-out infinite 1s; }
    .hp4 { animation: hashPulse 2s ease-in-out infinite 1.5s; }
    .tamper { animation: tamperFlash 3s ease-in-out infinite; }
    .broken { animation: breakFade 3s ease-in-out infinite; }
    text { font-family: system-ui, -apple-system, sans-serif; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>

  <rect width="800" height="380" fill="#0a0a1a"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" fill="#666" letter-spacing="1">INTEGRITY-CHAINED AUDIT LOG</text>

  <!-- Entry 1: grant_created -->
  <rect x="20" y="48" width="170" height="88" rx="6" stroke="#00d4aa" stroke-width="1" fill="#00d4aa" fill-opacity="0.04" class="g1"/>
  <text x="105" y="70" text-anchor="middle" font-size="11" fill="#00d4aa" font-weight="600" class="mono">grant_created</text>
  <text x="105" y="88" text-anchor="middle" font-size="10" fill="#888">peer-B, 1h, browse</text>
  <text x="105" y="104" text-anchor="middle" font-size="9" fill="#00d4aa" opacity="0.4" class="mono">prev: (empty)</text>
  <rect x="30" y="112" width="150" height="16" rx="3" fill="#00d4aa" fill-opacity="0.08"/>
  <text x="105" y="124" text-anchor="middle" font-size="8" fill="#00d4aa" class="mono hp">HMAC: a7f3...2e1b</text>

  <!-- Chain 1->2 -->
  <line x1="190" y1="92" x2="225" y2="92" stroke="#00d4aa" stroke-width="2" class="chain"/>
  <polygon points="222,88 232,92 222,96" fill="#00d4aa" opacity="0.5"/>

  <!-- Entry 2: grant_extended -->
  <rect x="235" y="48" width="170" height="88" rx="6" stroke="#ffb347" stroke-width="1" fill="#ffb347" fill-opacity="0.04" class="g2"/>
  <text x="320" y="70" text-anchor="middle" font-size="11" fill="#ffb347" font-weight="600" class="mono">grant_extended</text>
  <text x="320" y="88" text-anchor="middle" font-size="10" fill="#888">peer-B, +2h</text>
  <text x="320" y="104" text-anchor="middle" font-size="9" fill="#ffb347" opacity="0.4" class="mono">prev: a7f3...2e1b</text>
  <rect x="245" y="112" width="150" height="16" rx="3" fill="#ffb347" fill-opacity="0.08"/>
  <text x="320" y="124" text-anchor="middle" font-size="8" fill="#ffb347" class="mono hp2">HMAC: c1d9...8f4a</text>

  <!-- Chain 2->3 -->
  <line x1="405" y1="92" x2="440" y2="92" stroke="#ffb347" stroke-width="2" class="chain ch2"/>
  <polygon points="437,88 447,92 437,96" fill="#ffb347" opacity="0.5"/>

  <!-- Entry 3: grant_revoked -->
  <rect x="450" y="48" width="170" height="88" rx="6" stroke="#ff6b6b" stroke-width="1" fill="#ff6b6b" fill-opacity="0.04" class="g3"/>
  <text x="535" y="70" text-anchor="middle" font-size="11" fill="#ff6b6b" font-weight="600" class="mono">grant_revoked</text>
  <text x="535" y="88" text-anchor="middle" font-size="10" fill="#888">peer-B</text>
  <text x="535" y="104" text-anchor="middle" font-size="9" fill="#ff6b6b" opacity="0.4" class="mono">prev: c1d9...8f4a</text>
  <rect x="460" y="112" width="150" height="16" rx="3" fill="#ff6b6b" fill-opacity="0.08"/>
  <text x="535" y="124" text-anchor="middle" font-size="8" fill="#ff6b6b" class="mono hp3">HMAC: e5b2...7c3d</text>

  <!-- Chain 3->4 -->
  <line x1="620" y1="92" x2="655" y2="92" stroke="#ff6b6b" stroke-width="2" class="chain ch3"/>
  <polygon points="652,88 662,92 652,96" fill="#ff6b6b" opacity="0.5"/>

  <!-- Entry 4: grant_expired -->
  <rect x="665" y="48" width="115" height="88" rx="6" stroke="#4488ff" stroke-width="1" fill="#4488ff" fill-opacity="0.04" class="g4"/>
  <text x="722" y="70" text-anchor="middle" font-size="10" fill="#4488ff" font-weight="600" class="mono">grant_expired</text>
  <text x="722" y="88" text-anchor="middle" font-size="10" fill="#888">peer-C</text>
  <text x="722" y="104" text-anchor="middle" font-size="8" fill="#4488ff" opacity="0.4" class="mono">prev: e5b2..</text>
  <rect x="675" y="112" width="95" height="16" rx="3" fill="#4488ff" fill-opacity="0.08"/>
  <text x="722" y="124" text-anchor="middle" font-size="7" fill="#4488ff" class="mono hp4">HMAC: f8a1..</text>

  <!-- HMAC formula -->
  <rect x="120" y="160" width="560" height="40" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
  <text x="400" y="185" text-anchor="middle" font-size="12" fill="#00d4aa" class="mono">HMAC-SHA256( key, prev_hash + entry_data ) = entry_hmac</text>

  <!-- Tamper detection demo -->
  <text x="400" y="230" text-anchor="middle" font-size="14" font-weight="600" fill="#ff6b6b">What happens if entry 2 is tampered?</text>

  <!-- Three boxes centered horizontally -->
  <!-- Box 1: MODIFIED -->
  <rect x="115" y="245" width="150" height="38" rx="6" stroke="#ff6b6b" stroke-width="1.5" fill="#ff6b6b" fill-opacity="0.1" class="tamper"/>
  <text x="190" y="269" text-anchor="middle" font-size="12" fill="#ff6b6b" font-weight="600" class="mono tamper">MODIFIED!</text>

  <!-- Arrow -->
  <line x1="265" y1="264" x2="310" y2="264" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  <polygon points="307,260 317,264 307,268" fill="#ff6b6b" opacity="0.5"/>

  <!-- Box 2: HMAC fails -->
  <rect x="320" y="245" width="150" height="38" rx="6" stroke="#ff6b6b" stroke-width="1" fill="none" stroke-dasharray="4 4" class="broken"/>
  <text x="395" y="269" text-anchor="middle" font-size="12" fill="#ff6b6b" class="mono broken">HMAC fails</text>

  <!-- Arrow -->
  <line x1="470" y1="264" x2="515" y2="264" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  <polygon points="512,260 522,264 512,268" fill="#ff6b6b" opacity="0.3"/>

  <!-- Box 3: invalid -->
  <rect x="525" y="245" width="150" height="38" rx="6" stroke="#ff6b6b" stroke-width="1" fill="none" stroke-dasharray="4 4" opacity="0.3" class="broken"/>
  <text x="600" y="269" text-anchor="middle" font-size="12" fill="#ff6b6b" opacity="0.4" class="mono broken">invalid</text>

  <text x="400" y="308" text-anchor="middle" font-size="11" fill="#ff6b6b" opacity="0.5">Breaking one entry invalidates ALL downstream entries</text>

  <!-- CLI command -->
  <rect x="250" y="330" width="300" height="28" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
  <text x="400" y="349" text-anchor="middle" font-size="11" fill="#00d4aa" class="mono">$ shurli auth audit --verify</text>
</svg>

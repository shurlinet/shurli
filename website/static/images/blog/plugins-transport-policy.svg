<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      @keyframes lockPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes checkPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      .header { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #bbb; text-anchor: middle; letter-spacing: 1px; text-transform: uppercase; }
      .flow-open { stroke-dasharray: 8 4; animation: dashFlow 2s linear infinite; }
      .flow-blocked { stroke-dasharray: 4 8; }
      .lock { animation: lockPulse 2s ease-in-out infinite; }
      .check { animation: checkPulse 2s ease-in-out infinite; }
      .f1 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
      .f2 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
      .f3 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    </style>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <text x="400" y="25" class="header">transport policy: relay is opt-in</text>

  <!-- Source node (left) -->
  <rect x="40" y="140" width="120" height="60" rx="10" fill="#1a1a2e" stroke="#e0e0e0" stroke-width="2"/>
  <text x="100" y="167" font-family="system-ui" font-size="13" fill="#e0e0e0" text-anchor="middle" font-weight="600">Your Node</text>
  <text x="100" y="185" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">plugin sends data</text>

  <!-- PATH 1: LAN (top, green, open) -->
  <g class="f1">
    <!-- Flow line -->
    <line x1="160" y1="155" x2="480" y2="75" class="flow-open" stroke="#00d4aa" stroke-width="2.5" opacity="0.7"/>

    <!-- Checkmark in circle -->
    <g class="check" transform="translate(305, 98)">
      <circle cx="0" cy="0" r="14" fill="#00d4aa" opacity="0.15" stroke="#00d4aa" stroke-width="1.5"/>
      <text x="0" y="5" font-family="system-ui" font-size="16" fill="#00d4aa" text-anchor="middle">&#10003;</text>
    </g>

    <!-- Destination -->
    <rect x="490" y="45" width="140" height="60" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2"/>
    <text x="560" y="70" font-family="system-ui" font-size="14" fill="#00d4aa" text-anchor="middle" font-weight="600">LAN Peer</text>
    <text x="560" y="88" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">home network</text>

    <!-- Label -->
    <text x="680" y="70" font-family="system-ui" font-size="11" fill="#00d4aa" font-weight="600">ALLOWED</text>
    <text x="680" y="86" font-family="system-ui" font-size="10" fill="#bbb">by default</text>
  </g>

  <!-- PATH 2: Direct (middle, blue, open) -->
  <g class="f2">
    <!-- Flow line -->
    <line x1="160" y1="170" x2="480" y2="170" class="flow-open" stroke="#4488ff" stroke-width="2.5" opacity="0.7"/>

    <!-- Checkmark in circle -->
    <g class="check" transform="translate(320, 170)">
      <circle cx="0" cy="0" r="14" fill="#4488ff" opacity="0.15" stroke="#4488ff" stroke-width="1.5"/>
      <text x="0" y="5" font-family="system-ui" font-size="16" fill="#4488ff" text-anchor="middle">&#10003;</text>
    </g>

    <!-- Destination -->
    <rect x="490" y="140" width="140" height="60" rx="10" fill="#1a1a2e" stroke="#4488ff" stroke-width="2"/>
    <text x="560" y="165" font-family="system-ui" font-size="14" fill="#4488ff" text-anchor="middle" font-weight="600">Direct Peer</text>
    <text x="560" y="183" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">public internet</text>

    <!-- Label -->
    <text x="680" y="165" font-family="system-ui" font-size="11" fill="#4488ff" font-weight="600">ALLOWED</text>
    <text x="680" y="181" font-family="system-ui" font-size="10" fill="#bbb">by default</text>
  </g>

  <!-- PATH 3: Relay (bottom, amber, BLOCKED) -->
  <g class="f3">
    <!-- Flow line (dimmer, blocked) -->
    <line x1="160" y1="185" x2="480" y2="270" class="flow-blocked" stroke="#ff6b6b" stroke-width="2.5" opacity="0.3"/>

    <!-- Lock icon in circle -->
    <g class="lock" transform="translate(305, 243)">
      <circle cx="0" cy="0" r="14" fill="#ff6b6b" opacity="0.1" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="-5" y="0" width="10" height="8" rx="2" fill="#ff6b6b" opacity="0.7"/>
      <path d="M-3 0 V-3 a4 4 0 0 1 6 0 V0" fill="none" stroke="#ff6b6b" stroke-width="1.2" opacity="0.7"/>
    </g>

    <!-- Destination (dimmed) -->
    <rect x="490" y="240" width="140" height="60" rx="10" fill="#1a1a2e" stroke="#ffb347" stroke-width="2" opacity="0.5"/>
    <text x="560" y="265" font-family="system-ui" font-size="14" fill="#ffb347" text-anchor="middle" font-weight="600" opacity="0.7">Relay</text>
    <text x="560" y="283" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle" opacity="0.6">third-party server</text>

    <!-- Label -->
    <text x="680" y="260" font-family="system-ui" font-size="11" fill="#ff6b6b" font-weight="600">BLOCKED</text>
    <text x="680" y="276" font-family="system-ui" font-size="10" fill="#bbb">unless plugin opts in</text>
  </g>

  <!-- Bottom: two plugin examples side by side -->
  <g transform="translate(80, 335)">
    <rect x="0" y="0" width="280" height="40" rx="6" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>
    <text x="140" y="16" font-family="system-ui" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">File Transfer</text>
    <text x="140" y="32" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">LAN &#10003;  Direct &#10003;  Relay &#10003;</text>
  </g>
  <g transform="translate(440, 335)">
    <rect x="0" y="0" width="280" height="40" rx="6" fill="#1a1a2e" stroke="#ffb347" stroke-width="1" opacity="0.5"/>
    <text x="140" y="16" font-family="system-ui" font-size="11" fill="#ffb347" text-anchor="middle" font-weight="600">Wake-on-LAN</text>
    <text x="140" y="32" font-family="system-ui" font-size="10" fill="#bbb" text-anchor="middle">LAN &#10003;  Direct &#10007;  Relay &#10007;</text>
  </g>

  <text x="400" y="395" font-family="system-ui" font-size="11" fill="#bbb" text-anchor="middle">Each plugin declares which paths are allowed. No data flows through relays unless explicitly permitted.</text>
</svg>

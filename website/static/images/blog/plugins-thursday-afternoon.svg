<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <style>
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes pulseGlow { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
      @keyframes dashFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
      .header { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #bbb; text-anchor: middle; letter-spacing: 1px; text-transform: uppercase; }
      .scene-title { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; }
      .scene-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; fill: #bbb; }
      .core-glow { animation: pulseGlow 3s ease-in-out infinite; }
      .connector { stroke-dasharray: 5 3; animation: dashFlow 2s linear infinite; }
      .f1 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
      .f2 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.7s; opacity: 0; }
      .f3 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.1s; opacity: 0; }
      .f4 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.5s; opacity: 0; }
      .f5 { animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.9s; opacity: 0; }
    </style>
  </defs>
  <rect width="800" height="460" fill="url(#bg)"/>

  <text x="400" y="22" class="header">your agent runs the network. you live your life.</text>

  <!-- Central: Home Server + AI Agent -->
  <rect x="320" y="165" width="160" height="75" rx="10" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2.5" class="core-glow"/>
  <text x="400" y="190" font-family="system-ui" font-size="14" fill="#00d4aa" text-anchor="middle" font-weight="600">Your Home Server</text>
  <text x="400" y="208" font-family="system-ui" font-size="11" fill="#bbb" text-anchor="middle">AI Agent running Shurli</text>
  <text x="400" y="228" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">you are asleep</text>

  <!-- Connectors from center to scenes -->
  <line x1="330" y1="185" x2="210" y2="95" class="connector" stroke="#00d4aa" stroke-width="1.5" opacity="0.3"/>
  <line x1="470" y1="185" x2="590" y2="95" class="connector" stroke="#ffb347" stroke-width="1.5" opacity="0.3"/>
  <line x1="320" y1="220" x2="170" y2="320" class="connector" stroke="#4488ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="480" y1="220" x2="630" y2="320" class="connector" stroke="#00d4aa" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="240" x2="400" y2="330" class="connector" stroke="#ff6b6b" stroke-width="1.5" opacity="0.3"/>

  <!-- Scene 1: Agent-to-Agent Transfer (top-left) -->
  <g class="f1" transform="translate(30, 40)">
    <rect x="0" y="0" width="190" height="95" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="95" y="20" class="scene-title" fill="#00d4aa" text-anchor="middle">Agent-to-Agent Transfer</text>
    <line x1="10" y1="28" x2="180" y2="28" stroke="#00d4aa" stroke-width="0.5" opacity="0.2"/>

    <!-- Two agent icons exchanging -->
    <rect x="15" y="38" width="45" height="22" rx="4" fill="#00d4aa" opacity="0.15" stroke="#00d4aa" stroke-width="1"/>
    <text x="37" y="53" font-family="system-ui" font-size="8" fill="#00d4aa" text-anchor="middle">Agent A</text>

    <text x="95" y="54" font-family="system-ui" font-size="12" fill="#00d4aa" text-anchor="middle">&#8594;</text>

    <rect x="130" y="38" width="45" height="22" rx="4" fill="#00d4aa" opacity="0.15" stroke="#00d4aa" stroke-width="1"/>
    <text x="152" y="53" font-family="system-ui" font-size="8" fill="#00d4aa" text-anchor="middle">Agent B</text>

    <text x="95" y="78" class="scene-desc" text-anchor="middle">"I need the draft files"</text>
    <text x="95" y="90" class="scene-desc" text-anchor="middle">No human on either end</text>
  </g>

  <!-- Scene 2: Payment + Relay (top-right) -->
  <g class="f2" transform="translate(580, 40)">
    <rect x="0" y="0" width="190" height="95" rx="8" fill="#1a1a2e" stroke="#ffb347" stroke-width="1.5"/>
    <text x="95" y="20" class="scene-title" fill="#ffb347" text-anchor="middle">Relay + Payment</text>
    <line x1="10" y1="28" x2="180" y2="28" stroke="#ffb347" stroke-width="0.5" opacity="0.2"/>

    <!-- Grant token with payment -->
    <rect x="55" y="36" width="80" height="24" rx="4" fill="#ffb347" opacity="0.1" stroke="#ffb347" stroke-width="1"/>
    <text x="95" y="52" font-family="'SF Mono', monospace" font-size="8" fill="#ffb347" text-anchor="middle">grant + payment</text>

    <text x="95" y="76" class="scene-desc" text-anchor="middle">50MB relay bandwidth paid</text>
    <text x="95" y="88" class="scene-desc" text-anchor="middle">The network has an economy</text>
  </g>

  <!-- Scene 3: IoT Trigger (bottom-left) -->
  <g class="f3" transform="translate(20, 290)">
    <rect x="0" y="0" width="190" height="95" rx="8" fill="#1a1a2e" stroke="#4488ff" stroke-width="1.5"/>
    <text x="95" y="20" class="scene-title" fill="#4488ff" text-anchor="middle">IoT + File Transfer</text>
    <line x1="10" y1="28" x2="180" y2="28" stroke="#4488ff" stroke-width="0.5" opacity="0.2"/>

    <!-- Camera icon (drawn) -> agent -> backup -->
    <g transform="translate(18, 38)">
      <rect x="0" y="2" width="22" height="14" rx="3" fill="none" stroke="#4488ff" stroke-width="1.5"/>
      <polygon points="22,5 30,2 30,16 22,13" fill="none" stroke="#4488ff" stroke-width="1.2"/>
      <circle cx="10" cy="9" r="3" fill="none" stroke="#4488ff" stroke-width="1" opacity="0.6"/>
    </g>
    <text x="55" y="52" font-family="system-ui" font-size="9" fill="#4488ff">camera</text>
    <text x="88" y="52" font-family="system-ui" font-size="10" fill="#4488ff">&#8594;</text>
    <text x="100" y="52" font-family="system-ui" font-size="9" fill="#4488ff">agent</text>
    <text x="130" y="52" font-family="system-ui" font-size="10" fill="#4488ff">&#8594;</text>
    <text x="142" y="52" font-family="system-ui" font-size="9" fill="#4488ff">backup</text>

    <text x="95" y="76" class="scene-desc" text-anchor="middle">Motion detected, footage backed up</text>
    <text x="95" y="88" class="scene-desc" text-anchor="middle">Two plugins, zero humans</text>
  </g>

  <!-- Scene 4: Reputation Routing (bottom-right) -->
  <g class="f4" transform="translate(590, 290)">
    <rect x="0" y="0" width="190" height="95" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="95" y="20" class="scene-title" fill="#00d4aa" text-anchor="middle">Reputation Routing</text>
    <line x1="10" y1="28" x2="180" y2="28" stroke="#00d4aa" stroke-width="0.5" opacity="0.2"/>

    <!-- Good path vs bad path -->
    <line x1="20" y1="50" x2="90" y2="50" stroke="#00d4aa" stroke-width="2" opacity="0.8"/>
    <text x="100" y="54" font-family="system-ui" font-size="9" fill="#00d4aa">reliable &#10003;</text>

    <line x1="20" y1="65" x2="90" y2="65" stroke="#ff6b6b" stroke-width="1.5" opacity="0.3" stroke-dasharray="3 3"/>
    <text x="100" y="69" font-family="system-ui" font-size="9" fill="#ff6b6b" opacity="0.6">dropping &#10007;</text>

    <text x="95" y="88" class="scene-desc" text-anchor="middle">Network heals itself</text>
  </g>

  <!-- Scene 5: Crash Recovery (bottom-center) -->
  <g class="f5" transform="translate(305, 340)">
    <rect x="0" y="0" width="190" height="80" rx="8" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="95" y="20" class="scene-title" fill="#ff6b6b" text-anchor="middle">Crash Recovery</text>
    <line x1="10" y1="28" x2="180" y2="28" stroke="#ff6b6b" stroke-width="0.5" opacity="0.2"/>

    <text x="95" y="46" font-family="system-ui" font-size="9" fill="#ff6b6b" text-anchor="middle">NAS sync plugin panics</text>
    <text x="95" y="60" font-family="system-ui" font-size="9" fill="#bbb" text-anchor="middle">Supervisor restarts in 1 second</text>
    <text x="95" y="74" font-family="system-ui" font-size="9" fill="#00d4aa" text-anchor="middle">Everything else: untouched</text>
  </g>

  <text x="400" y="448" font-family="system-ui" font-size="11" fill="#bbb" text-anchor="middle">Five things happened. You were asleep for all of them.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes orbitDash { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -60; } }
    @keyframes orbitDash2 { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 60; } }
    @keyframes nodePulse1 { 0%, 100% { r: 16; opacity: 0.6; } 50% { r: 20; opacity: 1; } }
    @keyframes nodePulse2 { 0%, 100% { r: 12; opacity: 0.5; } 50% { r: 16; opacity: 0.9; } }
    @keyframes nodePulse3 { 0%, 100% { r: 10; opacity: 0.4; } 50% { r: 14; opacity: 0.8; } }
    @keyframes tokenOrbit1 { 0% { opacity: 0.9; } 25% { opacity: 0.4; } 50% { opacity: 0.9; } 75% { opacity: 0.4; } 100% { opacity: 0.9; } }
    @keyframes tokenOrbit2 { 0% { opacity: 0.4; } 25% { opacity: 0.9; } 50% { opacity: 0.4; } 75% { opacity: 0.9; } 100% { opacity: 0.4; } }
    @keyframes ringGlow { 0%, 100% { stroke-opacity: 0.15; } 50% { stroke-opacity: 0.4; } }
    @keyframes linkPulse { 0%, 100% { opacity: 0.08; } 50% { opacity: 0.25; } }
    @keyframes cardGlow { 0%, 100% { stroke-opacity: 0.5; } 50% { stroke-opacity: 1; } }
    .orbit1 { stroke-dasharray: 12 8; animation: orbitDash 3s linear infinite; }
    .orbit2 { stroke-dasharray: 8 12; animation: orbitDash2 4s linear infinite; }
    .np1 { animation: nodePulse1 2.5s ease-in-out infinite; }
    .np2 { animation: nodePulse2 2.5s ease-in-out infinite 0.8s; }
    .np3 { animation: nodePulse2 2.5s ease-in-out infinite 1.6s; }
    .np4 { animation: nodePulse3 3s ease-in-out infinite 0.4s; }
    .np5 { animation: nodePulse3 3s ease-in-out infinite 1.2s; }
    .np6 { animation: nodePulse3 3s ease-in-out infinite 2s; }
    .np7 { animation: nodePulse3 3s ease-in-out infinite 0.6s; }
    .tk1 { animation: tokenOrbit1 2s ease-in-out infinite; }
    .tk2 { animation: tokenOrbit2 2s ease-in-out infinite; }
    .tk3 { animation: tokenOrbit1 2.5s ease-in-out infinite 0.5s; }
    .tk4 { animation: tokenOrbit2 3s ease-in-out infinite 1s; }
    .rg { animation: ringGlow 4s ease-in-out infinite; }
    .rg2 { animation: ringGlow 4s ease-in-out infinite 2s; }
    .lp1 { animation: linkPulse 2s ease-in-out infinite; }
    .lp2 { animation: linkPulse 2s ease-in-out infinite 0.5s; }
    .lp3 { animation: linkPulse 2s ease-in-out infinite 1s; }
    .lp4 { animation: linkPulse 2s ease-in-out infinite 1.5s; }
    .cg1 { animation: cardGlow 3s ease-in-out infinite; }
    .cg2 { animation: cardGlow 3s ease-in-out infinite 0.7s; }
    .cg3 { animation: cardGlow 3s ease-in-out infinite 1.4s; }
    .cg4 { animation: cardGlow 3s ease-in-out infinite 2.1s; }
    .f1 { animation: fadeIn 0.5s ease-out 0.3s both; }
    .f2 { animation: fadeIn 0.5s ease-out 0.7s both; }
    .f3 { animation: fadeIn 0.5s ease-out 1.1s both; }
    .f4 { animation: fadeIn 0.5s ease-out 1.5s both; }
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="800" height="380" fill="#0a0a1a"/>

  <!-- Orbital rings - thick, bright, animated dash -->
  <circle cx="400" cy="155" r="105" stroke="#00d4aa" stroke-width="2" fill="none" class="orbit1 rg"/>
  <circle cx="400" cy="155" r="72" stroke="#ffb347" stroke-width="1.5" fill="none" class="orbit2 rg2"/>

  <!-- Connection lines between nodes - pulsing -->
  <line x1="400" y1="155" x2="335" y2="110" stroke="#00d4aa" stroke-width="1.5" class="lp1"/>
  <line x1="400" y1="155" x2="465" y2="110" stroke="#00d4aa" stroke-width="1.5" class="lp2"/>
  <line x1="400" y1="155" x2="335" y2="200" stroke="#ffb347" stroke-width="1.5" class="lp3"/>
  <line x1="400" y1="155" x2="465" y2="200" stroke="#4488ff" stroke-width="1.5" class="lp4"/>
  <line x1="335" y1="110" x2="465" y2="110" stroke="#00d4aa" stroke-width="1" class="lp2"/>
  <line x1="335" y1="200" x2="465" y2="200" stroke="#ffb347" stroke-width="1" class="lp3"/>
  <line x1="335" y1="110" x2="295" y2="155" stroke="#9966ff" stroke-width="1" class="lp1"/>
  <line x1="465" y1="110" x2="505" y2="155" stroke="#4488ff" stroke-width="1" class="lp4"/>
  <line x1="295" y1="155" x2="335" y2="200" stroke="#9966ff" stroke-width="1" class="lp2"/>
  <line x1="505" y1="155" x2="465" y2="200" stroke="#4488ff" stroke-width="1" class="lp3"/>

  <!-- Central node (admin) - big pulse -->
  <circle cx="400" cy="155" r="18" fill="#00d4aa" fill-opacity="0.2" stroke="#00d4aa" stroke-width="2" class="np1"/>
  <circle cx="400" cy="155" r="6" fill="#00d4aa" opacity="0.8"/>

  <!-- Surrounding nodes - visible pulses -->
  <circle cx="335" cy="110" r="14" fill="#ffb347" fill-opacity="0.15" stroke="#ffb347" stroke-width="1.5" class="np2"/>
  <circle cx="335" cy="110" r="5" fill="#ffb347" opacity="0.7"/>

  <circle cx="465" cy="110" r="14" fill="#4488ff" fill-opacity="0.15" stroke="#4488ff" stroke-width="1.5" class="np3"/>
  <circle cx="465" cy="110" r="5" fill="#4488ff" opacity="0.7"/>

  <circle cx="335" cy="200" r="14" fill="#9966ff" fill-opacity="0.15" stroke="#9966ff" stroke-width="1.5" class="np4"/>
  <circle cx="335" cy="200" r="5" fill="#9966ff" opacity="0.7"/>

  <circle cx="465" cy="200" r="14" fill="#ffb347" fill-opacity="0.15" stroke="#ffb347" stroke-width="1.5" class="np5"/>
  <circle cx="465" cy="200" r="5" fill="#ffb347" opacity="0.7"/>

  <!-- Outer nodes -->
  <circle cx="295" cy="155" r="11" fill="#9966ff" fill-opacity="0.1" stroke="#9966ff" stroke-width="1" class="np6"/>
  <circle cx="295" cy="155" r="4" fill="#9966ff" opacity="0.6"/>

  <circle cx="505" cy="155" r="11" fill="#4488ff" fill-opacity="0.1" stroke="#4488ff" stroke-width="1" class="np7"/>
  <circle cx="505" cy="155" r="4" fill="#4488ff" opacity="0.6"/>

  <!-- Token particles - big, bright, alternating visibility -->
  <circle cx="365" cy="88" r="6" fill="#00d4aa" class="tk1"/>
  <circle cx="450" cy="195" r="5" fill="#ffb347" class="tk2"/>
  <circle cx="310" cy="175" r="5" fill="#4488ff" class="tk3"/>
  <circle cx="440" cy="80" r="4" fill="#9966ff" class="tk4"/>
  <circle cx="480" cy="170" r="4" fill="#00d4aa" class="tk2"/>
  <circle cx="350" cy="170" r="4" fill="#ffb347" class="tk1"/>

  <!-- Property cards at bottom -->
  <g class="f1">
    <rect x="55" y="280" width="160" height="58" rx="8" fill="#00d4aa" fill-opacity="0.05" stroke="#00d4aa" stroke-width="1" class="cg1"/>
    <text x="135" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#00d4aa">Narrowable</text>
    <text x="135" y="323" text-anchor="middle" font-size="11" fill="#888">never widened</text>
  </g>

  <g class="f2">
    <rect x="235" y="280" width="160" height="58" rx="8" fill="#ffb347" fill-opacity="0.05" stroke="#ffb347" stroke-width="1" class="cg2"/>
    <text x="315" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#ffb347">Offline Verified</text>
    <text x="315" y="323" text-anchor="middle" font-size="11" fill="#888">root key only</text>
  </g>

  <g class="f3">
    <rect x="415" y="280" width="160" height="58" rx="8" fill="#4488ff" fill-opacity="0.05" stroke="#4488ff" stroke-width="1" class="cg3"/>
    <text x="495" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#4488ff">P2P Delivered</text>
    <text x="495" y="323" text-anchor="middle" font-size="11" fill="#888">no relay needed</text>
  </g>

  <g class="f4">
    <rect x="595" y="280" width="160" height="58" rx="8" fill="#9966ff" fill-opacity="0.05" stroke="#9966ff" stroke-width="1" class="cg4"/>
    <text x="675" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#9966ff">Delegatable</text>
    <text x="675" y="323" text-anchor="middle" font-size="11" fill="#888">multi-hop chains</text>
  </g>

  <!-- Bottom text -->
  <text x="400" y="365" text-anchor="middle" font-size="12" fill="#555">Foundation for the Zero-Human Network: admin sets policy, the network enforces it</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <linearGradient id="nodeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1d20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cryptoFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4561;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e2d40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162c24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2e1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c2216;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2545;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1830;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1e2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c1624;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#141316"/>

  <!-- Title -->
  <text x="450" y="28" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5" text-anchor="middle" font-weight="600">ZKP Anonymous Authentication Protocol</text>
  <text x="450" y="46" font-family="system-ui, sans-serif" font-size="10" fill="#565f89" text-anchor="middle">4-phase challenge-response. Relay learns THAT a client is authorized, never WHICH authorized peer.</text>

  <!-- Phase 7 badge -->
  <rect x="735" y="8" width="150" height="22" rx="11" fill="#9ece6a" opacity="0.15" stroke="#9ece6a" stroke-width="1"/>
  <text x="810" y="23" font-family="SF Mono, monospace" font-size="10" fill="#9ece6a" text-anchor="middle" font-weight="600">COMPLETE - Phase 7</text>

  <!-- ====== Column Headers ====== -->
  <!-- CLIENT column -->
  <rect x="60" y="65" width="200" height="44" rx="10" fill="url(#pinkFill)" stroke="#da1c5c" stroke-width="1.5"/>
  <text x="160" y="85" font-family="system-ui, sans-serif" font-size="13" fill="#da1c5c" text-anchor="middle" font-weight="600">CLIENT</text>
  <text x="160" y="101" font-family="SF Mono, monospace" font-size="9" fill="#565f89" text-anchor="middle">Prover</text>

  <!-- RELAY column -->
  <rect x="640" y="65" width="200" height="44" rx="10" fill="url(#purpleFill)" stroke="#bb9af7" stroke-width="1.5"/>
  <text x="740" y="85" font-family="system-ui, sans-serif" font-size="13" fill="#bb9af7" text-anchor="middle" font-weight="600">RELAY</text>
  <text x="740" y="101" font-family="SF Mono, monospace" font-size="9" fill="#565f89" text-anchor="middle">Verifier</text>

  <!-- Vertical swim lane lines -->
  <line x1="160" y1="109" x2="160" y2="440" stroke="#da1c5c" stroke-width="1" opacity="0.15"/>
  <line x1="740" y1="109" x2="740" y2="440" stroke="#bb9af7" stroke-width="1" opacity="0.15"/>

  <!-- ====== PHASE 1: Auth Request (Client -> Relay) ====== -->
  <text x="30" y="152" font-family="SF Mono, monospace" font-size="10" fill="#da1c5c" font-weight="600">1</text>

  <!-- Client action box -->
  <rect x="70" y="132" width="180" height="32" rx="6" fill="url(#nodeFill)" stroke="#da1c5c" stroke-width="0.8"/>
  <text x="160" y="148" font-family="system-ui, sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="600">Send auth request</text>
  <text x="160" y="160" font-family="SF Mono, monospace" font-size="7" fill="#565f89" text-anchor="middle">declare version + role</text>

  <!-- Arrow right -->
  <line x1="250" y1="148" x2="630" y2="148" stroke="#e8729a" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="626,143 626,153 635,148" fill="#e8729a"/>

  <!-- Wire format -->
  <rect x="360" y="130" width="190" height="20" rx="4" fill="url(#cryptoFill)" stroke="#7aa2f7" stroke-width="0.8"/>
  <text x="455" y="144" font-family="SF Mono, monospace" font-size="9" fill="#7aa2f7" text-anchor="middle" font-weight="600">[version][auth_type][role]</text>
  <text x="455" y="162" font-family="SF Mono, monospace" font-size="7" fill="#565f89" text-anchor="middle">3 bytes</text>

  <!-- ====== PHASE 2: Challenge (Relay -> Client) ====== -->
  <text x="860" y="222" font-family="SF Mono, monospace" font-size="10" fill="#bb9af7" font-weight="600">2</text>

  <!-- Relay action box -->
  <rect x="650" y="202" width="180" height="32" rx="6" fill="url(#nodeFill)" stroke="#bb9af7" stroke-width="0.8"/>
  <text x="740" y="218" font-family="system-ui, sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="600">Send challenge</text>
  <text x="740" y="230" font-family="SF Mono, monospace" font-size="7" fill="#565f89" text-anchor="middle">nonce + current root + depth</text>

  <!-- Arrow left -->
  <line x1="650" y1="218" x2="270" y2="218" stroke="#bb9af7" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="274,213 274,223 265,218" fill="#bb9af7"/>

  <!-- Wire format -->
  <rect x="330" y="200" width="250" height="20" rx="4" fill="url(#cryptoFill)" stroke="#7aa2f7" stroke-width="0.8"/>
  <text x="455" y="214" font-family="SF Mono, monospace" font-size="9" fill="#7aa2f7" text-anchor="middle" font-weight="600">[status][nonce 8B][root 32B][depth 1B]</text>
  <text x="455" y="232" font-family="SF Mono, monospace" font-size="7" fill="#565f89" text-anchor="middle">42 bytes</text>

  <!-- ====== PHASE 3: Proof (Client -> Relay) ====== -->
  <text x="30" y="302" font-family="SF Mono, monospace" font-size="10" fill="#da1c5c" font-weight="600">3</text>

  <!-- Client action box -->
  <rect x="70" y="278" width="180" height="40" rx="6" fill="url(#nodeFill)" stroke="#da1c5c" stroke-width="0.8"/>
  <text x="160" y="294" font-family="system-ui, sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="600">Generate PLONK proof</text>
  <text x="160" y="308" font-family="SF Mono, monospace" font-size="7" fill="#9ece6a" text-anchor="middle">proves membership without</text>
  <text x="160" y="316" font-family="SF Mono, monospace" font-size="7" fill="#9ece6a" text-anchor="middle">revealing identity</text>

  <!-- Arrow right -->
  <line x1="250" y1="298" x2="630" y2="298" stroke="#e8729a" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="626,293 626,303 635,298" fill="#e8729a"/>

  <!-- Wire format -->
  <rect x="340" y="280" width="220" height="20" rx="4" fill="url(#cryptoFill)" stroke="#da1c5c" stroke-width="1"/>
  <text x="450" y="294" font-family="SF Mono, monospace" font-size="9" fill="#da1c5c" text-anchor="middle" font-weight="600">[proof_len 2B][proof ~520B]</text>
  <text x="450" y="312" font-family="SF Mono, monospace" font-size="7" fill="#565f89" text-anchor="middle">PLONK proof (gnark BN254 + KZG commitment)</text>

  <!-- Key insight box -->
  <rect x="310" y="322" width="280" height="28" rx="6" fill="url(#greenFill)" stroke="#9ece6a" stroke-width="0.8"/>
  <text x="450" y="340" font-family="system-ui, sans-serif" font-size="9" fill="#9ece6a" text-anchor="middle" font-weight="600">Proof proves membership + role. Identity stays hidden.</text>

  <!-- ====== PHASE 4: Result (Relay -> Client) ====== -->
  <text x="860" y="392" font-family="SF Mono, monospace" font-size="10" fill="#bb9af7" font-weight="600">4</text>

  <!-- Relay action box -->
  <rect x="650" y="372" width="180" height="32" rx="6" fill="url(#nodeFill)" stroke="#bb9af7" stroke-width="0.8"/>
  <text x="740" y="388" font-family="system-ui, sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="600">Verify + respond</text>
  <text x="740" y="400" font-family="SF Mono, monospace" font-size="7" fill="#565f89" text-anchor="middle">constant-time verification</text>

  <!-- Arrow left -->
  <line x1="650" y1="388" x2="270" y2="388" stroke="#bb9af7" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="274,383 274,393 265,388" fill="#bb9af7"/>

  <!-- Wire format -->
  <rect x="340" y="370" width="220" height="20" rx="4" fill="url(#cryptoFill)" stroke="#7aa2f7" stroke-width="0.8"/>
  <text x="450" y="384" font-family="SF Mono, monospace" font-size="9" fill="#7aa2f7" text-anchor="middle" font-weight="600">[status][msg_len][message]</text>

  <!-- Result badges -->
  <rect x="365" y="396" width="85" height="18" rx="9" fill="#9ece6a" opacity="0.15" stroke="#9ece6a" stroke-width="0.8"/>
  <text x="408" y="409" font-family="SF Mono, monospace" font-size="8" fill="#9ece6a" text-anchor="middle" font-weight="600">AUTHORIZED</text>

  <text x="462" y="409" font-family="SF Mono, monospace" font-size="8" fill="#565f89" text-anchor="middle">or</text>

  <rect x="478" y="396" width="70" height="18" rx="9" fill="#f7768e" opacity="0.15" stroke="#f7768e" stroke-width="0.8"/>
  <text x="513" y="409" font-family="SF Mono, monospace" font-size="8" fill="#f7768e" text-anchor="middle" font-weight="600">REJECTED</text>

  <!-- ====== Bottom bar: Protocol details ====== -->
  <rect x="60" y="450" width="780" height="80" rx="8" fill="#1e1d20" stroke="#565f89" stroke-width="0.8" opacity="0.6"/>

  <!-- Protocol name -->
  <rect x="80" y="462" width="240" height="22" rx="6" fill="url(#cryptoFill)" stroke="#7aa2f7" stroke-width="1"/>
  <text x="200" y="477" font-family="SF Mono, monospace" font-size="9" fill="#7aa2f7" text-anchor="middle" font-weight="600">/shurli/zkp-auth/1.0.0</text>

  <!-- Metrics row -->
  <rect x="340" y="462" width="110" height="22" rx="6" fill="url(#amberFill)" stroke="#e0af68" stroke-width="1"/>
  <text x="395" y="477" font-family="SF Mono, monospace" font-size="9" fill="#e0af68" text-anchor="middle" font-weight="600">Prove: ~350ms</text>

  <rect x="462" y="462" width="100" height="22" rx="6" fill="url(#greenFill)" stroke="#9ece6a" stroke-width="1"/>
  <text x="512" y="477" font-family="SF Mono, monospace" font-size="9" fill="#9ece6a" text-anchor="middle" font-weight="600">Verify: ~3ms</text>

  <rect x="574" y="462" width="110" height="22" rx="6" fill="url(#purpleFill)" stroke="#bb9af7" stroke-width="1"/>
  <text x="629" y="477" font-family="SF Mono, monospace" font-size="9" fill="#bb9af7" text-anchor="middle" font-weight="600">Proof: 520B</text>

  <rect x="696" y="462" width="130" height="22" rx="6" fill="url(#pinkFill)" stroke="#da1c5c" stroke-width="1"/>
  <text x="761" y="477" font-family="SF Mono, monospace" font-size="9" fill="#da1c5c" text-anchor="middle" font-weight="600">Round-trip: ~350ms</text>

  <!-- Key insight -->
  <text x="450" y="505" font-family="system-ui, sans-serif" font-size="10" fill="#c0caf5" text-anchor="middle" font-weight="600">Relay learns THAT client is authorized, never WHICH authorized peer</text>
  <text x="450" y="520" font-family="system-ui, sans-serif" font-size="9" fill="#565f89" text-anchor="middle">Zero-knowledge proof of set membership over Poseidon2 Merkle tree. PLONK + KZG on BN254 curve.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
  <defs>
    <linearGradient id="nodeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1d20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cryptoFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4561;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e2d40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162c24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2e1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c2216;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2545;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1830;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1e2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c1624;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" rx="12" fill="#141316"/>

  <!-- Title -->
  <text x="450" y="28" font-family="system-ui, sans-serif" font-size="14" fill="#c0caf5" text-anchor="middle" font-weight="600">Private Reputation: Range Proof Circuit</text>
  <text x="450" y="46" font-family="system-ui, sans-serif" font-size="10" fill="#565f89" text-anchor="middle">Prove score meets threshold without revealing exact value. Membership + range in one proof.</text>

  <!-- Phase 7 badge -->
  <rect x="735" y="8" width="150" height="22" rx="11" fill="#9ece6a" opacity="0.15" stroke="#9ece6a" stroke-width="1"/>
  <text x="810" y="23" font-family="SF Mono, monospace" font-size="10" fill="#9ece6a" text-anchor="middle" font-weight="600">COMPLETE - Phase 7</text>

  <!-- ====== LEFT: Private Inputs ====== -->
  <rect x="40" y="70" width="230" height="230" rx="10" fill="url(#amberFill)" stroke="#e0af68" stroke-width="1.5"/>
  <text x="155" y="92" font-family="system-ui, sans-serif" font-size="13" fill="#e0af68" text-anchor="middle" font-weight="600">Private Inputs</text>

  <!-- Private witness badge -->
  <rect x="195" y="78" width="65" height="16" rx="8" fill="#e0af68" opacity="0.12" stroke="#e0af68" stroke-width="0.8"/>
  <text x="228" y="90" font-family="SF Mono, monospace" font-size="7" fill="#e0af68" text-anchor="middle" font-weight="600">witness</text>

  <!-- Private input items -->
  <rect x="55" y="105" width="200" height="24" rx="4" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.6"/>
  <text x="155" y="121" font-family="SF Mono, monospace" font-size="10" fill="#c0caf5" text-anchor="middle">PubKey[32]</text>

  <rect x="55" y="137" width="200" height="24" rx="4" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.6"/>
  <text x="155" y="153" font-family="SF Mono, monospace" font-size="10" fill="#c0caf5" text-anchor="middle">Role</text>

  <rect x="55" y="169" width="200" height="24" rx="4" fill="url(#nodeFill)" stroke="#da1c5c" stroke-width="0.8"/>
  <text x="155" y="185" font-family="SF Mono, monospace" font-size="10" fill="#da1c5c" text-anchor="middle" font-weight="600">Score (0-100)</text>

  <rect x="55" y="201" width="200" height="24" rx="4" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.6"/>
  <text x="155" y="217" font-family="SF Mono, monospace" font-size="10" fill="#c0caf5" text-anchor="middle">MerklePath[20]</text>

  <rect x="55" y="233" width="200" height="24" rx="4" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.6"/>
  <text x="155" y="249" font-family="SF Mono, monospace" font-size="10" fill="#c0caf5" text-anchor="middle">PathBits[20]</text>

  <!-- Hidden eye icon -->
  <text x="155" y="280" font-family="SF Mono, monospace" font-size="8" fill="#e0af68" text-anchor="middle" font-weight="600">Never leaves the prover</text>

  <!-- ====== CENTER: PLONK Circuit ====== -->
  <rect x="310" y="70" width="280" height="230" rx="10" fill="url(#pinkFill)" stroke="#da1c5c" stroke-width="1.5"/>
  <text x="450" y="92" font-family="system-ui, sans-serif" font-size="13" fill="#da1c5c" text-anchor="middle" font-weight="600">PLONK Circuit</text>

  <!-- Circuit badge -->
  <rect x="510" y="78" width="65" height="16" rx="8" fill="#da1c5c" opacity="0.12" stroke="#da1c5c" stroke-width="0.8"/>
  <text x="543" y="90" font-family="SF Mono, monospace" font-size="7" fill="#da1c5c" text-anchor="middle" font-weight="600">gnark</text>

  <!-- Constraint 1 -->
  <rect x="325" y="110" width="250" height="44" rx="6" fill="url(#nodeFill)" stroke="#bb9af7" stroke-width="0.8"/>
  <text x="335" y="128" font-family="SF Mono, monospace" font-size="9" fill="#bb9af7" font-weight="600">1.</text>
  <text x="350" y="128" font-family="SF Mono, monospace" font-size="9" fill="#c0caf5">Verify Merkle membership</text>
  <text x="350" y="144" font-family="SF Mono, monospace" font-size="8" fill="#565f89">Poseidon2 path reconstruction</text>

  <!-- Constraint 2 -->
  <rect x="325" y="162" width="250" height="44" rx="6" fill="url(#nodeFill)" stroke="#9ece6a" stroke-width="0.8"/>
  <text x="335" y="180" font-family="SF Mono, monospace" font-size="9" fill="#9ece6a" font-weight="600">2.</text>
  <text x="350" y="180" font-family="SF Mono, monospace" font-size="9" fill="#c0caf5">Assert(Score >= Threshold)</text>
  <text x="350" y="196" font-family="SF Mono, monospace" font-size="8" fill="#565f89">Range lower bound check</text>

  <!-- Constraint 3 -->
  <rect x="325" y="214" width="250" height="44" rx="6" fill="url(#nodeFill)" stroke="#e0af68" stroke-width="0.8"/>
  <text x="335" y="232" font-family="SF Mono, monospace" font-size="9" fill="#e0af68" font-weight="600">3.</text>
  <text x="350" y="232" font-family="SF Mono, monospace" font-size="9" fill="#c0caf5">Assert(Score &lt;= 100)</text>
  <text x="350" y="248" font-family="SF Mono, monospace" font-size="8" fill="#565f89">Range upper bound check</text>

  <!-- Constraint count -->
  <text x="450" y="282" font-family="SF Mono, monospace" font-size="9" fill="#da1c5c" text-anchor="middle" font-weight="600">26,584 SCS constraints</text>

  <!-- ====== RIGHT: Public Inputs ====== -->
  <rect x="630" y="70" width="230" height="230" rx="10" fill="url(#greenFill)" stroke="#9ece6a" stroke-width="1.5"/>
  <text x="745" y="92" font-family="system-ui, sans-serif" font-size="13" fill="#9ece6a" text-anchor="middle" font-weight="600">Public Inputs</text>

  <!-- Public badge -->
  <rect x="795" y="78" width="55" height="16" rx="8" fill="#9ece6a" opacity="0.12" stroke="#9ece6a" stroke-width="0.8"/>
  <text x="823" y="90" font-family="SF Mono, monospace" font-size="7" fill="#9ece6a" text-anchor="middle" font-weight="600">public</text>

  <!-- Public input items -->
  <rect x="645" y="105" width="200" height="24" rx="4" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.6"/>
  <text x="745" y="121" font-family="SF Mono, monospace" font-size="10" fill="#c0caf5" text-anchor="middle">MerkleRoot</text>

  <rect x="645" y="137" width="200" height="24" rx="4" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.6"/>
  <text x="745" y="153" font-family="SF Mono, monospace" font-size="10" fill="#c0caf5" text-anchor="middle">Nonce</text>

  <rect x="645" y="169" width="200" height="24" rx="4" fill="url(#nodeFill)" stroke="#565f89" stroke-width="0.6"/>
  <text x="745" y="185" font-family="SF Mono, monospace" font-size="10" fill="#c0caf5" text-anchor="middle">RoleRequired</text>

  <rect x="645" y="201" width="200" height="24" rx="4" fill="url(#nodeFill)" stroke="#9ece6a" stroke-width="0.8"/>
  <text x="745" y="217" font-family="SF Mono, monospace" font-size="10" fill="#9ece6a" text-anchor="middle" font-weight="600">Threshold</text>

  <!-- Visible label -->
  <text x="745" y="250" font-family="SF Mono, monospace" font-size="8" fill="#9ece6a" text-anchor="middle" font-weight="600">Known to both parties</text>

  <!-- ====== ARROWS: Private -> Circuit -> Output ====== -->
  <!-- Left arrow (Private -> Circuit) -->
  <line x1="270" y1="185" x2="310" y2="185" stroke="#e0af68" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="306,180 306,190 314,185" fill="#e0af68"/>

  <!-- Right arrow (Public -> Circuit) -->
  <line x1="630" y1="185" x2="590" y2="185" stroke="#9ece6a" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="594,180 594,190 586,185" fill="#9ece6a"/>

  <!-- ====== OUTPUT ARROW ====== -->
  <line x1="450" y1="300" x2="450" y2="340" stroke="#e8729a" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="445,336 455,336 450,345" fill="#e8729a"/>

  <!-- Output box -->
  <rect x="350" y="348" width="200" height="34" rx="8" fill="url(#cryptoFill)" stroke="#da1c5c" stroke-width="1.2"/>
  <text x="450" y="364" font-family="system-ui, sans-serif" font-size="12" fill="#da1c5c" text-anchor="middle" font-weight="600">520-byte proof</text>
  <text x="450" y="378" font-family="SF Mono, monospace" font-size="8" fill="#565f89" text-anchor="middle">PLONK + KZG on BN254</text>

  <!-- ====== Bottom bar ====== -->
  <rect x="60" y="400" width="780" height="38" rx="8" fill="#1e1d20" stroke="#565f89" stroke-width="0.8" opacity="0.6"/>

  <!-- Constraint count -->
  <rect x="80" y="408" width="180" height="22" rx="6" fill="url(#purpleFill)" stroke="#bb9af7" stroke-width="1"/>
  <text x="170" y="423" font-family="SF Mono, monospace" font-size="9" fill="#bb9af7" text-anchor="middle" font-weight="600">26,584 SCS constraints</text>

  <!-- Score stays private -->
  <rect x="280" y="408" width="200" height="22" rx="6" fill="url(#amberFill)" stroke="#e0af68" stroke-width="1"/>
  <text x="380" y="423" font-family="SF Mono, monospace" font-size="9" fill="#e0af68" text-anchor="middle" font-weight="600">Score stays private</text>

  <!-- Relay sees pass/fail -->
  <rect x="500" y="408" width="200" height="22" rx="6" fill="url(#greenFill)" stroke="#9ece6a" stroke-width="1"/>
  <text x="600" y="423" font-family="SF Mono, monospace" font-size="9" fill="#9ece6a" text-anchor="middle" font-weight="600">Relay sees only pass/fail</text>

  <!-- Identity hidden -->
  <rect x="720" y="408" width="110" height="22" rx="6" fill="url(#pinkFill)" stroke="#da1c5c" stroke-width="1"/>
  <text x="775" y="423" font-family="SF Mono, monospace" font-size="9" fill="#da1c5c" text-anchor="middle" font-weight="600">Identity hidden</text>
</svg>
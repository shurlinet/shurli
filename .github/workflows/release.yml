name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            install_deps: sudo apt-get install -y -qq libavahi-compat-libdnssd-dev
            cgo: "1"
            suffix: ""
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            install_deps: ""
            arm64_cross: true
            cgo: "1"
            cc: aarch64-linux-gnu-gcc
            suffix: ""
          - goos: darwin
            goarch: amd64
            os: macos-latest
            install_deps: ""
            cgo: "1"
            suffix: ""
          - goos: darwin
            goarch: arm64
            os: macos-latest
            install_deps: ""
            cgo: "1"
            suffix: ""
          - goos: windows
            goarch: amd64
            os: ubuntu-latest
            install_deps: ""
            cgo: "0"
            suffix: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # needed for git describe

      - name: Install native mDNS library
        if: matrix.install_deps != ''
        run: ${{ matrix.install_deps }}

      - name: Set up arm64 cross-compilation
        if: matrix.arm64_cross == true
        run: |
          sudo dpkg --add-architecture arm64
          # Pin ALL existing sources to amd64 only (security.ubuntu.com has no arm64)
          for f in /etc/apt/sources.list.d/*.sources; do
            sudo sed -i '/^Architectures:/d' "$f" 2>/dev/null || true
            sudo sed -i '/^Types:/a Architectures: amd64' "$f" 2>/dev/null || true
          done
          # Also handle any .list files that don't use [arch=] yet
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list 2>/dev/null || true
          fi
          # Add arm64 ports repository (covers main, security, updates)
          printf '%s\n' \
            'deb [arch=arm64] http://ports.ubuntu.com/ noble main restricted universe multiverse' \
            'deb [arch=arm64] http://ports.ubuntu.com/ noble-updates main restricted universe multiverse' \
            'deb [arch=arm64] http://ports.ubuntu.com/ noble-security main restricted universe multiverse' \
            | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu libavahi-compat-libdnssd-dev:arm64

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          CC: ${{ matrix.cc || '' }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE} -s -w"

          ARCHIVE_DIR="shurli-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "${ARCHIVE_DIR}/deploy" "${ARCHIVE_DIR}/tools"

          # Build binary into archive dir
          go build -ldflags "${LDFLAGS}" -trimpath -o "${ARCHIVE_DIR}/shurli${{ matrix.suffix }}" ./cmd/shurli

          # Bundle service files and setup scripts
          cp deploy/shurli-daemon.service deploy/shurli-relay.service "${ARCHIVE_DIR}/deploy/"
          cp deploy/com.shurli.daemon.plist "${ARCHIVE_DIR}/deploy/" 2>/dev/null || true
          cp tools/relay-setup.sh "${ARCHIVE_DIR}/tools/"
          chmod +x "${ARCHIVE_DIR}/tools/relay-setup.sh"

          # Create archive
          tar czf "${ARCHIVE_DIR}.tar.gz" "${ARCHIVE_DIR}"
          echo "ARTIFACT=${ARCHIVE_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: shurli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARTIFACT }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > checksums-sha256.txt

      - name: Detect release type
        id: release_type
        run: |
          TAG="${{ github.ref_name }}"
          # Tags with hyphen suffix are pre-releases (v0.1.1-dev.1, v0.2.0-rc.1, etc.)
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "title=Shurli $TAG (pre-release)" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "title=Shurli $TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"

          # Find previous tag
          PREV_TAG="$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)"
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # Parse conventional commits into sections
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            hash="${line%% *}"
            msg="${line#* }"
            short="${hash:0:7}"

            case "$msg" in
              feat:*|feat\(*)
                clean="${msg#feat: }"
                clean="${clean#feat(*): }"
                FEATURES="${FEATURES}- ${clean} (${short})\n"
                ;;
              fix:*|fix\(*)
                clean="${msg#fix: }"
                clean="${clean#fix(*)!: }"
                FIXES="${FIXES}- ${clean} (${short})\n"
                ;;
              *)
                OTHER="${OTHER}- ${msg} (${short})\n"
                ;;
            esac
          done < <(git log --oneline "$RANGE" 2>/dev/null)

          # Build notes
          NOTES=""
          if [ -n "$FEATURES" ]; then
            NOTES="${NOTES}## Features\n\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}## Bug Fixes\n\n${FIXES}\n"
          fi
          if [ -n "$OTHER" ]; then
            NOTES="${NOTES}## Other Changes\n\n${OTHER}\n"
          fi

          NOTES="${NOTES}## Platforms\n\n"
          NOTES="${NOTES}\`linux/amd64\`, \`linux/arm64\`, \`darwin/amd64\`, \`darwin/arm64\`, \`windows/amd64\`\n\n"

          if [ -n "$PREV_TAG" ]; then
            NOTES="${NOTES}**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}\n"
          fi

          # Write to file (avoids shell escaping issues with gh)
          printf '%b' "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ steps.release_type.outputs.title }}" \
            --notes-file /tmp/release-notes.md \
            ${{ steps.release_type.outputs.prerelease == 'true' && '--prerelease' || '' }} \
            dist/*
